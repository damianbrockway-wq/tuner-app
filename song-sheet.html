<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pluck · Song Sheets</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#08060f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pluck">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<style>
  :root{--bg:#08060f;--txt:#eef1ff;--muted:#9aa0c8;--accent:#7c6cff;--good:#27e0a0}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;align-items:center;min-height:100%;
    padding:calc(env(safe-area-inset-top) + 10px) 16px calc(env(safe-area-inset-bottom) + 18px);-webkit-user-select:none;user-select:none}
  .aurora{position:fixed;inset:-30%;z-index:-2;filter:blur(70px);opacity:.4}
  .blob{position:absolute;border-radius:50%;mix-blend-mode:screen}
  .b1{width:55vmax;height:55vmax;background:#5b4bff;left:-10%;top:-10%}
  .b2{width:45vmax;height:45vmax;background:#16d6a2;right:-10%;bottom:0}
  .wrap{width:100%;max-width:460px;display:flex;flex-direction:column;gap:14px}
  .top{display:flex;align-items:center;justify-content:space-between}
  a.back{color:var(--muted);text-decoration:none;font-size:14px;font-weight:600}
  .brand{font-size:15px;font-weight:700}.brand b{color:#9d8bff}
  .picker{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
  .picker button{font-size:12px;font-weight:800;padding:7px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:var(--muted);cursor:pointer}
  .picker button.on{background:linear-gradient(90deg,#7c6cff,#5b8cff);color:#fff;border-color:transparent}
  .hero{text-align:center}
  .hero .t{font-size:25px;font-weight:800}
  .hero .a{font-size:13px;color:var(--muted);margin-top:2px}
  .meta{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px}
  .meta span{font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;background:rgba(124,108,255,.18);color:#c3bcff}
  .card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px}
  .lbl{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .diagrams{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:10px}
  .dg{text-align:center}.dg .nm{font-size:16px;font-weight:800;margin-bottom:2px}
  .pat{display:flex;gap:5px;justify-content:center;margin-top:10px}
  .pat .s{width:30px;height:38px;border-radius:8px;border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800}
  .count{display:flex;gap:5px;justify-content:center;margin-top:3px}
  .count .c{width:30px;text-align:center;font-size:10px;color:var(--muted)}
  .section{margin-top:12px}
  .section .h{font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--accent)}
  .bars{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .bars b{font-weight:800;font-size:15px;min-width:42px;text-align:center;padding:7px 6px;border-radius:9px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}
  .tip{font-size:13px;color:var(--muted);line-height:1.6;margin-top:6px}
  a.cta{display:block;text-align:center;text-decoration:none;color:#fff;font-weight:800;padding:14px;border-radius:15px;background:linear-gradient(90deg,#7c6cff,#5b8cff);box-shadow:0 10px 26px rgba(124,108,255,.45)}
</style>
</head>
<body>
<div class="aurora"><div class="blob b1"></div><div class="blob b2"></div></div>
<div class="wrap">
  <div class="top"><a class="back" href="index.html">← Pluck</a><div class="brand">📄 <b>SONG SHEETS</b></div><span style="width:40px"></span></div>
  <div class="picker" id="picker"></div>

  <div class="hero">
    <div class="t" id="title">—</div>
    <div class="a" id="artist"></div>
    <div class="meta" id="meta"></div>
  </div>

  <div class="card"><div class="lbl">Chords you need</div><div class="diagrams" id="diagrams"></div></div>
  <div class="card"><div class="lbl">The strum</div><div class="tip" id="strumtip"></div><div class="pat" id="pat"></div><div class="count" id="count"></div></div>
  <div class="card"><div class="lbl">How it's built</div><div id="structure"></div></div>
  <div class="card"><div class="lbl">Tips</div><div class="tip" id="tips"></div></div>
  <a class="cta" id="play" href="#">▶ Play along in Song Mode</a>
</div>

<script>
const CHORDS={
  'C' :{frets:[0,0,0,3],fingers:[0,0,0,3]},'G':{frets:[0,2,3,2],fingers:[0,1,3,2]},
  'Am':{frets:[2,0,0,0],fingers:[2,0,0,0]},'F':{frets:[2,0,1,0],fingers:[2,0,1,0]},
  'D':{frets:[2,2,2,0],fingers:[1,2,3,0]},'A':{frets:[2,1,0,0],fingers:[2,1,0,0]},
  'E':{frets:[1,4,0,2],fingers:[1,4,0,3]},'Em':{frets:[0,4,3,2],fingers:[0,3,2,1]},
  'F#m':{frets:[2,1,2,0],fingers:[3,1,2,0]}
};
const PATTERNS={
  island:{slots:['D','','D','U','','U','D','U'], count:['1','&','2','&','3','&','4','&']},
  eighths:{slots:['D','U','D','U','D','U','D','U'], count:['1','&','2','&','3','&','4','&']},
  downs:{slots:['D','','D','','D','','D',''], count:['1','&','2','&','3','&','4','&']},
  folk:{slots:['D','','D','U','D','U','D','U'], count:['1','&','2','&','3','&','4','&']}
};
const SONGS=[
  {id:'time', title:'Time After Time', artist:'Cyndi Lauper · 1984', meta:['Key of C','≈120 BPM','4 chords','Beginner'],
   chords:['C','G','Am','F'], pattern:'island',
   strumtip:"<b>Easy:</b> one down-strum per beat (D D D D). <b>Nicer:</b> the island strum below — down, down-up, up-down-up. Start slow.",
   sections:[['Intro','C|G|Am|F'],['Verse','C|G|Am|F|C|G|Am|F'],['Chorus','C|G|Am|F|C|G|Am|F'],['Outro','C|G|Am|F|…']],
   tips:"Same four chords all the way through — C, G, Am, F — looping. The trickiest change is <b>C → G</b>; drill it in Smart Practice. Let chords ring and don't rush.",
   play:'time%20after'},
  {id:'wowy', title:'With or Without You', artist:'U2 · 1987', meta:['Key of C','≈110 BPM','4 chords','Beginner'],
   chords:['C','G','Am','F'], pattern:'eighths',
   strumtip:"Keep it gentle and even — steady down-up eighths (D U D U…). This song is all about the build, so start soft and let it grow.",
   sections:[['Intro','C|G|Am|F'],['Verse','C|G|Am|F|C|G|Am|F'],['Chorus','C|G|Am|F|C|G|Am|F'],['Build','C|G|Am|F|C|G|Am|F'],['Outro','C|G|Am|F|…']],
   tips:"It's literally the same C–G–Am–F loop for the entire song — so smooth, even strumming is everything. Start almost whisper-quiet and slowly get louder toward the end; that dynamic build IS the song.",
   play:'without'},
  {id:'standby', title:'Stand By Me', artist:'Ben E. King · 1961 · 1986 revival', meta:['Key of C','≈120 BPM','4 chords','Beginner'],
   chords:['C','Am','F','G'], pattern:'island',
   strumtip:"Keep it relaxed and laid-back. <b>Easy:</b> one down-strum per beat. The original sways with a gentle bass-and-strum feel — the island strum below gets you close.",
   sections:[['Intro','C|Am|F|G'],['Verse','C|Am|F|G|C|Am|F|G'],['Chorus','C|Am|F|G|C|Am|F|G']],
   tips:"The classic 50s doo-wop loop: C, Am, F, G. Each chord holds a while, so you've got time to make clean, unhurried changes — great for building confidence. Watch the <b>F → G</b> move; drill it in Smart Practice.",
   play:'stand'},
  {id:'karma', title:'Karma Chameleon', artist:'Culture Club · 1983', meta:['Key of C','≈100 BPM','4 chords','Easy'],
 chords:['C','G','Am','F'], pattern:'island',
 strumtip:"Lean into the island feel: down, down-up, up-down-up, and let it bounce so the song stays light on its feet.",
 sections:[['Intro','C|G'],['Verse','C|G|C|G|C|G|C|G'],['Chorus','Am|F|C|G|Am|F|C|G']],
 tips:"The quick jump from Am to F in the chorus is where most folks stumble, so keep your eyes on it. Stay loose and breezy rather than forceful, then run that Am-to-F change through Smart Practice.",
 play:'karma'},
{id:'believin', title:"Don't Stop Believin'", artist:'Journey · 1981', meta:['Key of C','≈120 BPM','4 chords','Easy'],
 chords:['C','G','Am','F'], pattern:'eighths',
 strumtip:"Drive steady eighth-note down-ups the whole way through and keep them even, like a heartbeat under the melody.",
 sections:[['Intro','C|G|Am|F'],['Verse','C|G|Am|F|C|G|Am|F'],['Chorus','C|G|Am|F|C|G|Am|F']],
 tips:"Going from G down to Am is the change that trips people, so plant your ring finger early. Keep the energy anthemic without rushing, and send that G-to-Am move to Smart Practice.",
 play:'believ'},
{id:'wake', title:'Wake Me Up Before You Go-Go', artist:'Wham! · 1984', meta:['Key of C','≈115 BPM','3 chords','Easy'],
 chords:['C','F','G'], pattern:'folk',
 strumtip:"Use a peppy folk pattern with a clear bass note on the down, and keep it skipping along with a smile.",
 sections:[['Intro','C|F'],['Verse','C|F|G|C|C|F|G|C'],['Chorus','C|F|G|C|C|F|G|C']],
 tips:"The C-to-F switch is the one to nail since F asks for a barre shape, so practice landing it clean. Keep everything bright and bouncy, then Smart Practice that C-to-F change a few times.",
 play:'wake'},
{id:'should', title:'Should I Stay or Should I Go', artist:'The Clash · 1982', meta:['Key of D','≈115 BPM','3 chords','Medium'],
 chords:['D','G','A'], pattern:'downs',
 strumtip:"Hit hard, even down-strums only, with a little muted chunk between hits so it feels punchy and punk.",
 sections:[['Intro','D|G'],['Verse','D|G|D|A|D|G|D|A'],['Chorus','D|G|D|A|D|G|D|A']],
 tips:"The fast D-to-A change at the end of each line is the tricky bit, so keep that fretting hand quick. Play it aggressive and a touch ahead of the beat, and drill the D-to-A jump in Smart Practice.",
 play:'should'},
{id:'sunshine', title:'Walking on Sunshine', artist:'Katrina & The Waves · 1985', meta:['Key of A','≈110 BPM','3 chords','Medium'],
 chords:['A','D','E'], pattern:'eighths',
 strumtip:"Keep busy, bright eighth-note down-ups going strong so the whole thing feels like it's grinning at you.",
 sections:[['Intro','A|D|A|E'],['Verse','A|D|A|E|A|D|A|E'],['Chorus','A|D|A|E|A|D|A|E']],
 tips:"The D-to-E move is the one to watch since both want a firm finger stretch, so shift cleanly. Keep it energetic and joyful, leaning into the upstrokes, and Smart Practice that D-to-E change to lock it in.",
 play:'walking'},
{id:'prayer', title:"Livin' on a Prayer", artist:'Bon Jovi · 1986', meta:['Key of Em','≈120 BPM','4 chords','Medium'],
 chords:['Em','C','D','G'], pattern:'downs',
 strumtip:"Big, confident down-strums with room to breathe between them, building like a stadium chant rising up.",
 sections:[['Intro','Em|C|D|G'],['Verse','Em|C|D|G|Em|C|D|G'],['Chorus','Em|C|D|G|Em|C|D|G']],
 tips:"The C-to-D change is the sneaky one, so move your whole hand together rather than one finger at a time. Start restrained and let it swell into the chorus, then send the C-to-D change through Smart Practice.",
 play:'prayer'},
  {id:'takeon', title:'Take On Me', artist:'a-ha · 1985', meta:['Key of A','≈170 BPM','4 chords','Medium'],
   chords:['A','E','F#m','D'], pattern:'eighths',
   strumtip:"Fast, even eighth-note down-ups, bright and bouncy — keep your wrist loose so it stays light and quick.",
   sections:[['Intro','A|E'],['Verse','A|E|F#m|D|A|E|F#m|D'],['Chorus','A|E|F#m|D|A|E|F#m|D']],
   tips:"F#m is the new shape — keep your fingers arched so moving in and out of it stays clean. Drill the E to F#m change in Smart Practice.",
   play:'take on'},
  {id:'everybreath', title:'Every Breath You Take', artist:'The Police · 1983', meta:['Key of A','≈115 BPM','4 chords','Medium'],
   chords:['A','F#m','D','E'], pattern:'folk',
   strumtip:"Gentle and even, letting each chord ring — soft and hypnotic, never busy.",
   sections:[['Intro','A|F#m'],['Verse','A|F#m|D|E|A|F#m|D|E'],['Chorus','A|F#m|D|E|A|F#m|D|E']],
   tips:"The A to F#m change repeats nonstop, so make it smooth and automatic. Keep it quiet and steady, and run A to F#m through Smart Practice.",
   play:'every breath'},
  {id:'watchyourmouth', title:'Watch Your Mouth', artist:'Josiah Queen · 2024', meta:['Key of C','≈130 BPM','4 chords','Easy'],
   chords:['C','G','Am','F'], pattern:'folk',
   strumtip:"Keep a flowing folk feel — down, then down-up-down-up — and let it breathe so it stays worshipful, not busy.",
   sections:[['Intro','C|G|Am|F'],['Verse','C|Am|F|C|Am|F'],['Pre-chorus','F|G'],['Chorus','C|G|Am|F|C|G|Am|F']],
   tips:"It's the C–G–Am–F family you already know. In the recording the chorus passes through a G/B bass note — just play G there and it sounds right. Smooth the G→Am change in Smart Practice.",
   play:'watch'},
  {id:'prodigal', title:'The Prodigal', artist:'Josiah Queen · 2024', meta:['Key of C','≈140 BPM','4 chords','Easy'],
   chords:['Am','F','C','G'], pattern:'island',
   strumtip:"Gentle and flowing — the island strum suits this one. Let the chords ring and build slowly.",
   sections:[['Intro','Am|F|C|G'],['Verse','Am|F|C|G|Am|F|C|G'],['Chorus','C|G|Am|F|C|G|Am|F']],
   tips:"Simplified to an easy key — the original is in B with barre chords, but Am, F, C, G captures it and is fully beginner-friendly. Watch the Am→F change; drill it in Smart Practice.",
   play:'prodigal'},
  {id:'godofmiracles', title:'God of Miracles', artist:'Josiah Queen · 2020', meta:['Key of C','≈130 BPM','4 chords','Easy'],
   chords:['C','G','Am','F'], pattern:'downup',
   strumtip:"Steady, driving down-up eighths to keep the energy up — this one wants momentum.",
   sections:[['Intro','C|G|Am|F'],['Verse','C|G|Am|F|C|G|Am|F'],['Chorus','C|G|Am|F|C|G|Am|F']],
   tips:"Transposed to an easy key (the original sits in G#m with barres). C, G, Am, F gets you playing it today — keep the G→Am change clean, Smart Practice it.",
   play:'miracles'}
];
const $=id=>document.getElementById(id);
function diagram(ch){
  const W=92,H=112,ml=14,mr=14,top=20,bot=10,st=4,nF=4;const xs=(W-ml-mr)/(st-1),ys=(H-top-bot)/nF;
  let s=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  s+=`<rect x="${ml}" y="${top-3}" width="${(st-1)*xs}" height="4" rx="2" fill="#cfd4ff"/>`;
  for(let f=1;f<=nF;f++){const y=top+f*ys;s+=`<line x1="${ml}" y1="${y}" x2="${ml+(st-1)*xs}" y2="${y}" stroke="rgba(255,255,255,.18)" stroke-width="1.2"/>`;}
  for(let i=0;i<st;i++){const x=ml+i*xs;s+=`<line x1="${x}" y1="${top}" x2="${x}" y2="${H-bot}" stroke="rgba(255,255,255,.28)" stroke-width="1.2"/>`;}
  for(let i=0;i<st;i++){const x=ml+i*xs,fr=ch.frets[i],fg=ch.fingers[i];
    if(fr===0){s+=`<circle cx="${x}" cy="${top-10}" r="4" fill="none" stroke="#9aa0c8" stroke-width="1.4"/>`;}
    else{const y=top+(fr-0.5)*ys;s+=`<circle cx="${x}" cy="${y}" r="8" fill="#7c6cff"/>`;if(fg>0)s+=`<text x="${x}" y="${y+4}" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">${fg}</text>`;}}
  return s+'</svg>';
}
let cur=0;
function render(){
  const sg=SONGS[cur];
  [...$('picker').children].forEach((b,i)=>b.classList.toggle('on',i===cur));
  $('title').textContent=sg.title;$('artist').textContent=sg.artist;
  $('meta').innerHTML=sg.meta.map(m=>'<span>'+m+'</span>').join('');
  $('diagrams').innerHTML='';sg.chords.forEach(n=>{const d=document.createElement('div');d.className='dg';d.innerHTML='<div class="nm">'+n+'</div>'+diagram(CHORDS[n]);$('diagrams').appendChild(d);});
  $('strumtip').innerHTML=sg.strumtip;
  const P=PATTERNS[sg.pattern];
  $('pat').innerHTML=P.slots.map(s=>'<div class="s" style="color:'+(s==='D'?'#27e0a0':s==='U'?'#9d8bff':'rgba(255,255,255,.22)')+'">'+(s==='D'?'↓':s==='U'?'↑':'·')+'</div>').join('');
  $('count').innerHTML=P.count.map(c=>'<div class="c">'+c+'</div>').join('');
  $('structure').innerHTML=sg.sections.map(([h,bars])=>'<div class="section"><div class="h">'+h+'</div><div class="bars">'+bars.split('|').map(b=>'<b>'+b+'</b>').join('')+'</div></div>').join('');
  $('tips').innerHTML=sg.tips;
  $('play').href='song-mode.html?song='+sg.play;
}
SONGS.forEach((sg,i)=>{const b=document.createElement('button');b.textContent=sg.title;b.onclick=()=>{cur=i;render();};$('picker').appendChild(b);});
const want=new URLSearchParams(location.search).get('s');if(want){const i=SONGS.findIndex(s=>s.id===want);if(i>=0)cur=i;}
render();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{}));}
</script>
</body>
</html>
