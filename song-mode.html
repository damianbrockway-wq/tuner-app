<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pluck · Songs</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#08060f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pluck">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<style>
  :root{--bg:#08060f;--txt:#eef1ff;--muted:#9aa0c8;--accent:#7c6cff;--good:#27e0a0;--warn:#ffc23d;--bad:#ff5d73}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{background:var(--bg);color:var(--txt);overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    padding:calc(env(safe-area-inset-top) + 8px) 14px calc(env(safe-area-inset-bottom) + 12px);
    -webkit-user-select:none;user-select:none}
  .aurora{position:fixed;inset:-30%;z-index:-2;filter:blur(70px);opacity:.5}
  .blob{position:absolute;border-radius:50%;mix-blend-mode:screen;animation:float 16s ease-in-out infinite}
  .b1{width:55vmax;height:55vmax;background:#5b4bff;left:-10%;top:-10%}
  .b2{width:45vmax;height:45vmax;background:#1f8bff;right:-10%;top:10%;animation-delay:-5s}
  .b3{width:50vmax;height:50vmax;background:#16d6a2;left:10%;bottom:-20%;animation-delay:-9s}
  @keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(6%,8%) scale(1.1)}66%{transform:translate(-6%,-4%) scale(.95)}}
  body::after{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(120% 80% at 50% 0%,transparent 40%,rgba(8,6,15,.85) 100%)}
  .wrap{width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;gap:10px;margin:auto 0}
  .top{width:100%;display:flex;align-items:center;justify-content:space-between}
  a.back,button.back{color:var(--muted);text-decoration:none;font-size:14px;font-weight:600;background:none;border:0;cursor:pointer;padding:0}
  .brand{font-size:15px;font-weight:700;letter-spacing:.5px}
  .brand b{background:linear-gradient(90deg,#9d8bff,#27e0a0);-webkit-background-clip:text;background-clip:text;color:transparent}
  .prog{font-size:13px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums}
  /* list */
  .songlist{width:100%;max-height:74vh;overflow-y:auto;padding-top:6px}
  .card{display:flex;flex-direction:column;gap:5px;width:100%;padding:13px 14px;border-radius:16px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);cursor:pointer;margin-bottom:10px;transition:.15s}
  .card:active{transform:scale(.99);background:rgba(255,255,255,.08)}
  .card .ct{font-size:17px;font-weight:800}
  .card .ca{font-size:12px;color:var(--muted)}
  .card .cc{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px;align-items:center}
  .card .cc span{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;background:rgba(124,108,255,.18);color:#c3bcff}
  .card .diff{margin-left:auto;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
  .d-easy{color:var(--good)}.d-med{color:var(--warn)}.d-hard{color:var(--bad)}
  /* player */
  .songhead{text-align:center;line-height:1.2}
  .songhead .t{font-size:16px;font-weight:800}
  .songhead .a{font-size:12px;color:var(--muted)}
  .section{font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--accent);height:15px}
  .name{font-size:clamp(42px,14vw,64px);font-weight:800;letter-spacing:-1px;line-height:1;text-shadow:0 0 30px currentColor;transition:color .2s}
  .nextc{font-size:13px;color:var(--muted);height:18px}
  .nextc b{color:var(--txt)}
  svg.diagram{display:block}
  .notes{display:flex;gap:7px;justify-content:center}
  .notes .n{min-width:34px;padding:5px 7px;border-radius:9px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:var(--muted);font-weight:800;font-size:13px;text-align:center;transition:.15s}
  .notes .n.lit{background:rgba(39,224,160,.18);border-color:var(--good);color:var(--good);box-shadow:0 0 12px rgba(39,224,160,.4)}
  .state{font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;height:16px;opacity:.85}
  .bar{width:190px;height:6px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--warn),var(--good));transition:width .1s}
  .chart{display:flex;gap:6px;overflow-x:auto;width:100%;padding:10px 2px 6px;scrollbar-width:none}
  .chart::-webkit-scrollbar{display:none}
  .cell{flex:0 0 auto;min-width:40px;padding:9px 8px;border-radius:11px;text-align:center;font-weight:800;font-size:15px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--muted);position:relative;transition:.2s}
  .cell .sec{position:absolute;top:-13px;left:0;right:0;font-size:8px;letter-spacing:1px;color:var(--accent);opacity:.8}
  .cell.cur{background:linear-gradient(180deg,#7c6cff,#5b8cff);color:#fff;border-color:transparent;transform:translateY(-2px);box-shadow:0 6px 16px rgba(124,108,255,.5)}
  .cell.next{border-color:var(--accent)}
  .cell.done{color:var(--good);border-color:rgba(39,224,160,.5);background:rgba(39,224,160,.1)}
  .row{display:flex;gap:10px;align-items:center}
  button.primary{padding:13px 22px;border:0;border-radius:15px;cursor:pointer;font-size:16px;font-weight:800;color:#fff;background:linear-gradient(90deg,#7c6cff,#5b8cff);box-shadow:0 10px 26px rgba(124,108,255,.5)}
  button.primary.live{background:linear-gradient(90deg,#ff5d73,#ff7a4d)}
  button.ghost{padding:12px 16px;border:1px solid rgba(255,255,255,.14);border-radius:15px;background:transparent;color:var(--muted);font-weight:700;font-size:14px;cursor:pointer}
  .hint{color:var(--muted);font-size:11px;text-align:center;line-height:1.5;max-width:340px}
  .flash{position:fixed;inset:0;z-index:5;pointer-events:none;opacity:0;background:radial-gradient(circle at 50% 42%,rgba(39,224,160,.5),transparent 60%)}
  .flash.go{animation:flash .7s ease-out}
  @keyframes flash{0%{opacity:0}18%{opacity:1}100%{opacity:0}}
  .pop{position:fixed;top:36%;left:50%;transform:translate(-50%,-50%);z-index:6;font-size:84px;opacity:0;pointer-events:none}
  .pop.go{animation:pop .8s ease-out}
  @keyframes pop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.4)}}

  .modeseg{display:flex;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:999px;padding:3px}
  .modeseg button{border:0;background:transparent;color:var(--muted);padding:6px 18px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer}
  .modeseg button.on{background:linear-gradient(90deg,#7c6cff,#5b8cff);color:#fff}
  .tempobar{display:flex;align-items:center;gap:10px;width:100%;max-width:330px;font-size:12px;color:var(--muted);font-weight:700}
  .tempobar input[type=range]{flex:1;accent-color:var(--accent)}
  .tempobar .bpm{min-width:60px;text-align:right;font-variant-numeric:tabular-nums;color:var(--txt)}
  .cin{display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap}
  .beatrow{display:flex;align-items:center;gap:10px;height:18px}
  .beatdot{width:13px;height:13px;border-radius:50%;background:rgba(255,255,255,.18)}
  .beatdot.on{animation:beat .22s ease-out}
  @keyframes beat{0%{transform:scale(1.9);background:var(--accent);box-shadow:0 0 16px var(--accent)}100%{transform:scale(1);background:rgba(255,255,255,.18)}}
  .count{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);z-index:6;font-size:120px;font-weight:800;color:#fff;text-shadow:0 0 40px var(--accent);display:none}
  .tmeter{position:relative;width:210px;height:12px;border-radius:6px;background:rgba(255,255,255,.08);margin:4px auto 0}
  .tmeter .tzone{position:absolute;left:42%;width:16%;top:0;bottom:0;background:rgba(39,224,160,.32);border-radius:3px}
  .tmeter>i{position:absolute;top:-3px;width:4px;height:18px;border-radius:2px;background:#fff;left:50%;transform:translateX(-50%);transition:left .1s,background .1s}
  .tmeter .tlbl{position:absolute;top:-15px;font-size:9px;color:var(--muted)}
  .tmeter .tl{left:0}.tmeter .tr{right:0}

  .ic{width:15px;height:15px;vertical-align:-2.5px}
  .brand svg{color:#9d8bff}

  .popok{display:flex;align-items:center;justify-content:center;width:110px;height:110px;border-radius:50%;background:radial-gradient(circle,rgba(39,224,160,.3),transparent 72%);color:var(--good);font-size:72px;font-weight:800;text-shadow:0 0 34px rgba(39,224,160,.9)}
</style>
</head>
<body>
<div class="aurora"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
<div class="flash" id="flash"></div>
<div class="pop" id="pop"><span class="popok">✓</span></div>
<div class="count" id="count"></div>

<div class="wrap">
  <!-- LIST VIEW -->
  <div id="listView" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:10px">
    <div class="top"><a class="back" href="index.html">← Pluck</a><div class="brand"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="18" r="3"/><path d="M12 18V4"/><path d="M12 4c4 1 6 3 6 7"/></svg> <b>SONGS</b></div><span style="width:48px"></span></div>
    <div class="hint">Pick a song. Chord-only arrangements — play the highlighted chord and it advances when you nail it.</div>
    <div class="songlist" id="songlist"></div>
  </div>

  <!-- PLAY VIEW -->
  <div id="playView" style="width:100%;display:none;flex-direction:column;align-items:center;gap:10px">
    <div class="top"><button class="back" id="toList">← Songs</button><div class="brand"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="18" r="3"/><path d="M12 18V4"/><path d="M12 4c4 1 6 3 6 7"/></svg> <b>SONG</b></div><div class="prog" id="prog">0 / 0</div></div>
    <div class="songhead"><div class="t" id="songtitle">—</div><div class="a" id="songartist"></div></div>
    <div class="modeseg" id="modeseg"><button data-mode="wait" class="on">Wait</button><button data-mode="tempo">Tempo</button></div>
    <div class="section" id="section"></div>
    <div class="name" id="name">—</div>
    <div id="diagram"></div>
    <div class="nextc" id="nextc"></div>
    <div class="notes" id="notes"></div>
    <div class="beatrow"><span class="beatdot" id="beatdot"></span><div class="state" id="state">tap Start</div><span id="verdict" style="font-size:11px;font-weight:800;letter-spacing:1px"></span><span id="strum" style="font-size:11px;font-weight:800;color:var(--good);opacity:0;transition:opacity .1s">● STRUM</span></div>
    <div id="timing" style="font-size:12px;font-weight:700;color:var(--muted);height:15px"></div>
    <div class="tmeter" id="tmeter" style="display:none"><div class="tlbl tl">early</div><div class="tzone"></div><i id="tneedle"></i><div class="tlbl tr">late</div></div>
    <div class="bar"><i id="conf"></i></div>
    <div class="chart" id="chart"></div>
    <div class="tempobar" id="tempobar" style="display:none;flex-wrap:wrap;justify-content:center"><span>Tempo</span><input type="range" id="bpm" min="60" max="160" value="90"><span class="bpm" id="bpmlbl">90 BPM</span><label class="cin"><input type="checkbox" id="cin" checked>count-in</label><label class="cin"><input type="checkbox" id="autotempo">Auto</label><span style="display:inline-flex;color:var(--muted)"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg></span><input type="range" id="metvol" min="0" max="100" value="70" style="width:64px"><button class="ghost" id="calBtn" style="padding:6px 12px;font-size:11px">Calibrate</button><span class="bpm" id="latlbl" style="min-width:56px">lat 0ms</span></div>
    <div class="row">
      <button class="primary" id="startBtn">Start</button>
      <button class="ghost" id="skipBtn">Skip →</button>
      <button class="ghost" id="restartBtn">↺</button>
    </div>
    <div class="hint" id="dbg" style="display:none"></div>
    <div class="hint" id="odbg" style="display:none"></div>
  </div>
</div>

<script>
/* ---------- chord library (uke g-C-E-A) ---------- */
const CHORDS={
  'C' :{frets:[0,0,0,3],fingers:[0,0,0,3],pcs:[0,4,7],    notes:['C','E','G']},
  'Am':{frets:[2,0,0,0],fingers:[2,0,0,0],pcs:[9,0,4],    notes:['A','C','E']},
  'F' :{frets:[2,0,1,0],fingers:[2,0,1,0],pcs:[5,9,0],    notes:['F','A','C']},
  'G' :{frets:[0,2,3,2],fingers:[0,1,3,2],pcs:[7,11,2],   notes:['G','B','D']},
  'Em':{frets:[0,4,3,2],fingers:[0,3,2,1],pcs:[4,7,11],   notes:['E','G','B']},
  'Dm':{frets:[2,2,1,0],fingers:[2,3,1,0],pcs:[2,5,9],    notes:['D','F','A']},
  'D' :{frets:[2,2,2,0],fingers:[1,2,3,0],pcs:[2,6,9],    notes:['D','F#','A']},
  'A' :{frets:[2,1,0,0],fingers:[2,1,0,0],pcs:[9,1,4],    notes:['A','C#','E']},
  'E' :{frets:[1,4,0,2],fingers:[1,4,0,2],pcs:[4,8,11],   notes:['E','G#','B']},
  'F#m':{frets:[2,1,2,0],fingers:[3,1,2,0],pcs:[1,6,9],   notes:['F#','A','C#']},
  'C7':{frets:[0,0,0,1],fingers:[0,0,0,1],pcs:[0,4,7,10], notes:['C','E','G','B♭']},
  'G7':{frets:[0,2,1,2],fingers:[0,2,1,3],pcs:[7,11,2,5], notes:['G','B','D','F']}
};
const POOL=Object.keys(CHORDS);
const CFG=(k,d)=>{const v=parseFloat(localStorage.getItem(k));return isNaN(v)?d:v;};
const CHORDCOS=CFG('pluckChordCos',0.5);
let ON={rise:0.0008,floor:0.0015,ratio:2.0,refract:0.18};
function loadOnsetCfg(){ON={rise:CFG('pluckOnRise',0.0008),floor:CFG('pluckOnFloor',0.0015),ratio:CFG('pluckOnRatio',2.0),refract:CFG('pluckOnRefract',0.18)};}
loadOnsetCfg();

/* ---------- songs (chord-only, simplified arrangements) ---------- */
const SONGS=[
 {title:'Time After Time',artist:'Cyndi Lauper · 1984',diff:'easy',
  sections:[{name:'Intro',chords:['C','G','Am','F']},{name:'Verse',chords:['C','G','Am','F','C','G','Am','F']},{name:'Chorus',chords:['C','G','Am','F','C','G','Am','F']}]},
 {title:'With or Without You',artist:'U2 · 1987',diff:'easy',
  sections:[{name:'Intro',chords:['C','G','Am','F']},{name:'Verse',chords:['C','G','Am','F','C','G','Am','F']},{name:'Chorus',chords:['C','G','Am','F','C','G','Am','F']}]},
 {title:'Stand By Me',artist:'Ben E. King · 1986 revival',diff:'easy',
  sections:[{name:'Intro',chords:['C','Am']},{name:'Verse',chords:['C','Am','F','G','C','Am','F','G']},{name:'Chorus',chords:['C','Am','F','G','C','Am','F','G']}]},
 {title:'Karma Chameleon',artist:'Culture Club · 1983',diff:'easy',
  sections:[{name:'Intro',chords:['C','G']},{name:'Verse',chords:['C','G','C','G','C','G','C','G']},{name:'Chorus',chords:['Am','F','C','G','Am','F','C','G']}]},
 {title:"Should I Stay or Should I Go",artist:'The Clash · 1982',diff:'med',
  sections:[{name:'Intro',chords:['D','G']},{name:'Verse',chords:['D','G','D','A','D','G','D','A']},{name:'Chorus',chords:['D','G','D','A','D','G','D','A']}]},
 {title:"Livin' on a Prayer",artist:'Bon Jovi · 1986 (chorus)',diff:'med',
  sections:[{name:'Intro',chords:['Em','C']},{name:'Verse',chords:['Em','C','D','G','Em','C','D','G']},{name:'Chorus',chords:['Em','C','D','Em','C','D']}]},
 {title:'Walking on Sunshine',artist:'Katrina & The Waves · 1985',diff:'hard',
  sections:[{name:'Intro',chords:['A','D']},{name:'Verse',chords:['A','D','E','A','D','E']},{name:'Chorus',chords:['A','D','E','A','D','E']}]},
 {title:'Take On Me',artist:'a-ha · 1985',diff:'hard',
  sections:[{name:'Intro',chords:['A','E']},{name:'Verse',chords:['A','E','F#m','D','A','E','F#m','D']},{name:'Chorus',chords:['A','E','F#m','D','A','E','F#m','D']}]},
 {title:'Every Breath You Take',artist:'The Police · 1983',diff:'hard',
  sections:[{name:'Intro',chords:['A','F#m']},{name:'Verse',chords:['A','F#m','D','E','A','F#m','D','E']},{name:'Chorus',chords:['A','F#m','D','E','A','F#m','D','E']}]},
 {title:"Don't Stop Believin'",artist:'Journey · 1981',diff:'easy',
  sections:[{name:'Intro',chords:['C','G']},{name:'Verse',chords:['C','G','Am','F','C','G','Am','F']},{name:'Chorus',chords:['C','G','Am','F','C','G','Am','F']}]},
 {title:'Wake Me Up Before You Go-Go',artist:'Wham! · 1984',diff:'easy',
  sections:[{name:'Intro',chords:['C','F']},{name:'Verse',chords:['C','F','G','C','F','G']},{name:'Chorus',chords:['C','F','G','C','F','G']}]},
 {title:'Watch Your Mouth',artist:'Josiah Queen · 2024',diff:'easy',
  sections:[{name:'Intro',chords:['C','G','Am','F']},{name:'Verse',chords:['C','Am','F','C','Am','F']},{name:'Chorus',chords:['C','G','Am','F','C','G','Am','F']}]},
 {title:'The Prodigal',artist:'Josiah Queen · 2024',diff:'easy',
  sections:[{name:'Intro',chords:['Am','F','C','G']},{name:'Verse',chords:['Am','F','C','G','Am','F','C','G']},{name:'Chorus',chords:['C','G','Am','F','C','G','Am','F']}]},
 {title:'God of Miracles',artist:'Josiah Queen · 2020',diff:'easy',
  sections:[{name:'Intro',chords:['C','G','Am','F']},{name:'Verse',chords:['C','G','Am','F','C','G','Am','F']},{name:'Chorus',chords:['C','G','Am','F','C','G','Am','F']}]}
];

const $=id=>document.getElementById(id);
let SONG=null, TL=[], idx=0, target='C';
let mode='wait', beatsPerChord=4, beatsPerBar=4, countInOn=true;
let clockOn=false, clockT0=0, secPerBeat=0.5, lastBeat=-1, inCountIn=false, metOscs=[], metGain=null;
let lastOnset=0, onsets=[], latencyOffset=0, envO=null, envPrev=0, slowEnvO=null, strumT=null;
let lastJudgedBeat=-1, beatStats={total:0,played:0,onTime:0};
let calibrating=false, calOnsets=[], calT0=0, calSPB=0.5;

/* ---------- list view ---------- */
function buildList(){
  const l=$('songlist');l.innerHTML='';
  SONGS.forEach((s,i)=>{
    const used=[...new Set(s.sections.flatMap(x=>x.chords))];
    const dcls=s.diff==='easy'?'d-easy':s.diff==='med'?'d-med':'d-hard';
    const dlabel=s.diff==='easy'?'Easy':s.diff==='med'?'Medium':'Tricky';
    const card=document.createElement('div');card.className='card';
    card.innerHTML='<div class="ct">'+s.title+'</div><div class="ca">'+s.artist+'</div>'+
      '<div class="cc">'+used.map(c=>'<span>'+c+'</span>').join('')+'<span class="diff '+dcls+'" style="background:none">'+dlabel+'</span></div>';
    card.onclick=()=>loadSong(i);
    l.appendChild(card);
  });
}
function loadSong(i){
  if(running)stopMic();
  SONG=SONGS[i];TL=[];
  SONG.sections.forEach(s=>s.chords.forEach((sym,j)=>TL.push({sym,section:s.name,first:j===0})));
  $('songtitle').textContent=SONG.title;$('songartist').textContent=SONG.artist+' · simplified chords';
  buildChart();setCell(0);refreshTarget();
  $('listView').style.display='none';$('playView').style.display='flex';
  $('tempobar').style.display=mode==='tempo'?'flex':'none';$('skipBtn').style.display=mode==='tempo'?'none':'';
  $('startBtn').textContent=mode==='tempo'?'Play':'Start';$('state').textContent='tap Start';
}
function showList(){ if(running)stopMic(); $('playView').style.display='none';$('listView').style.display='flex'; }

/* ---------- chart + chord display ---------- */
function buildChart(){
  const c=$('chart');c.innerHTML='';
  TL.forEach((cell,i)=>{const d=document.createElement('div');d.className='cell';d.dataset.i=i;d.textContent=cell.sym;
    if(cell.first){const s=document.createElement('div');s.className='sec';s.textContent=cell.section;d.appendChild(s);}c.appendChild(d);});
}
function diagram(ch){
  const W=160,H=190,ml=22,mr=22,top=32,bot=12,strings=4,nF=4;
  const xs=(W-ml-mr)/(strings-1),ys=(H-top-bot)/nF;let s=`<svg class="diagram" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  s+=`<rect x="${ml}" y="${top-4}" width="${(strings-1)*xs}" height="5" rx="2" fill="#cfd4ff"/>`;
  for(let f=1;f<=nF;f++){const y=top+f*ys;s+=`<line x1="${ml}" y1="${y}" x2="${ml+(strings-1)*xs}" y2="${y}" stroke="rgba(255,255,255,.18)" stroke-width="1.5"/>`;}
  for(let i=0;i<strings;i++){const x=ml+i*xs;s+=`<line x1="${x}" y1="${top}" x2="${x}" y2="${H-bot}" stroke="rgba(255,255,255,.28)" stroke-width="1.5"/>`;}
  for(let i=0;i<strings;i++){const x=ml+i*xs,fr=ch.frets[i],fg=ch.fingers[i];
    if(fr===0){s+=`<circle cx="${x}" cy="${top-15}" r="6" fill="none" stroke="var(--muted)" stroke-width="1.6"/>`;}
    else{const y=top+(fr-0.5)*ys;s+=`<circle cx="${x}" cy="${y}" r="11" fill="#7c6cff"/>`;if(fg>0)s+=`<text x="${x}" y="${y+4}" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">${fg}</text>`;}}
  return s+'</svg>';
}
function setCell(i){
  idx=i;const cell=TL[i],ch=CHORDS[cell.sym];
  $('section').textContent=cell.section;$('name').textContent=cell.sym;$('name').style.color='';
  $('diagram').innerHTML=diagram(ch);
  const nb=$('notes');nb.innerHTML='';
  ch.notes.forEach((nn,k)=>{const d=document.createElement('div');d.className='n';d.dataset.pc=ch.pcs[k];d.textContent=nn;nb.appendChild(d);});
  const nx=TL[i+1];$('nextc').innerHTML=nx?('next: <b>'+nx.sym+'</b>'):'last chord!';
  $('prog').textContent=(i+1)+' / '+TL.length;$('conf').style.width='0';
  [...$('chart').children].forEach((el,j)=>{el.classList.toggle('cur',j===i);el.classList.toggle('next',j===i+1);el.classList.toggle('done',j<i);});
  const cur=$('chart').children[i];if(cur)cur.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
}
function refreshTarget(){target=TL[idx].sym;}

/* ---------- audio + wake lock + recovery ---------- */
let audioCtx=null,analyser=null,micStream=null,running=false,rafId=null,wakeLock=null,watchTimer=null;
function ensureCtx(){if(!audioCtx){audioCtx=new (window.AudioContext||window.webkitAudioContext)();audioCtx.onstatechange=()=>{if(running&&audioCtx.state!=='running')audioCtx.resume().catch(()=>{});};}return audioCtx;}
async function keepAwake(){try{if('wakeLock' in navigator&&document.visibilityState==='visible'&&!wakeLock){wakeLock=await navigator.wakeLock.request('screen');wakeLock.addEventListener('release',()=>{wakeLock=null;});}}catch(e){}}
function releaseWake(){try{if(wakeLock){wakeLock.release();wakeLock=null;}}catch(e){}}
async function resumeAudio(){try{if(audioCtx&&audioCtx.state!=='running')await audioCtx.resume();}catch(e){}}
async function connectMic(){
  micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,autoGainControl:false,noiseSuppression:false}});
  const src=audioCtx.createMediaStreamSource(micStream);
  analyser=audioCtx.createAnalyser();analyser.fftSize=16384;analyser.smoothingTimeConstant=0;analyser.minDecibels=-95;analyser.maxDecibels=-10;src.connect(analyser);
  micStream.getAudioTracks().forEach(t=>{t.onended=()=>{if(running)connectMic().catch(()=>{});};});
}
function watchdog(){if(!running)return;resumeAudio();keepAwake();}
function chime(){
  const ctx=ensureCtx();if(ctx.state!=='running')ctx.resume();const now=ctx.currentTime;
  [523.25,659.25,783.99,1046.50].forEach((f,i)=>{const t=now+i*0.085;
    [[f,'sine',0.22],[f*2,'sine',0.05],[f,'triangle',0.05]].forEach(([freq,type,amp])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.value=freq;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(amp,t+0.012);g.gain.exponentialRampToValueAtTime(0.0006,t+0.6);
      o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+0.65);});});
  const t2=now+0.34,o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sine';o.frequency.setValueAtTime(1046.5,t2);o.frequency.exponentialRampToValueAtTime(1567.98,t2+0.45);
  g.gain.setValueAtTime(0,t2);g.gain.linearRampToValueAtTime(0.12,t2+0.03);g.gain.exponentialRampToValueAtTime(0.0005,t2+0.7);
  o.connect(g).connect(ctx.destination);o.start(t2);o.stop(t2+0.75);
}
async function toggleMic(){
  if(running)return stopMic();
  try{
    loadOnsetCfg();
    const ctx=ensureCtx();if(ctx.state!=='running')await ctx.resume();
    await connectMic();
    running=true;ema=null;matchHold=0;celebrateUntil=0;
    if(mode==='tempo'){setCell(0);}
    refreshTarget();
    $('startBtn').textContent='Stop';$('startBtn').classList.add('live');
    keepAwake();if(!watchTimer)watchTimer=setInterval(watchdog,1200);
    if(mode==='tempo'){startClock();$('state').textContent='count in…';}else{$('state').textContent='play the chord';}
    loop();
  }catch(e){$('state').textContent='mic blocked';}
}
function stopMic(){const _tm=$('tmeter');if(_tm)_tm.style.display='none';
  running=false;cancelAnimationFrame(rafId);
  if(watchTimer){clearInterval(watchTimer);watchTimer=null;}
  stopClock();releaseWake();if(micStream)micStream.getTracks().forEach(t=>t.stop());
  $('startBtn').textContent=mode==='tempo'?'Play':'Start';$('startBtn').classList.remove('live');$('state').textContent='paused';$('conf').style.width='0';
  document.querySelectorAll('.notes .n').forEach(n=>n.classList.remove('lit'));
}

/* ---------- tempo / metronome engine (Phase 1) ---------- */
function saveBpm(b){try{localStorage.setItem('pluckBpm',String(b));}catch(e){}}
function pulse(){const d=$('beatdot');if(!d)return;d.classList.remove('on');void d.offsetWidth;d.classList.add('on');}
function startClock(){
  const bpm=+$('bpm').value;countInOn=$('cin').checked;secPerBeat=60/bpm;
  const cb=countInOn?beatsPerBar:0, total=cb+TL.length*beatsPerChord;
  clockT0=audioCtx.currentTime+0.18;lastBeat=-1;inCountIn=countInOn;clockOn=true;
  lastJudgedBeat=-1;onsets=[];envO=null;envPrev=0;slowEnvO=null;beatStats={total:0,played:0,onTime:0};$('verdict').textContent='';$('timing').textContent='';
  metGain=audioCtx.createGain();metGain.gain.value=1;metGain.connect(audioCtx.destination);metOscs=[];
  for(let i=0;i<total;i++){
    const t=clockT0+i*secPerBeat, accent=(((i-cb)%beatsPerBar)+beatsPerBar)%beatsPerBar===0;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='square';o.frequency.value=accent?1600:1050;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime((accent?0.5:0.32)*CFG('pluckMetVol',0.7),t+0.004);g.gain.exponentialRampToValueAtTime(0.0006,t+0.06);
    o.connect(g).connect(metGain);o.start(t);o.stop(t+0.09);metOscs.push(o);
  }
}
function stopClock(){clockOn=false;inCountIn=false;metOscs.forEach(o=>{try{o.stop()}catch(e){}});metOscs=[];if(metGain){try{metGain.disconnect()}catch(e){}metGain=null;}const c=$('count');if(c)c.style.display='none';}
function adjustAutoTempo(){
  try{
    if(!$('autotempo')||!$('autotempo').checked||beatStats.total<=0)return;
    const rate=beatStats.onTime/beatStats.total;
    let bpm=+$('bpm').value, nb=bpm;
    if(rate>=0.85){nb=Math.min(160,Math.round(bpm*1.08));}
    else if(rate<0.6){nb=Math.max(60,Math.round(bpm*0.92));}
    if(nb!==bpm){
      $('bpm').value=nb;$('bpmlbl').textContent=nb+' BPM';
      saveBpm(nb);
      $('state').textContent='tempo → '+nb+' BPM';
    }else{saveBpm(bpm);}
  }catch(e){}
}
function finishTempo(){stopClock();adjustAutoTempo();songComplete();}
function tickTempo(){
  const elapsed=audioCtx.currentTime-clockT0, gBeat=Math.floor(elapsed/secPerBeat);
  if(gBeat===lastBeat||gBeat<0)return;
  lastBeat=gBeat;pulse();
  const cb=countInOn?beatsPerBar:0;
  if(gBeat<cb){inCountIn=true;$('count').textContent=(cb-gBeat);$('count').style.display='block';$('state').textContent='count in…';return;}
  inCountIn=false;$('count').style.display='none';
  const songBeat=gBeat-cb;
  if(songBeat%beatsPerChord===0){const ci=songBeat/beatsPerChord;if(ci>=TL.length){finishTempo();return;}if(ci!==idx){setCell(ci);refreshTarget();}}
}

/* ---------- onset detection + strum-timing grading (Phase 2) ---------- */
function detectOnset(rms, strumLike){
  const tNow=audioCtx.currentTime;
  if(envO===null){envO=rms;envPrev=rms;slowEnvO=rms;return;}
  envO=envO*0.6+rms*0.4;const rise=envO-envPrev;
  slowEnvO=slowEnvO*0.9+rms*0.1;
  const riseHit=rise>ON.rise&&envO>ON.floor, ratioHit=rms>ON.floor*2.5&&slowEnvO>1e-5&&rms/slowEnvO>ON.ratio;
  if((riseHit||ratioHit)&&tNow-lastOnset>ON.refract&&strumLike){
    lastOnset=tNow;onsets.push(tNow);if(onsets.length>60)onsets.shift();if(calibrating)calOnsets.push(tNow);
    const el=$('strum');if(el){el.style.opacity='1';clearTimeout(strumT);strumT=setTimeout(()=>{el.style.opacity='0';},140);}
  }
  envPrev=envO;
  const od=$('odbg');if(od)od.textContent='lvl '+rms.toFixed(3)+' · env '+envO.toFixed(3)+' · strums '+onsets.length;
}
function updateMeter(bd,v){const m=$('tmeter'),nd=$('tneedle');if(!m)return;m.style.display='block';
  if(bd===null){nd.style.left='50%';nd.style.background='var(--muted)';return;}
  const pos=Math.max(3,Math.min(97,50+(bd/0.18)*48));nd.style.left=pos+'%';
  nd.style.background=v==='on'?'var(--good)':v==='early'?'var(--warn)':'#6cb8ff';}
function showVerdict(v){
  const m={on:['ON TIME','var(--good)'],early:['EARLY','var(--warn)'],late:['LATE','#6cb8ff'],miss:['MISS','var(--muted)']};
  const x=m[v];$('verdict').textContent=x[0];$('verdict').style.color=x[1];
  $('timing').textContent=beatStats.total?(Math.round(100*beatStats.onTime/beatStats.total)+'% on time · '+beatStats.played+'/'+beatStats.total+' strummed'):'';
}
function judgeBeats(){
  const cb=countInOn?beatsPerBar:0, onW=0.075, lateW=0.18;
  while(true){
    const b=lastJudgedBeat+1, tBeat=clockT0+b*secPerBeat;
    if(audioCtx.currentTime < tBeat+lateW) break;
    lastJudgedBeat=b;
    if(b<cb) continue;
    let bd=1e9;for(const t of onsets){const d=t-latencyOffset-tBeat;if(Math.abs(d)<Math.abs(bd))bd=d;}
    let v;
    if(Math.abs(bd)<=lateW){beatStats.played++;if(Math.abs(bd)<=onW){v='on';beatStats.onTime++;}else v=bd<0?'early':'late';}
    else v='miss';
    beatStats.total++;showVerdict(v);updateMeter(v==='miss'?null:bd,v);
  }
}
async function calibrate(){
  if(running)stopMic();
  try{
    const ctx=ensureCtx();if(ctx.state!=='running')await ctx.resume();
    await connectMic();running=true;keepAwake();
    calibrating=true;calOnsets=[];onsets=[];envO=null;envPrev=0;slowEnvO=null;lastOnset=0;
    const bpm=+$('bpm').value, spb=60/bpm, N=8;
    calT0=ctx.currentTime+0.6;calSPB=spb;
    $('state').textContent='strum on each beat ×'+N;$('verdict').textContent='';
    metGain=ctx.createGain();metGain.connect(ctx.destination);metOscs=[];
    for(let i=0;i<N+1;i++){const t=calT0+i*spb;const o=ctx.createOscillator(),g=ctx.createGain();o.type='square';o.frequency.value=1500;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.15,t+0.004);g.gain.exponentialRampToValueAtTime(0.0006,t+0.06);o.connect(g).connect(metGain);o.start(t);o.stop(t+0.09);metOscs.push(o);}
    if(!watchTimer)watchTimer=setInterval(watchdog,1200);
    loop();
    setTimeout(finishCalibrate,(calT0-ctx.currentTime + N*spb + 0.4)*1000);
  }catch(e){$('state').textContent='mic blocked';}
}
function finishCalibrate(){
  calibrating=false;
  const ds=calOnsets.map(t=>{const b=Math.round((t-calT0)/calSPB);return t-(calT0+b*calSPB);}).filter(d=>Math.abs(d)<calSPB*0.5);
  if(ds.length>=3){ds.sort((a,b)=>a-b);latencyOffset=ds[Math.floor(ds.length/2)];try{localStorage.setItem('pluckLat',String(latencyOffset));}catch(e){}$('state').textContent='calibrated '+Math.round(latencyOffset*1000)+'ms';}
  else $('state').textContent='calibration: strum louder & retry';
  $('latlbl').textContent='lat '+Math.round(latencyOffset*1000)+'ms';
  stopMic();
}

/* ---------- detection: chromagram + template match ---------- */
let freqBuf=null,timeBuf=null,ema=null,matchHold=0,lastT=performance.now(),celebrateUntil=0;
function cosine(a,b){let d=0,na=0,nb=0;for(let i=0;i<12;i++){d+=a[i]*b[i];na+=a[i]*a[i];nb+=b[i]*b[i];}return(na&&nb)?d/Math.sqrt(na*nb):0;}
function template(name){const t=new Array(12).fill(0);CHORDS[name].pcs.forEach(p=>t[p]=1);return t;}
const TPL={};POOL.forEach(n=>TPL[n]=template(n));
function loop(){
  const now=performance.now();let dt=(now-lastT)/1000;lastT=now;if(dt>0.1)dt=0.1;
  if(mode==='tempo'&&clockOn)tickTempo();
  if(!running)return;
  const bins=analyser.frequencyBinCount;
  if(!freqBuf||freqBuf.length!==bins)freqBuf=new Float32Array(bins);
  if(!timeBuf||timeBuf.length!==analyser.fftSize)timeBuf=new Float32Array(analyser.fftSize);
  analyser.getFloatFrequencyData(freqBuf);analyser.getFloatTimeDomainData(timeBuf);
  let rms=0;for(let i=0;i<timeBuf.length;i++)rms+=timeBuf[i]*timeBuf[i];rms=Math.sqrt(rms/timeBuf.length);
  const binHz=audioCtx.sampleRate/analyser.fftSize;const chroma=new Array(12).fill(0);let lowBandE=0,clickBandE=0;
  for(let k=1;k<bins;k++){const f=k*binHz;if(f<120||f>2300)continue;const db=freqBuf[k];if(db<-82)continue;
    const lin=Math.pow(10,db/20);if(f>=130&&f<=700)lowBandE+=lin;else if(f>=1000&&f<=1850)clickBandE+=lin;const midi=69+12*Math.log2(f/440);const pc=((Math.round(midi)%12)+12)%12;chroma[pc]+=lin;}
  if(!ema)ema=chroma.slice();else for(let i=0;i<12;i++)ema[i]=ema[i]*0.5+chroma[i]*0.5;
  detectOnset(rms, lowBandE>clickBandE*0.7);
  if(mode==='tempo'&&clockOn&&!calibrating)judgeBeats();
  if(now<celebrateUntil){rafId=requestAnimationFrame(loop);return;}
  const maxc=Math.max(...ema);
  if(rms<0.006||maxc<=0){
    matchHold=Math.max(0,matchHold-dt);$('conf').style.width='0';
    document.querySelectorAll('.notes .n').forEach(n=>n.classList.remove('lit'));
    if(!inCountIn&&!calibrating){$('name').style.color='';if(mode==='wait')$('state').textContent='listening…';}
    $('dbg').textContent='lvl '+rms.toFixed(3)+' — quiet';
    rafId=requestAnimationFrame(loop);return;
  }
  document.querySelectorAll('.notes .n').forEach(n=>{const pc=+n.dataset.pc;n.classList.toggle('lit',ema[pc]>0.30*maxc);});
  const sTarget=cosine(ema,TPL[target]);
  let best=target,bestS=-1;for(const n of POOL){const sc=cosine(ema,TPL[n]);if(sc>bestS){bestS=sc;best=n;}}
  const tones=CHORDS[target].pcs;const present=tones.filter(pc=>ema[pc]>0.25*maxc).length;const needed=Math.max(2,tones.length-1);
  const good=sTarget>CHORDCOS && (best===target||sTarget>=bestS-0.07) && present>=needed;
  $('conf').style.width=Math.min(100,Math.round(sTarget*120))+'%';
  $('dbg').textContent='lvl '+rms.toFixed(3)+' · '+best+' '+Math.round(bestS*100)+'% · '+target+' '+Math.round(sTarget*100)+'% · '+present+'/'+tones.length;
  if(good){matchHold+=dt;if(!inCountIn&&!calibrating){$('name').style.color='var(--good)';$('state').textContent=mode==='wait'?'nice — hold it':'on chord ✓';}}
  else{matchHold=Math.max(0,matchHold-dt*0.5);if(!inCountIn&&!calibrating){$('name').style.color='';if(mode==='wait')$('state').textContent=(bestS>0.55&&best!==target)?('sounds like '+best):'keep strumming';}}
  if(mode==='wait'&&matchHold>0.3)advance();
  rafId=requestAnimationFrame(loop);
}
function advance(){
  chime();if(navigator.vibrate)navigator.vibrate([16,40,16]);
  [...$('chart').children][idx].classList.add('done');
  $('flash').classList.remove('go');void $('flash').offsetWidth;$('flash').classList.add('go');
  $('pop').classList.remove('go');void $('pop').offsetWidth;$('pop').classList.add('go');
  matchHold=0;celebrateUntil=performance.now()+800;
  if(idx+1>=TL.length){songComplete();return;}
  $('state').textContent='nice!';
  setTimeout(()=>{setCell(idx+1);refreshTarget();},800);
}
function songComplete(){
  try{const sd=JSON.parse(localStorage.getItem('pluckSongsDone')||'{}');sd[SONG.title]=true;localStorage.setItem('pluckSongsDone',JSON.stringify(sd));}catch(e){}
  $('state').textContent='you played it ✓';
  $('name').textContent='✓';$('name').style.color='var(--good)';
  running=false;cancelAnimationFrame(rafId);if(watchTimer){clearInterval(watchTimer);watchTimer=null;}stopClock();releaseWake();
  if(micStream)micStream.getTracks().forEach(t=>t.stop());
  $('startBtn').textContent=mode==='tempo'?'Play':'Start';$('startBtn').classList.remove('live');
  if(beatStats.total>0){const pct=Math.round(100*beatStats.onTime/beatStats.total);let best=0,nb=false;
    try{const o=JSON.parse(localStorage.getItem('pluckSongTime')||'{}');best=o[SONG.title]||0;if(pct>best){best=pct;nb=true;o[SONG.title]=pct;localStorage.setItem('pluckSongTime',JSON.stringify(o));}}catch(e){}
    $('state').innerHTML=pct+'% in time ✓'+(nb?' — new best!':' · best '+best+'%');}
}

/* ---------- wiring ---------- */
buildList();
(()=>{try{const sp=new URLSearchParams(location.search).get('song');if(sp){const i=SONGS.findIndex(x=>x.title.toLowerCase().includes(sp.toLowerCase()));if(i>=0)loadSong(i);}}catch(e){}})();
$('startBtn').addEventListener('click',toggleMic);
$('toList').addEventListener('click',showList);
$('skipBtn').addEventListener('click',()=>{matchHold=0;if(idx+1<TL.length){setCell(idx+1);refreshTarget();}else songComplete();});
$('restartBtn').addEventListener('click',()=>{[...$('chart').children].forEach(c=>c.classList.remove('done'));setCell(0);refreshTarget();if(mode==='tempo'&&running){stopClock();startClock();$('state').textContent='count in…';}else $('state').textContent=running?'play the chord':'tap Start';});
$('modeseg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;if(running)stopMic();mode=b.dataset.mode;[...$('modeseg').children].forEach(c=>c.classList.toggle('on',c===b));$('tempobar').style.display=mode==='tempo'?'flex':'none';$('skipBtn').style.display=mode==='tempo'?'none':'';$('startBtn').textContent=mode==='tempo'?'Play':'Start';setCell(0);refreshTarget();});
$('bpm').addEventListener('input',()=>{$('bpmlbl').textContent=$('bpm').value+' BPM';saveBpm(+$('bpm').value);});
(()=>{const mv=localStorage.getItem('pluckMetVol');if(mv!==null)$('metvol').value=Math.round(parseFloat(mv)*100);})();
$('metvol').addEventListener('input',()=>{try{localStorage.setItem('pluckMetVol',String(+$('metvol').value/100));}catch(e){}});
try{const sb=parseInt(localStorage.getItem('pluckBpm'),10);if(!isNaN(sb)&&sb>=60&&sb<=160){$('bpm').value=sb;$('bpmlbl').textContent=sb+' BPM';}}catch(e){}
try{const v=parseFloat(localStorage.getItem('pluckLat'));if(!isNaN(v))latencyOffset=v;}catch(e){}
$('latlbl').textContent='lat '+Math.round(latencyOffset*1000)+'ms';
$('calBtn').addEventListener('click',calibrate);
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&running){resumeAudio();keepAwake();}});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{}));}
</script>
