<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pluck · Diagnostics</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#08060f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pluck">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<style>
  :root{--bg:#08060f;--txt:#eef1ff;--muted:#9aa0c8;--accent:#7c6cff;--good:#27e0a0;--warn:#ffc23d;--bad:#ff5d73}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    padding:calc(env(safe-area-inset-top) + 10px) 14px calc(env(safe-area-inset-bottom) + 16px);-webkit-user-select:none;user-select:none}
  .wrap{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
  .top{display:flex;align-items:center;justify-content:space-between}
  a.back{color:var(--muted);text-decoration:none;font-size:14px;font-weight:600}
  .brand{font-size:15px;font-weight:700}.brand b{color:#9d8bff}
  .card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px}
  .big{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums}
  .lbl{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .meter{height:10px;border-radius:5px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:6px}
  .meter>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--good))}
  .dot{display:inline-block;width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.18);vertical-align:middle}
  .dot.on{background:var(--good);box-shadow:0 0 14px var(--good)}
  .chroma{display:flex;gap:3px;align-items:flex-end;height:54px;margin-top:8px}
  .chroma .b{flex:1;background:#3a3f66;border-radius:3px 3px 0 0;position:relative;min-height:2px}
  .chroma .b.lit{background:var(--good)}
  .chroma .b span{position:absolute;bottom:-15px;left:0;right:0;text-align:center;font-size:8px;color:var(--muted)}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  button{padding:11px 16px;border:0;border-radius:13px;font-size:14px;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(90deg,#7c6cff,#5b8cff)}
  button.ghost{background:transparent;border:1px solid rgba(255,255,255,.16);color:var(--muted)}
  button.live{background:linear-gradient(90deg,#ff5d73,#ff7a4d)}
  button.ghost.active{background:linear-gradient(90deg,#7c6cff,#5b8cff);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(124,108,255,.45)}
  .prompt{font-size:22px;font-weight:800;text-align:center;min-height:28px}
  table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
  th,td{text-align:left;padding:4px 6px;border-bottom:1px solid rgba(255,255,255,.08);font-variant-numeric:tabular-nums}
  th{color:var(--muted);font-size:10px;text-transform:uppercase}
  td.ok{color:var(--good)}td.no{color:var(--bad)}
  textarea{width:100%;height:150px;background:#11142a;color:var(--txt);border:1px solid rgba(255,255,255,.12);border-radius:10px;font-size:11px;font-family:ui-monospace,monospace;padding:8px;-webkit-user-select:text;user-select:text}
  .hint{font-size:11px;color:var(--muted);line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><a class="back" href="index.html">← Pluck</a><div class="brand">🔬 <b>DIAGNOSTICS</b></div><span style="width:40px"></span></div>

  <div class="card">
    <div class="row" style="justify-content:space-between;align-items:center">
      <div><div class="lbl">Mic level</div><div class="big" id="lvl">—</div></div>
      <div style="text-align:center"><div class="lbl">Onset</div><div class="big"><span class="dot" id="odot"></span></div><div class="lbl" id="ocount">0 strums</div></div>
      <div style="text-align:right"><div class="lbl">Best chord</div><div class="big" id="best">—</div><div class="lbl" id="bestpct"></div></div>
    </div>
    <div class="meter"><i id="lvlbar"></i></div>
    <div class="chroma" id="chroma"></div>
    <div style="height:14px"></div>
    <div class="hint" id="onsetdbg" style="margin-top:6px"></div>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between;align-items:center"><div class="lbl">How it's doing</div><button class="ghost" id="copyReport" style="padding:6px 12px;font-size:11px">Copy report</button></div>
    <textarea id="report" readonly style="margin-top:8px;height:170px"></textarea>
  </div>

  <div class="row">
    <button id="micBtn">Start mic</button>
    <button class="ghost" id="chordTest">Test chords</button>
    <button class="ghost" id="strumTest">Test strums</button>
    <button class="ghost" id="checkBtn">Check chord</button>
  </div>

  <div class="prompt" id="prompt"></div>
  <div id="chorddiagram" style="text-align:center"></div>
  <div class="row" id="testBtns" style="display:none;justify-content:center;margin-top:8px"><button id="captureBtn">● Capture</button><button class="ghost" id="skipChordBtn">Skip</button></div>
  <div class="row" id="checkChips" style="display:none;flex-wrap:wrap;justify-content:center;margin-top:8px"></div>
  <div class="row" id="csBtns" style="display:none;justify-content:center;margin-top:8px"><button id="csNext">Next string →</button></div>

  <div class="card" id="resultsCard" style="display:none">
    <div class="lbl">Results</div>
    <div id="results"></div>
    <div class="row" style="margin-top:10px">
      <button id="saveBtn">Save tuned settings</button>
      <button class="ghost" id="copyBtn">Select summary</button>
    </div>
    <div style="height:8px"></div>
    <textarea id="summary" readonly></textarea>
    <div class="hint" id="saved"></div>
  </div>
  <div class="hint">Tip: tap <b>Test chords</b> and play each chord it asks for, then <b>Test strums</b> and strum 10 times. Then <b>Save tuned settings</b> — Chord Coach and Song Mode will use them. Or paste the summary to share.</div>
</div>

<script>
const CHORDS={
  'C' :{pcs:[0,4,7],   frets:[0,0,0,3],fingers:[0,0,0,3]},
  'Am':{pcs:[9,0,4],   frets:[2,0,0,0],fingers:[2,0,0,0]},
  'F' :{pcs:[5,9,0],   frets:[2,0,1,0],fingers:[2,0,1,0]},
  'G' :{pcs:[7,11,2],  frets:[0,2,3,2],fingers:[0,1,3,2]},
  'C7':{pcs:[0,4,7,10],frets:[0,0,0,1],fingers:[0,0,0,1]},
  'G7':{pcs:[7,11,2,5],frets:[0,2,1,2],fingers:[0,2,1,3]},
  'Dm':{pcs:[2,5,9],   frets:[2,2,1,0],fingers:[2,3,1,0]},
  'Em':{pcs:[4,7,11],  frets:[0,4,3,2],fingers:[0,3,2,1]},
  'D' :{pcs:[2,6,9],   frets:[2,2,2,0],fingers:[1,2,3,0]},
  'A' :{pcs:[9,1,4],   frets:[2,1,0,0],fingers:[2,1,0,0]},
  'E' :{pcs:[4,8,11],  frets:[1,4,0,2],fingers:[1,4,0,2]},
  'F#m':{pcs:[1,6,9],  frets:[2,1,2,0],fingers:[3,1,2,0]}};
const POOL=Object.keys(CHORDS);
const TPL={};POOL.forEach(n=>{const t=new Array(12).fill(0);CHORDS[n].pcs.forEach(p=>t[p]=1);TPL[n]=t;});
const TESTSEQ=['C','Am','F','G','C7','G7','Dm','Em','D','A','E','F#m'];
const NOTE=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const $=id=>document.getElementById(id);

let audioCtx=null,analyser=null,micStream=null,running=false,rafId=null;
let freqBuf=null,timeBuf=null,ema=null;
let lastOnset=0,envO=null,envPrev=0,onsetCount=0,strumT=null;
const ONSETRISE=0.0009, ONSETMIN=0.0015;
let state='idle';
// capture buffers
let cap=null;            // chord-test accumulator
let chordResults=[];     // [{name,n,avgCos,argmaxPct,avgNotes}]
let testIdx=0,phase='',phaseT=0;
let strumStats=null;

function cosine(a,b){let d=0,x=0,y=0;for(let i=0;i<12;i++){d+=a[i]*b[i];x+=a[i]*a[i];y+=b[i]*b[i];}return(x&&y)?d/Math.sqrt(x*y):0;}
let lastDiagChord=null;
let sawSignal=false;
let csName='',csChord=null,csStr=0,csRang=[false,false,false,false],csLastStr=-1;
function diagram(ch,hi){
  const W=150,H=178,ml=22,mr=22,top=30,bot=12,strings=4,nF=4;
  const xs=(W-ml-mr)/(strings-1),ys=(H-top-bot)/nF;let s=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  if(hi!=null){const hx=ml+hi*xs;s+=`<rect x="${hx-9}" y="${top-2}" width="18" height="${H-bot-top}" rx="7" fill="rgba(124,108,255,.3)"/>`;}
  s+=`<rect x="${ml}" y="${top-4}" width="${(strings-1)*xs}" height="5" rx="2" fill="#cfd4ff"/>`;
  for(let f=1;f<=nF;f++){const y=top+f*ys;s+=`<line x1="${ml}" y1="${y}" x2="${ml+(strings-1)*xs}" y2="${y}" stroke="rgba(255,255,255,.18)" stroke-width="1.5"/>`;}
  for(let i=0;i<strings;i++){const x=ml+i*xs;s+=`<line x1="${x}" y1="${top}" x2="${x}" y2="${H-bot}" stroke="rgba(255,255,255,.28)" stroke-width="1.5"/>`;}
  const labels=['g','C','E','A'];
  for(let i=0;i<strings;i++){const x=ml+i*xs,fr=ch.frets[i],fg=ch.fingers[i];
    s+=`<text x="${x}" y="${H-1}" text-anchor="middle" font-size="9" fill="#9aa0c8">${labels[i]}</text>`;
    if(fr===0){s+=`<circle cx="${x}" cy="${top-14}" r="6" fill="none" stroke="#9aa0c8" stroke-width="1.6"/>`;}
    else{const y=top+(fr-0.5)*ys;s+=`<circle cx="${x}" cy="${y}" r="11" fill="#7c6cff"/>`;if(fg>0)s+=`<text x="${x}" y="${y+4}" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">${fg}</text>`;}}
  return s+'</svg>';
}

// monophonic NSDF pitch detector (same as the tuner) — used for the one-string check
function pitchDetect(buf,rate){
  const n=buf.length;let rms=0;for(let i=0;i<n;i++)rms+=buf[i]*buf[i];rms=Math.sqrt(rms/n);
  if(rms<0.006)return null;
  const minLag=Math.floor(rate/1300),maxLag=Math.floor(rate/70),nsdf=new Float32Array(maxLag+1);
  for(let tau=minLag;tau<=maxLag;tau++){let ac=0,m=0;for(let j=0;j+tau<n;j++){ac+=buf[j]*buf[j+tau];m+=buf[j]*buf[j]+buf[j+tau]*buf[j+tau];}nsdf[tau]=m>0?2*ac/m:0;}
  let tau=minLag;while(tau<maxLag&&nsdf[tau]>0)tau++;
  let peaks=[],mx=0;while(tau<maxLag){if(nsdf[tau]>0){let pt=tau,pv=nsdf[tau];while(tau<maxLag&&nsdf[tau]>0){if(nsdf[tau]>pv){pv=nsdf[tau];pt=tau;}tau++;}peaks.push([pt,pv]);if(pv>mx)mx=pv;}else tau++;}
  if(!peaks.length||mx<0.5)return null;const th=mx*0.9;let pt=-1;for(const p of peaks){if(p[1]>=th){pt=p[0];break;}}if(pt<1)return null;
  const a=nsdf[pt-1],bb=nsdf[pt],cc=nsdf[pt+1],sh=(a-cc)/(2*(a-2*bb+cc)),period=pt+(isFinite(sh)?sh:0),f=rate/period;
  return (f>60&&f<1300)?f:null;
}
const STR_LBL=['g','C','E','A'], STR_BASE=[67,60,64,69];
function showCheckPicker(){if(!running)return;setActive('checkBtn');state='checkpick';$('resultsCard').style.display='none';$('chorddiagram').innerHTML='';$('testBtns').style.display='none';
  const c=$('checkChips');c.innerHTML='';POOL.forEach(n=>{const b=document.createElement('button');b.className='ghost';b.style.padding='8px 12px';b.textContent=n;b.onclick=()=>startCheck(n);c.appendChild(b);});
  c.style.display='flex';$('prompt').textContent='Pick a chord, then pluck each string one at a time.';}
function startCheck(name){csName=name;csChord=CHORDS[name];csStr=0;csRang=[false,false,false,false];csLastStr=-1;state='chordcheck';$('checkChips').style.display='none';$('csBtns').style.display='flex';$('resultsCard').style.display='none';}
function finishCheck(){
  setActive('');state='live';$('csBtns').style.display='none';$('chorddiagram').innerHTML='';csLastStr=-1;$('prompt').textContent='String check done';
  let html='<div class="lbl">'+csName+' — string-by-string</div><table><tr><th>string</th><th>fret</th><th></th></tr>';const tips=[];
  for(let i=0;i<4;i++){const ok=csRang[i],fr=csChord.frets[i];
    html+='<tr><td>'+STR_LBL[i]+'</td><td>'+(fr?fr:'open')+'</td><td class="'+(ok?'ok':'no')+'">'+(ok?'✓ rings':'✗ muted')+'</td></tr>';
    if(!ok&&fr)tips.push('The <b>'+STR_LBL[i]+'</b> string (fret '+fr+') isn\'t ringing — that finger may be lying flat (use the very tip), not pressing just behind the fret, or it\'s brushing this string. Arch the knuckle.');
    else if(!ok)tips.push('The open <b>'+STR_LBL[i]+'</b> string isn\'t ringing — another finger is probably touching it. Keep fingers arched on their tips.');}
  html+='</table>'+(tips.length?'<div class="hint" style="margin-top:8px">'+tips.join('<br><br>')+'</div>':'<div class="hint" style="margin-top:8px;color:var(--good)">All four strings rang — clean chord! 🎉</div>');
  $('results').innerHTML=html;$('resultsCard').style.display='block';
  try{localStorage.setItem('pluckRepCheck',JSON.stringify({date:new Date().toLocaleString(),chord:csName,rang:csRang.slice()}));}catch(e){}
  renderReport();
}


// build chroma bars
const cbars=[];
NOTE.forEach(n=>{const b=document.createElement('div');b.className='b';b.innerHTML='<span>'+n+'</span>';$('chroma').appendChild(b);cbars.push(b);});

async function toggleMic(){
  if(running){stop();return;}
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state!=='running')await audioCtx.resume();
    micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,autoGainControl:false,noiseSuppression:false}});
    const src=audioCtx.createMediaStreamSource(micStream);
    analyser=audioCtx.createAnalyser();analyser.fftSize=16384;analyser.smoothingTimeConstant=0;analyser.minDecibels=-95;analyser.maxDecibels=-10;src.connect(analyser);
    running=true;state='live';envO=null;ema=null;onsetCount=0;sawSignal=false;renderReport();
    $('micBtn').textContent='Stop mic';$('micBtn').classList.add('live');
    loop();
  }catch(e){$('prompt').textContent='mic blocked';}
}
function stop(){setActive('');running=false;cancelAnimationFrame(rafId);if(micStream)micStream.getTracks().forEach(t=>t.stop());$('micBtn').textContent='Start mic';$('micBtn').classList.remove('live');state='idle';}

function analyze(){
  const bins=analyser.frequencyBinCount;
  if(!freqBuf||freqBuf.length!==bins)freqBuf=new Float32Array(bins);
  if(!timeBuf||timeBuf.length!==analyser.fftSize)timeBuf=new Float32Array(analyser.fftSize);
  analyser.getFloatFrequencyData(freqBuf);analyser.getFloatTimeDomainData(timeBuf);
  let rms=0;for(let i=0;i<timeBuf.length;i++)rms+=timeBuf[i]*timeBuf[i];rms=Math.sqrt(rms/timeBuf.length);
  const binHz=audioCtx.sampleRate/analyser.fftSize;const chroma=new Array(12).fill(0);
  for(let k=1;k<bins;k++){const f=k*binHz;if(f<120||f>2300)continue;const db=freqBuf[k];if(db<-82)continue;
    const lin=Math.pow(10,db/20);const pc=((Math.round(69+12*Math.log2(f/440))%12)+12)%12;chroma[pc]+=lin;}
  if(!ema)ema=chroma.slice();else for(let i=0;i<12;i++)ema[i]=ema[i]*0.5+chroma[i]*0.5;
  // onset = sharp positive rise of a smoothed envelope (catches attacks during sustain)
  if(envO===null){envO=rms;envPrev=rms;}
  envO=envO*0.6+rms*0.4;
  const rise=envO-envPrev;let onset=false;
  if(rise>ONSETRISE&&envO>ONSETMIN&&audioCtx.currentTime-lastOnset>0.18){onset=true;lastOnset=audioCtx.currentTime;onsetCount++;}
  envPrev=envO;
  return {rms,rise,env:envO,chroma:ema,onset};
}

function loop(){
  const a=analyze();
  const maxc=Math.max(...a.chroma,1e-9);
  // meters
  $('lvl').textContent=a.rms.toFixed(3);$('lvlbar').style.width=Math.min(100,a.rms*400)+'%';if(a.rms>0.02)sawSignal=true;
  cbars.forEach((b,i)=>{b.style.height=Math.max(2,a.chroma[i]/maxc*52)+'px';b.classList.toggle('lit',a.chroma[i]>0.45*maxc);});
  let best='—',bestS=0;for(const n of POOL){const s=cosine(a.chroma,TPL[n]);if(s>bestS){bestS=s;best=n;}}
  $('best').textContent=a.rms<0.01?'—':best;$('bestpct').textContent=a.rms<0.01?'':Math.round(bestS*100)+'%';
  if(a.onset){$('odot').classList.add('on');clearTimeout(strumT);strumT=setTimeout(()=>$('odot').classList.remove('on'),130);}
  $('ocount').textContent=onsetCount+' strums';
  $('onsetdbg').textContent='rms '+a.rms.toFixed(3)+' · env '+a.env.toFixed(3)+' · rise '+a.rise.toFixed(4);

  // chord test state machine
  if(state==='chordtest'){
    if(TESTSEQ[testIdx]!==lastDiagChord){lastDiagChord=TESTSEQ[testIdx];$('chorddiagram').innerHTML=diagram(CHORDS[TESTSEQ[testIdx]]);}
    const tgt=TESTSEQ[testIdx];
    if(phase==='await'){
      $('prompt').textContent='Play & hold '+tgt+' — tap ● Capture';
    } else if(phase==='capturing'){
      $('prompt').textContent='● recording '+tgt+'… keep holding';
      if(a.rms>0.008){const cs=cosine(a.chroma,TPL[tgt]);
        const present=CHORDS[tgt].pcs.filter(pc=>a.chroma[pc]>0.25*maxc).length/CHORDS[tgt].pcs.length;
        cap.n++;cap.cos+=cs;cap.arg+=(best===tgt?1:0);cap.notes+=present;}
      if(performance.now()-phaseT>2500){
        const r=cap.n>3?{name:tgt,n:cap.n,avgCos:cap.cos/cap.n,argmaxPct:Math.round(100*cap.arg/cap.n),avgNotes:cap.notes/cap.n}
                       :{name:tgt,n:cap.n,avgCos:0,argmaxPct:0,avgNotes:0,nosig:true};
        chordResults.push(r);phase='review';
        $('prompt').textContent = r.nosig ? (tgt+': didn\'t hear it — tap ↻ Retry') : (tgt+': heard '+Math.round(r.avgCos*100)+'%  ('+r.argmaxPct+'% match)');
        $('captureBtn').textContent = (testIdx>=TESTSEQ.length-1)?'Finish ✓':'Next →';
        $('skipChordBtn').textContent='↻ Retry';
      }
    }
  } else if(state==='chordcheck'){
    const i=csStr;
    if(csLastStr!==i){csLastStr=i;$('chorddiagram').innerHTML=diagram(csChord,i);}
    const expPc=((STR_BASE[i]+csChord.frets[i])%12+12)%12, expName=NOTE[expPc];
    const f=pitchDetect(timeBuf,audioCtx.sampleRate);
    let live;
    if(f){const pc=((Math.round(69+12*Math.log2(f/440))%12)+12)%12;if(pc===expPc)csRang[i]=true;
      live=csRang[i]?'✓ ringing!':('hearing '+NOTE[pc]+' · need '+expName);}
    else live=csRang[i]?'✓ ringing!':'(no sound — pluck it / it may be muted)';
    $('prompt').innerHTML='Pluck the <b>'+STR_LBL[i]+'</b> string'+(csChord.frets[i]?' (fret '+csChord.frets[i]+')':' (open)')+'<br><span style="font-size:15px;color:var(--muted)">'+live+'</span>';
    $('csNext').textContent=(i>=3)?'See result ✓':'Next string →';
  } else if(state==='strumtest'){
    const now=performance.now();
    $('prompt').innerHTML='Strum now! &nbsp;<b>'+onsetCount+'</b> detected &nbsp;·&nbsp; level '+a.rms.toFixed(3);
    strumStats.peak=Math.max(strumStats.peak,a.rms);
    if(now-strumStats.t0>12000){finishStrumTest();}
  }
  rafId=requestAnimationFrame(loop);
}

function setActive(which){['chordTest','strumTest','checkBtn'].forEach(id=>{const b=$(id);if(b)b.classList.toggle('active',id===which);});}
function startChordTest(){if(!running)return;setActive('chordTest');$('checkChips').style.display='none';$('csBtns').style.display='none';state='chordtest';testIdx=0;phase='await';lastDiagChord=null;chordResults=[];$('resultsCard').style.display='none';$('testBtns').style.display='flex';$('captureBtn').textContent='● Capture';$('skipChordBtn').textContent='Skip';}
function finishChordTest(){
  setActive('');state='live';$('prompt').textContent='Chord test done';$('chorddiagram').innerHTML='';lastDiagChord=null;$('testBtns').style.display='none';
  // recommend cosine threshold
  const good=chordResults.filter(r=>!r.nosig&&r.argmaxPct>=70&&r.avgCos>=0.55);
  let rec= good.length? Math.max(0.45, Math.min(...good.map(r=>r.avgCos))*0.8) : 0.5;
  rec=Math.round(rec*100)/100;
  window._recCos=rec;
  let html='<table><tr><th>chord</th><th>score</th><th>argmax</th><th>notes</th><th></th></tr>';
  let txt='CHORD TEST (avg over held chord)\n';
  chordResults.forEach(r=>{
    const ok=!r.nosig&&r.argmaxPct>=70&&r.avgCos>=0.55;
    html+='<tr><td>'+r.name+'</td><td>'+(r.nosig?'no signal':r.avgCos.toFixed(2))+'</td><td>'+(r.nosig?'-':r.argmaxPct+'%')+'</td><td>'+(r.nosig?'-':Math.round(r.avgNotes*100)+'%')+'</td><td class="'+(ok?'ok':'no')+'">'+(ok?'✓':'✗')+'</td></tr>';
    txt+='  '+r.name.padEnd(4)+' cos '+(r.nosig?'NO SIGNAL':r.avgCos.toFixed(2))+'  argmax '+(r.nosig?'-':r.argmaxPct+'%')+'  notes '+(r.nosig?'-':Math.round(r.avgNotes*100)+'%')+(ok?'  OK':'  CHECK')+'\n';
  });
  html+='</table><div class="hint" style="margin-top:8px">Recommended chord threshold: <b>'+rec+'</b></div>';
  txt+='Recommended chord cosine threshold: '+rec+'\n';
  $('results').innerHTML=html;$('summary').value=($('summary').value? $('summary').value+'\n':'')+txt;$('resultsCard').style.display='block';
  try{localStorage.setItem('pluckRepChord',JSON.stringify({date:new Date().toLocaleString(),chords:chordResults.map(r=>({n:r.name,cos:r.nosig?null:+r.avgCos.toFixed(2),arg:r.argmaxPct,notes:Math.round(r.avgNotes*100),ok:!r.nosig&&r.argmaxPct>=70&&r.avgCos>=0.55,nosig:!!r.nosig}))}));}catch(e){}
  renderReport();
}

function startStrumTest(){if(!running)return;setActive('strumTest');$('checkChips').style.display='none';$('csBtns').style.display='none';$('chorddiagram').innerHTML='';lastDiagChord=null;state='strumtest';onsetCount=0;envO=null;envPrev=0;lastOnset=0;strumStats={t0:performance.now(),startCount:0,peak:0};$('resultsCard').style.display='none';}
function finishStrumTest(){
  setActive('');state='live';$('prompt').textContent='Strum test done';
  const n=onsetCount;
  let verdict, recRise=0.0009, recMin=0.0015;
  if(n<8){verdict='under-detecting → more sensitive';recRise=0.0006;recMin=0.0010;}
  else if(n>14){verdict='over-detecting → less sensitive';recRise=0.0018;recMin=0.003;}
  else {verdict='good';}
  window._recRise=recRise;window._recMin=recMin;
  const txt='STRUM TEST\n  detected '+n+' onsets (you strummed ~10)\n  peak rms '+strumStats.peak.toFixed(3)+'\n  verdict: '+verdict+'\n  recommended onset rise '+recRise+', min '+recMin+'\n';
  $('results').innerHTML='<table><tr><th>detected</th><th>peak rms</th><th>verdict</th></tr><tr><td>'+n+'</td><td>'+strumStats.peak.toFixed(3)+'</td><td>'+verdict+'</td></tr></table><div class="hint" style="margin-top:8px">Recommended onset rise <b>'+recRise+'</b>, min <b>'+recMin+'</b></div>';
  try{localStorage.setItem('pluckRepStrum',JSON.stringify({date:new Date().toLocaleString(),n:n,peak:+strumStats.peak.toFixed(3),verdict:verdict}));}catch(e){}
  renderReport();
  $('summary').value=($('summary').value? $('summary').value+'\n':'')+txt;$('resultsCard').style.display='block';
}

function buildReport(){
  let t='PLUCK — DETECTION REPORT\n('+new Date().toLocaleString()+')\n';
  t+='\nMic signal seen this session: '+(sawSignal?'YES':'no — tap Start mic and play')+'\n';
  const cos=localStorage.getItem('pluckChordCos'),rise=localStorage.getItem('pluckOnsetRise'),min=localStorage.getItem('pluckOnsetMin'),lat=localStorage.getItem('pluckLat');
  t+='\nSaved settings:\n  chord threshold: '+(cos||'(default 0.5)')+'\n  onset rise/min:  '+(rise||'(0.003)')+' / '+(min||'(0.006)')+'\n  latency:         '+(lat!=null&&lat!==''?Math.round(parseFloat(lat)*1000)+'ms':'(not set)')+'\n';
  try{const st=JSON.parse(localStorage.getItem('pluckRepStrum')||'null');if(st)t+='\nLast strum test ('+st.date+'):\n  detected '+st.n+' of ~10  ·  '+st.verdict+'\n';}catch(e){}
  try{const ct=JSON.parse(localStorage.getItem('pluckRepChord')||'null');if(ct){t+='\nLast chord test ('+ct.date+'):\n';ct.chords.forEach(c=>{t+='  '+String(c.n).padEnd(4)+(c.nosig?' no signal':(' cos '+c.cos+'  argmax '+c.arg+'%  notes '+c.notes+'%'))+(c.ok?'  OK':'  CHECK')+'\n';});const f=ct.chords.filter(c=>!c.ok).map(c=>c.n);t+='  needs work: '+(f.length?f.join(', '):'none ✓')+'\n';}}catch(e){}
  try{const ch=JSON.parse(localStorage.getItem('pluckRepCheck')||'null');if(ch){t+='\nLast string check ('+ch.date+') — '+ch.chord+':\n';['g','C','E','A'].forEach((L,i)=>{t+='  '+L+': '+(ch.rang[i]?'rings':'MUTED')+'\n';});}}catch(e){}
  if(!localStorage.getItem('pluckRepStrum')&&!localStorage.getItem('pluckRepChord')&&!localStorage.getItem('pluckRepCheck'))t+='\nNo tests run yet — tap Test chords, Test strums, or Check chord.\n';
  return t;
}
function renderReport(){const el=$('report');if(el)el.value=buildReport();}
function save(){
  try{
    if(window._recCos!=null)localStorage.setItem('pluckChordCos',String(window._recCos));
    if(window._recRise!=null)localStorage.setItem('pluckOnsetRise',String(window._recRise));
    if(window._recMin!=null)localStorage.setItem('pluckOnsetMin',String(window._recMin));
    $('saved').textContent='Saved ✓ — Chord Coach & Song Mode will use these. (cos '+(localStorage.getItem('pluckChordCos')||'-')+', onset '+(localStorage.getItem('pluckOnsetRise')||'-')+'/'+(localStorage.getItem('pluckOnsetMin')||'-')+')';renderReport();
  }catch(e){$('saved').textContent='could not save';}
}

$('captureBtn').addEventListener('click',()=>{
  if(state!=='chordtest')return;
  if(phase==='await'){phase='capturing';cap={n:0,cos:0,arg:0,notes:0};phaseT=performance.now();$('captureBtn').textContent='● Recording…';}
  else if(phase==='review'){testIdx++;if(testIdx>=TESTSEQ.length){finishChordTest();return;}phase='await';$('captureBtn').textContent='● Capture';$('skipChordBtn').textContent='Skip';}
});
$('skipChordBtn').addEventListener('click',()=>{
  if(state!=='chordtest')return;
  if(phase==='review'){chordResults.pop();phase='await';$('captureBtn').textContent='● Capture';$('skipChordBtn').textContent='Skip';}
  else if(phase==='await'){chordResults.push({name:TESTSEQ[testIdx],n:0,avgCos:0,argmaxPct:0,avgNotes:0,nosig:true});testIdx++;if(testIdx>=TESTSEQ.length){finishChordTest();return;}phase='await';$('captureBtn').textContent='● Capture';}
});
$('micBtn').addEventListener('click',toggleMic);
$('chordTest').addEventListener('click',startChordTest);
$('strumTest').addEventListener('click',startStrumTest);
$('checkBtn').addEventListener('click',showCheckPicker);
$('csNext').addEventListener('click',()=>{if(state!=='chordcheck')return;csStr++;if(csStr>=4)finishCheck();});
$('saveBtn').addEventListener('click',save);
$('copyReport').addEventListener('click',()=>{const t=buildReport();if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>{$('copyReport').textContent='Copied ✓';setTimeout(()=>$('copyReport').textContent='Copy report',1500);}).catch(()=>{$('report').focus();$('report').select();});}else{$('report').focus();$('report').select();try{document.execCommand('copy');}catch(e){}$('copyReport').textContent='Copied ✓';setTimeout(()=>$('copyReport').textContent='Copy report',1500);}});
renderReport();
$('copyBtn').addEventListener('click',()=>{$('summary').focus();$('summary').select();});
</script>
</body>
