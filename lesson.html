const CFG=(k,d)=>{const v=parseFloat(localStorage.getItem(k));return isNaN(v)?d:v;};
const CHORDCOS=CFG('pluckChordCos',0.5);
let ON={rise:0.0008,floor:0.0015,ratio:2.0,refract:0.18};

loadOnsetCfg();
const Skill={load(){try{return JSON.parse(localStorage.getItem(GTR?'pluckGSkill':'pluckSkill')||'{}');}catch(e){return{};}},save(m){try{localStorage.setItem(GTR?'pluckGSkill':'pluckSkill',JSON.stringify(m));}catch(e){}},
 recordChord(n){const m=this.load();m.chords=m.chords||{};const c=m.chords[n]||{passes:0};c.passes++;c.lastSeen=Date.now();m.chords[n]=c;this.save(m);},
 recordChange(a,b){if(!a||!b||a===b)return;const m=this.load();m.changes=m.changes||{};const k=[a,b].sort().join('>');const c=m.changes[k]||{bestCPM:0,attempts:0};c.attempts++;c.lastSeen=Date.now();m.changes[k]=c;this.save(m);}};
const $=id=>document.getElementById(id);

const LESSONS={
 1:[
  {type:'info', step:'Lesson 1', title:'Play your first song', body:"In a few minutes you'll tune up, learn two chords — C and Am — and play a real little song. Go at your own pace; nothing is timed."},
  {type:'tune', step:'Step 1 · Tune', title:'Get in tune first', body:"A ukulele only sounds good in tune. Open the Tuner, get all four strings to say IN TUNE, then come back and tap Continue."},
  {type:'chord', chord:'C', step:'Step 2 · First chord', title:'This is C', body:"Ring finger on the A string (closest to the floor), 3rd fret. Strum all four strings down with your thumb. We'll listen for a clean C."},
  {type:'strum', count:4, chord:'C', step:'Step 3 · First strum', title:'Strum a steady beat', body:"Keep holding C. Strum down 4 times, slow and even: 1 — 2 — 3 — 4."},

  {type:'seq', seq:['C','Am','C','Am'], step:'Step 5 · The change', title:'Switch C ↔ Am', body:"The hard part is the change. Get the shape, then strum. It moves on each time it hears the right chord — take your time."},
  {type:'seq', seq:['C','C','Am','Am','C','C','Am','Am'], step:'Step 6 · Your first song', title:'Play along', body:"Two bars of C, two of Am, and repeat. Strum each chord. You're playing music!"},
  {type:'done', step:'Done', title:'Lesson 1 complete!', body:"You tuned up, learned C and Am, and played a song. Next lesson adds the F chord and a steady strum. Nice work."}
 ],
 2:[
  {type:'info', step:'Lesson 2', title:'The F chord & strumming', body:"You'll learn the F chord, drill the tricky C↔F change, strum to a steady beat, then play a three-chord song with C, Am and F."},
  {type:'chord', chord:'F', step:'Step 1 · New chord', title:'This is F', body:"Index finger on the E string, 1st fret. Middle finger on the g string, 2nd fret. Two fingers — strum down and listen for F."},
  {type:'seq', seq:['C','F','C','F'], step:'Step 2 · C ↔ F change', title:'Switch C ↔ F', body:"F is trickier. Get both fingers down cleanly, then strum. It advances each time it hears the right chord."},
  {type:'metro', chord:'F', count:6, beats:8, bpm:80, step:'Step 3 · Strum in time', title:'Strum on the beat', body:"Hold F. A steady click plays — strum down on each click. Keeping time matters more than speed. Tap ♪ Beat to hear it again."},
  {type:'seq', seq:['C','C','Am','Am','F','F','C','C'], step:'Step 4 · Three-chord song', title:'Play C – Am – F', body:"Two bars each of C, Am, F, back to C. Strum each chord. This progression is in a thousand songs!"},
  {type:'done', step:'Done', title:'Lesson 2 complete!', body:"You learned F, drilled the change, and strummed in time. Next: the G chord and the island strum. Great work."}
 ],
 3:[
  {type:'info', step:'Lesson 3', title:'The G chord & island strum', body:"You'll learn G — your first three-finger chord — and the island strum, the rhythm behind a huge number of ukulele songs."},
  {type:'chord', chord:'G', step:'Step 1 · New chord', title:'This is G', body:"Index on the C string 2nd fret, middle on the A string 2nd fret, ring on the E string 3rd fret — a little triangle. Strum and listen for G."},
  {type:'seq', seq:['C','G','C','G'], step:'Step 2 · C ↔ G change', title:'Switch C ↔ G', body:"All three fingers move together. Get the triangle shape, then strum. It advances when it hears the right chord."},
  {type:'metro', chord:'C', bpm:70, beats:8, pattern:'island', step:'Step 3 · The island strum', title:'D · D U · U D U', body:"Hold C and follow the arrows with the beat: down, down-up, up-down-up. Strum along — no grading, just feel it. Tap ♪ Beat to hear it again."},
  {type:'seq', seq:['C','G','Am','F'], step:'Step 4 · Four-chord song', title:'C · G · Am · F', body:"The famous four-chord loop — hundreds of songs use it. Play each chord; add the island strum if you can."},
  {type:'done', step:'Done', title:'Lesson 3 complete!', body:"You learned G and the island strum, and played the four-chord loop. You now know C, Am, F and G — a whole songbook's worth. Amazing work."}
 ],
 4:[

  {type:'chord', chord:'Dm', step:'Step 1 · New chord', title:'This is Dm', body:"Index on the E string 1st fret, middle on the g string 2nd fret, ring on the C string 2nd fret. Strum and listen for Dm."},
  {type:'pick', chord:'C', seq:['g','C','E','A'], step:'Step 2 · Fingerpick', title:'Pluck one string at a time', body:"Hold C. Pluck the strings one by one — g, then C, then E, then A — with your thumb and fingers. We'll listen to each."},

  {type:'seq', seq:['D','G','A','D'], step:'Step 4 · A song in D', title:'D · G · A · D', body:"Your first song in a new key! This is the classic I–IV–V — the three chords at the heart of countless folk and pop tunes. You already know G, so you're set. Strum each chord."},
  {type:'done', step:'Done', title:'Lesson 5 complete!', body:"You learned D and A and played in a brand-new key. That's seven chords now — you're building a real toolkit. Lovely work."}

  {type:'seq', seq:['C7','C7','F','C7','G7','F','C7','G7'], step:'Step 4 · 12-bar blues', title:'Play the blues', body:"A shortened 12-bar blues in C, using C7, F and G7. This pattern is behind thousands of blues and rock'n'roll songs. Strum it through and feel that bluesy swing."},

  7:[

   {type:'chord', chord:'Bb', step:'Step 1 · New chord', title:'This is B♭', body:"Here's the classic first barre. Lay your index finger FLAT across the E and A strings at the 1st fret, pressing both down at once — it helps to roll the finger slightly onto its bony side. Then middle finger on the C string 2nd fret, and ring finger on the g string 3rd fret. Press close to the fret, strum slowly, and check that each string rings clearly. Don't worry if it buzzes the first few times — keep adjusting and it will come."},
   {type:'seq', seq:['Bb','F','Bb','F'], step:'Step 2 · The change', title:'B♭ ↔ F', body:"Now drill between B♭ and your old friend F — which is really just a partial barre you already know. Form B♭, strum, then relax into F and strum again. Switching back and forth like this is the fastest way to teach your hand the new shape. It advances each time it hears the right chord."},
   {type:'seq', seq:['F','Bb','C7','F'], step:'Step 3 · A song in F', title:'Play in the key of F', body:"Here's a real progression in the key of F, using B♭ alongside two chords you already own: F and C7. This I–IV–V pattern is the backbone of countless songs. Strum it through and enjoy hearing your barre chord at work in real music."},
   {type:'done', step:'Done', title:'Lesson 7 complete!', body:"You played your first barre chord — a genuine milestone. Barre chords are movable, so the shape you just learned unlocks playing in any key. Keep practising B♭ a little each day and it'll soon feel as natural as the rest. Brilliant work."}
 ]
 ,8:[
  {type:'info', step:'Lesson 8', title:'Putting it together', body:"Look how far you have come. Eight lessons ago you were holding a ukulele for the very first time, and now you know a whole handful of chords, how to switch between them, and how to keep a steady strum. This lesson is your victory lap. We are going to take everything you have learned and turn it into real music. Take a breath, relax your shoulders, and let us play."},
  {type:'seq', seq:['C','G','Am','F'], step:'Refresher', title:'Old friends', body:"Let us warm up with four chords you already know well. Play through C, then G, then Am, then F, and loop it a few times. Keep your changes smooth and do not worry about speed. These four are the backbone of countless songs, so they are worth saying hello to again."},
  {type:'metro', chord:'C', bpm:78, beats:8, pattern:'island', step:'Groove', title:'Find the island groove', body:"Now hold a C chord and lock in with the metronome at a relaxed 78 beats per minute. Use the island strum you learned earlier and let it become automatic. Feel the rhythm in your body, tap your foot, and enjoy how natural it feels now. This easygoing groove is the heartbeat of almost every ukulele song."},
  {type:'seq', seq:['C','G','Am','F','C','G','F','G'], step:'Verse', title:'Play a real verse', body:"Here is the verse of a real song, built only from chords you know. Move through C, G, Am, F, then C, G, F, G. Keep your island strum going underneath and let each chord ring for a full bar. If a change trips you up, slow down and try again. You are playing actual song structure now."},
  {type:'seq', seq:['F','G','C','Am','F','G','C','C'], step:'Chorus', title:'Lift into the chorus', body:"Time for the chorus, the big singalong part. Play F, G, C, Am, then F, G, and finish on two bars of C to land it. Notice how the chorus feels like it rises and then settles home. Try playing the verse and then the chorus back to back, and you have just performed a complete two-section song."},
  {type:'done', step:'Done', title:'Lesson 8 complete!', body:"You did it. You can now play real songs from start to finish, with steady rhythm and confident chord changes. This is no small thing, it is the milestone every ukulele player remembers. From here, the whole world of music is open to you. Pick a song you love, look up its chords, and play. You have earned it."}
 ]
 ,9:[
  {type:'info', step:'Lesson 9', title:'Minor keys & Em', body:"Up to now most of your chords have sounded bright and happy. This lesson opens a new door: minor chords, the ones that sound thoughtful, moody, even a little sad. The star of the show is Em, and once it clicks you will hear a whole new colour in your playing. Take your time and enjoy the feels."},
  {type:'chord', chord:'Em', step:'Step 1 · The Em shape', title:'This is Em', body:"Em is the trickiest stretch you have met so far, so go gently. The frets are g,C,E,A = 0,4,3,2: the open g string rings free, then your ring finger goes on the C string at the 4th fret, your middle finger on the E string at the 3rd fret, and your index on the A string at the 2nd fret. Tip: build it one finger at a time, lowest fret first (index on A), and keep your thumb low behind the neck to open up the reach. Strum slowly and listen for that lovely shadowy minor sound."},
  {type:'seq', seq:['Am','Em','Am','Em'], step:'Step 2 · Change drill Am to Em', title:'Am to Em and back', body:"Time to make Em a friend. Am and Em are the two most common minor chords, and switching between them is great practice. Play Am, then slide into Em, then back again. Do not worry about speed yet: aim for clean, ringing changes. Notice both chords sound a touch melancholy, but Em sits a little darker. Loop it until the move feels smooth."},
  {type:'seq', seq:['Am','G','F','Em'], step:'Step 3 · A minor-key song', title:'A wistful little progression', body:"Here is a short song that lives entirely in known chords: Am, G, F, Em. It walks gently downhill and lands on Em, which gives it a wistful, looking-out-the-window-on-a-rainy-day mood. Strum each chord four times before moving on, and let the Em ring at the end. This is the sound of minor keys, and you are playing it for real."},
  {type:'done', step:'Done', title:'Lesson 9 complete!', body:"You learned Em, the trickiest shape yet, and you used it in a real minor progression. You now have happy chords AND moody ones in your toolkit, which means you can play a far wider range of songs. Wonderful work: give that Em a victory strum."}
 ]
 ,10:[
  {type:'info', step:'Lesson 10', title:'E and the key of A', body:"You already know a big pile of open chords. Today we add the last common one: E major. I'll be straight with you, E is the chord that uke players love to grumble about. It's a little awkward at first, and that's normal. We'll take it slow, learn a friendly version of the shape, then put it straight to work in a song. By the end you'll own the full set of common open chords."},
  {type:'chord', chord:'E', step:'New chord: E', title:'This is E', body:"Here's a beginner-friendly E. Put your index finger on the g string (top string) at the 1st fret, your pinky on the C string at the 4th fret, and your ring finger on the A string at the 2nd fret. The E string stays open. Yes, the pinky stretch feels strange today, but it gets easier fast. Tip: if it's a struggle, just press the fingers you can, strum gently, and check each string one at a time. Buzzing is part of learning E, not a sign you're doing it wrong."},
  {type:'seq', seq:['A','E','A','E'], step:'Change drill: A to E', title:'A to E and back', body:"Let's build the muscle memory. Switch slowly between A and E, no rush and no metronome yet. Watch how your fingers move from one shape to the other and try to keep them low over the strings. Speed comes later. Right now, clean and steady beats fast and messy every time."},
  {type:'seq', seq:['A','D','E','A'], step:'Song: key of A', title:'A song in the key of A', body:"Time for the payoff. A, D and E are the three main chords in the key of A, the classic I, IV, V progression behind countless songs. Strum each chord a few times, take your time on the changes, and listen to how they pull back home to A. This is a real progression you'll recognize once you hear it."},
  {type:'done', step:'Done', title:'Lesson 10 complete!', body:"That's it, you now know the full set of common open chords. E is genuinely tricky, so be proud of sticking with it. With C, Am, F, G, Em, Dm, D, A and E in your hands, you can play an enormous number of songs. Keep practicing those A to E changes and they'll smooth out before you know it."}
 ]
 ,11:[
  {type:'info', step:'Lesson 11', title:'Two new minor chords', body:"Today you learn F#m and Bm. They sound great together and they unlock a whole pile of songs that were off-limits before. One of them is U2's 'With or Without You', which was originally written in this exact key. Take your time with these two and the rest of the lesson is just playing."},
  {type:'chord', chord:'F#m', step:'F#m', title:'F#m, the 2,1,2,0 shape', body:"Index finger on the C string at the 1st fret, middle finger on the g string at the 2nd fret, ring finger on the E string at the 2nd fret, and let the A string ring open. That's it. It looks busy but it's friendlier than a full barre, since each finger gets its own string. Strum slowly and check that all four strings sound clean."},
  {type:'chord', chord:'Bm', step:'Bm', title:'Bm, your first real barre', body:"This one is genuinely hard, so don't be discouraged. Lay your index finger flat across the C, E and A strings at the 2nd fret, then put your ring finger on the g string at the 4th fret. The tip: press the index firmly and roll it slightly onto its side, toward the bony edge of the finger. That bit of roll is usually the difference between a buzzy mess and a clear chord. It will feel awkward at first for everyone. Keep at it."},
  {type:'seq', seq:['A','F#m','A','F#m'], step:'A to F#m', title:'Change drill', body:"Now switch between A and F#m and back again. Go slow and aim for smooth changes over fast ones. Notice that a couple of fingers barely have to move between these two shapes, so look for what stays put and let that guide you."},
  {type:'seq', seq:['D','A','Bm','G'], step:'A real song', title:'With or Without You', body:"D, A, Bm, G. This is the original key of 'With or Without You', and once it's looping you'll hear the whole song in it. Don't rush the change into Bm, give yourself an extra beat if you need one. Round and round it goes."},
  {type:'done', step:'Done', title:'Lesson 11 complete!', body:"That was a big one. Bm is a milestone, your first proper barre-style chord besides Bb, and getting it to ring at all is a real step up. F#m will become one of your most-used chords from here. Well done, and go play that song a few more times for fun."}
 ]
 ,12:[
  {type:'info', step:'Lesson 12', title:'Strumming patterns II', body:"You already know a handful of chords, but here's the thing: the same four chords can sound like a campfire singalong or a beach party, depending on how you strum them. The strum is the rhythm and the feel. Today we'll play one chord and just change the strum, so you can hear how much it matters before we put it all together."},
  {type:'metro', chord:'C', bpm:90, beats:8, pattern:'downup', step:'Down-up eighths', title:'Steady down-up', body:"Hold a C and let the metronome count you in. The arrows will show down, up, down, up, straight through. Your hand keeps moving like a pendulum the whole time: it brushes down across the strings, then catches them on the way back up. The trick is to never stop the motion, even on the ups where you barely touch the strings. Keep it loose and even."},
  {type:'metro', chord:'C', bpm:85, beats:8, pattern:'folk', step:'Folk pattern', title:'A folk feel', body:"Same C chord, new groove. The arrows go down, then down-up-down-up-down-up. So you start each measure with one firm down strum, then fall into a run of quick down-ups. Let that first down land heavy, almost like a step, and let the rest bounce along behind it. This is the pattern behind a lot of country and folk tunes, and you'll feel why the moment you hear it."},
  {type:'metro', chord:'C', bpm:80, beats:8, pattern:'island', step:'Island review', title:'The island strum', body:"Back to our keystone. The arrows show down, then down-up, then up-down-up, with a little gap where you skip a beat. That skipped beat is the whole secret of the island strum: your hand keeps swinging, but it misses the strings on purpose, and that missing strum is what makes it feel relaxed and swaying. We've slowed it down so you can sit in the groove. Don't rush the gaps."},
  {type:'seq', seq:['C','G','Am','F','C','G','Am','F'], step:'Put it together', title:'Try it on a song', body:"Now the fun part. Play this progression, C to G to Am to F, twice through, and pick whichever pattern from today felt best in your hands. The app advances each time you land a clean chord, so take your time on the changes. Once you're comfortable, try the same progression with a different strum and notice how the whole thing changes character."},
  {type:'done', step:'Done', title:'Lesson 12 complete!', body:"Nicely done. You just heard the same chords turn into three different moods without changing a single note, only the strum. That's a big deal: picking the right strum is honestly half of making a song sound right. Keep these patterns in your pocket and reach for them when you learn a new tune."}
 ]
 ,13:[
  {type:'info', step:'Lesson 13', title:'Fingerpicking patterns', body:"Strumming gives you rhythm. Fingerpicking gives you movement. Instead of brushing all the strings at once, you pluck them one at a time, and that little bit of separation makes a chord sound like it's unfolding rather than just landing. Today you'll learn two new patterns to go with the up-roll you already know. Take them slowly. The whole point is that each string gets its own moment."},
  {type:'pick', chord:'C', seq:['g','C','E','A'], step:'Pattern 1', title:"Quick review: the up-roll", body:"Let's warm up with the one you know. Hold a C and pluck low to high: g, then C, then E, then A. Thumb on the low g string, then your fingers walk up the rest. Keep it even and unhurried. This rolling-up sound is your home base, and the next two patterns are just different routes through the same four strings."},
  {type:'pick', chord:'Am', seq:['g','E','C','E'], step:'Pattern 2', title:"An inside pattern", body:"Now an 'inside' pattern on Am. Pluck g, then E, then C, then E again. Notice it doesn't just climb in a line. Your thumb sounds the low g, then your hand bounces between the two middle strings: E, C, E. Let your index finger handle the C string and your middle finger handle the E string, so you're rocking gently between them. It feels a bit like a little see-saw. Slow is fine, it'll smooth out."},
  {type:'pick', chord:'F', seq:['A','E','C','g'], step:'Pattern 3', title:"The down-roll", body:"This one's the up-roll in reverse, a 'down-roll', on F. Start high and fall: A, then E, then C, then g. Your fingers pluck the top three strings on the way down, and your thumb catches the low g at the bottom. Where the up-roll feels like it's rising, the down-roll feels like it's settling. Same four strings, opposite direction."},
  {type:'seq', seq:['C','Am','F','G'], step:'Put it together', title:"A gentle progression", body:"Time to use it. Play through C, Am, F, then G. If you're feeling steady, fingerpick each chord with one of today's patterns, maybe up-roll the C, inside-pattern the Am, down-roll the F. If that's too much to juggle, just strum each one cleanly. Either way, listen to how the chords lean into each other. Switching while picking is hard at first, so don't rush it."},
  {type:'done', step:'Done', title:'Lesson 13 complete!', body:"Nicely done. Fingerpicking takes patience, your fingers need time to learn which string is which without you looking, but it's worth it. Few things on the ukulele sound as pretty as a chord picked out one note at a time. Keep these patterns in your back pocket and they'll start showing up in your playing on their own."}
 ]

const GLESSONS={
 1:[
  {type:'info', step:'Lesson 1', title:'First sounds', body:"Welcome to guitar. Over these lessons you'll tune up, learn five chords, and play real progressions — one small step at a time, nothing timed. One honest thing first: steel strings make fingertips sore for the first two or three weeks. Then the skin toughens into little calluses and the soreness stops. Short daily practice beats a long rare session every time — ten minutes counts."},
  {type:'tune', step:'Step 1 · Tune', title:'Get in tune first', body:"A guitar only sounds good in tune. Your six strings, thickest to thinnest, are E A D G B e — the thick low E is the one closest to your face when you look down. Open the Tuner, get all six to say IN TUNE, then come back and tap Continue."},
  {type:'info', step:'Step 2 · Holding it', title:'How to hold it', body:"Sit with the guitar resting on your leg, back relaxed. Strum with a pick or with the pad of your thumb — both are fine, use whichever feels natural today. The strum comes from your elbow, not your wrist: a loose swing, like shaking water off your hand. If your shoulders creep up, breathe and let them drop."},
  {type:'strum', count:8, step:'Step 3 · First strums', title:'Eight muted strums', body:"Rest your left hand flat across the strings so they're muted — you'll get a soft chk instead of notes, and that's exactly right. Strum 8 steady down-strums from the elbow: 1 — 2 — 3 — 4, and again. We're teaching your right arm first; chords come next lesson."},
  {type:'done', step:'Done', title:'Lesson 1 complete!', body:"You made your first sounds — you tuned all six strings and strummed a steady beat, and that's exactly how every guitarist starts. Come back tomorrow if you can, even for ten minutes. Next lesson: your first two chords."}
 ],
 2:[
  {type:'chord', chord:'Em', step:'Step 1 · New chord', title:'This is Em', body:"Two fingers: middle finger on the A string, 2nd fret, and ring finger on the D string, 2nd fret. Press just behind the metal fret, on the very tips of your fingers. Strum all six strings down — every string rings in Em. It's the easiest chord on the guitar, and it already sounds like music."},
  {type:'chord', chord:'Am', step:'Step 2 · New chord', title:'This is Am', body:"Like Em, plus one finger: middle on the D string 2nd fret, ring on the G string 2nd fret, index on the B string 1st fret. Now look at the × over the low E — don't strum that string. Start your strum from the A string and brush five strings down."},
  {type:'seq', seq:['Em','Am','Em','Am'], step:'Step 3 · The change', title:'Switch Em ↔ Am', body:"The change is the real skill. Moving your fingers over one at a time is completely fine for now — speed grows on its own later. Get the shape, strum, and it moves on each time it hears the right chord."},
  {type:'metro', chord:'Em', bpm:70, beats:8, step:'Step 4 · In time', title:'Strum Em on the click', body:"Hold Em. A steady click plays — strum down on each click. Keeping time matters more than speed. Tap ♪ Beat to hear it again."},
  {type:'seq', seq:['Em','Em','Am','Am'], step:'Step 5 · Two-chord jam', title:'Two-chord jam', body:"A bar of Em, a bar of Am, and repeat. Play it as a loop and let each chord ring — this is a real minor groove, the moody kind you've heard in plenty of songs. You're playing music on a guitar."},
  {type:'done', step:'Done', title:'Lesson 2 complete!', body:"Two chords and a groove — that's a real start. If your fingertips sting, that's the calluses forming; it fades in a couple of weeks. Next lesson: the D chord, and the guitar skill of choosing which strings you strum."}
 ],
 3:[
  {type:'info', step:'Lesson 3', title:'Not every string plays', body:"Here's a big guitar idea a ukulele never has: some chords don't use all six strings. When a diagram shows × over a string, that string stays silent — aim your strum so it starts below it. It feels fussy for the first week; then your arm just knows."},
  {type:'chord', chord:'D', step:'Step 1 · New chord', title:'This is D', body:"Three fingers in a little triangle: index on the G string 2nd fret, ring on the B string 3rd fret, middle on the thin e string 2nd fret. Two × marks this time — skip the low E and the A. Aim your strum from the D string down, just the thin four strings."},
  {type:'seq', seq:['D','Em','D','Em'], step:'Step 2 · The change', title:'Switch D ↔ Em', body:"From the tight D triangle to the easy Em and back. Get each shape, strum, and it moves on when it hears the right chord. If D buzzes, check each finger is on its very tip, just behind the fret."},
  {type:'seq', seq:['D','Am','D','Am'], step:'Step 3 · Another change', title:'Switch D ↔ Am', body:"Now D to Am. Both chords skip the low E, so your strum can stay compact — D from the D string down, Am from the A string down. Slow and clean beats fast and messy every time."},
  {type:'metro', chord:'D', bpm:70, beats:8, step:'Step 4 · In time', title:'Strum D on the click', body:"Hold D and strum down on each click — remember, from the D string down. Keeping the strum small and steady is the whole exercise. Tap ♪ Beat to hear it again."},
  {type:'done', step:'Done', title:'Lesson 3 complete!', body:"You learned D and started steering your strum — that's real right-hand control, and it only gets more natural. Three chords now: Em, Am and D. Next lesson: A and E, and your first three-chord jam."}
 ],
 4:[
  {type:'chord', chord:'A', step:'Step 1 · New chord', title:'This is A', body:"Three fingers squeezed in a row on the 2nd fret: index on the D string, middle on the G string, ring on the B string. It's a tight fit — curl your fingers and use the very tips so each string can ring. Skip the low E (see the ×) and strum the other five."},
  {type:'chord', chord:'E', step:'Step 2 · New chord', title:'This is E', body:"The full six-string chord: middle finger on the A string 2nd fret, ring on the D string 2nd fret, index on the G string 1st fret. Strum all six strings — the biggest sound you've made yet. Let it ring."},
  {type:'seq', seq:['A','D','A','D'], step:'Step 3 · The change', title:'Switch A ↔ D', body:"A to D and back. Both skip the low E, and your fingers only travel a fret or two. Get the shape, strum, and it moves on when it hears the right chord."},
  {type:'seq', seq:['E','A','E','A'], step:'Step 4 · Another change', title:'Switch E ↔ A', body:"A classic pair. Keep your fingers low and close to the strings as they swap over. E strums all six; A skips the low E — let your strum follow the shape."},
  {type:'seq', seq:['A','D','E','A'], step:'Step 5 · Three-chord jam', title:'Three-chord jam', body:"A, D and E together — this is the I–IV–V, the engine of thousands of songs. Play it round as a loop. Once these three changes feel smooth, an enormous amount of music opens up."},
  {type:'done', step:'Done', title:'Lesson 4 complete!', body:"Five chords now: Em, Am, D, A and E. The pair you just learned anchors whole styles of music. Give your fingertips a rest — next lesson, no new chords: we turn all of this into music."}
 ],
 5:[
  {type:'info', step:'Lesson 5', title:'Making it music', body:"No new chords today — this lesson turns shapes into music. The secret is counting: 1-2-3-4, over and over, each number an even heartbeat. Count out loud if you can; it feels silly and it works. Everything you play from now on sits on that count."},
  {type:'metro', chord:'Em', bpm:80, beats:8, pattern:'downs', step:'Step 1 · On the count', title:'Down-strums on the count', body:"Hold Em and strum down on every number: 1, 2, 3, 4. The click keeps the count for you — land each strum right on it. Steady matters more than strong. Tap ♪ Beat to hear it again."},
  {type:'metro', chord:'A', bpm:80, beats:8, pattern:'downup', step:'Step 2 · Down-up', title:'Add the up-strum', body:"Now hold A and go down-up: down on the number, up on the 'and' — 1-and-2-and-3-and-4-and. Your hand swings like a pendulum and never stops; the up is just a light brush on the way back. Remember to skip the low E."},
  {type:'seq', seq:['Em','Am','D','Em'], step:'Step 3 · A minor jam', title:'Em · Am · D · Em', body:"A moody little loop from chords you know. Strum each chord on a steady count — four downs each, or down-ups if you're feeling brave — and keep it rolling."},
  {type:'seq', seq:['A','D','E','A'], step:'Step 4 · The big loop', title:'A · D · E · A', body:"The three-chord engine again, this time with your counting underneath. Keep the count going through the changes — it's fine if a change lands late at first. The count is the song; the chords catch up."},
  {type:'done', step:'Done', title:'Lesson 5 complete!', body:"You know five chords and you can change between them in time. That's a working guitarist's toolkit — countless songs run on exactly what you just played. Keep the daily minutes going. Next up: G and C, the two chords that open the door to nearly everything else."}
 ],
 6:[
  {type:'chord', chord:'G', step:'Step 1 · New chord', title:'This is G', body:"G is a stretch — your hand opens wider than it has so far. Middle finger on the low E string 3rd fret, index on the A string 2nd fret, then ring finger all the way over on the thin e string 3rd fret. All six strings ring, so strum everything. If the stretch fights you, slow down and place the fingers one at a time — the reach comes with days, not weeks."},
  {type:'seq', seq:['G','Em','G','Em'], step:'Step 2 · The change', title:'Switch G ↔ Em', body:"G and Em are a classic pairing — you'll find them side by side in song after song. Get the shape, strum, and it moves on when it hears the right chord. Both chords use all six strings, so let your strum stay big."},
  {type:'seq', seq:['G','D','G','D'], step:'Step 3 · A harder change', title:'Switch G ↔ D', body:"This one's harder — the whole hand jumps from the wide G to the tight D triangle. Moving one finger at a time is completely fine for now. And remember D skips the low E and A, so shrink your strum when you land on it."},
  {type:'metro', chord:'G', bpm:75, beats:8, step:'Step 4 · In time', title:'Strum G on the click', body:"Hold G and strum down on each click, all six strings. Big chord, steady beat — keeping time matters more than strength. Tap ♪ Beat to hear it again."},
  {type:'done', step:'Done', title:'Lesson 6 complete!', body:"Six chords now — and G is a workhorse: it opens hundreds of songs, from campfire folk to stadium rock. If the stretch still feels wide, that's normal; it shrinks a little every day. Next lesson: C, and with it a whole family of chords."}
 ],
 7:[
  {type:'chord', chord:'C', step:'Step 1 · New chord', title:'This is C', body:"Ring finger on the A string 3rd fret, middle on the D string 2nd fret, index on the B string 1st fret. See the × over the low E — skip it and strum from the A string down, five strings. The stretch up to that 3rd fret is the work here; arch your fingers so the open strings underneath can ring."},
  {type:'seq', seq:['C','G','C','G'], step:'Step 2 · The change', title:'Switch C ↔ G', body:"C and G — the two chords guitar music leans on most. All three fingers travel, so go slowly and place them one at a time if you need to. It moves on each time it hears the right chord."},
  {type:'seq', seq:['C','Am','C','Am'], step:'Step 3 · An easy change', title:'Switch C ↔ Am', body:"Here's a treat: Am is C with one finger moved. Look at the two diagrams and spot it — only your ring finger travels, from the A string over to the G string. Keep the other two planted and this change gets quick almost by itself."},
  {type:'seq', seq:['C','G','Am','Em'], step:'Step 4 · Four-chord jam', title:'C · G · Am · Em', body:"Play this loop round and round. This exact progression — with one chord you'll meet soon swapped in — powers an absurd share of pop music. Take the changes slowly and let each chord ring for a moment before you move."},
  {type:'done', step:'Done', title:'Lesson 7 complete!', body:"Seven chords — and with C in your hands you now own the key of C and the key of G, where a huge slice of guitar songs live. Next lesson: one new chord, and your first real strumming pattern."}
 ],
 8:[
  {type:'chord', chord:'Dm', step:'Step 1 · New chord', title:'This is Dm', body:"Dm is D's moodier cousin. Index on the thin e string 1st fret, middle on the G string 2nd fret, ring on the B string 3rd fret. Two × marks this time — skip both fat strings and strum from the D string down, just the thin four. Hear how one small shift turns bright D into something wistful."},
  {type:'seq', seq:['Dm','Am','Dm','Am'], step:'Step 2 · The change', title:'Switch Dm ↔ Am', body:"Two minor chords, made for each other. Dm strums from the D string down, Am from the A string down — let the strum follow the shape. Get each chord, strum, and it moves on when it hears the right one."},
  {type:'metro', chord:'Dm', bpm:75, beats:8, pattern:'downs', step:'Step 3 · Steady downs', title:'All downs first', body:"Hold Dm and strum down on each click — all downs, steady as a clock. This is the floor the famous pattern stands on, so let it get boring before you move on. Tap ♪ Beat to hear it again."},

  const t2=now+0.34,o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sine';o.frequency.setValueAtTime(1046.5,t2);o.frequency.exponentialRampToValueAtTime(1567.98,t2+0.45);
  g.gain.setValueAtTime(0,t2);g.gain.linearRampToValueAtTime(0.12,t2+0.03);g.gain.exponentialRampToValueAtTime(0.0005,t2+0.7);
  o.connect(g).connect(ctx.destination);o.start(t2);o.stop(t2+0.75);
}
function cosine(a,b){let d=0,na=0,nb=0;for(let i=0;i<12;i++){d+=a[i]*b[i];na+=a[i]*a[i];nb+=b[i]*b[i];}return(na&&nb)?d/Math.sqrt(na*nb):0;}
function template(name){const t=new Array(12).fill(0);CH[name].pcs.forEach(p=>t[p]=1);return t;}
const TPL={};POOL.forEach(n=>TPL[n]=template(n));

function loop(){
  if(running&&audioCtx&&audioCtx.state!=='running')audioCtx.resume().catch(()=>{});
  const now=performance.now();let dt=(now-lastT)/1000;lastT=now;if(dt>0.1)dt=0.1;
  if(!running||!analyser){rafId=requestAnimationFrame(loop);return;}
  const bins=analyser.frequencyBinCount;
  if(!freqBuf||freqBuf.length!==bins)freqBuf=new Float32Array(bins);
  if(!timeBuf||timeBuf.length!==analyser.fftSize)timeBuf=new Float32Array(analyser.fftSize);
  analyser.getFloatFrequencyData(freqBuf);analyser.getFloatTimeDomainData(timeBuf);
  if(checking){doCheck(dt);rafId=requestAnimationFrame(loop);return;}
  let rms=0;for(let i=0;i<timeBuf.length;i++)rms+=timeBuf[i]*timeBuf[i];rms=Math.sqrt(rms/timeBuf.length);
  const binHz=audioCtx.sampleRate/analyser.fftSize;const chroma=new Array(12).fill(0);
  for(let k=1;k<bins;k++){const f=k*binHz;if(f<CHROMA_FLO||f>2300)continue;const db=freqBuf[k];if(db<-82)continue;
    const lin=Math.pow(10,db/20);const pc=((Math.round(69+12*Math.log2(f/440))%12)+12)%12;chroma[pc]+=lin;}
  if(!ema)ema=chroma.slice();else for(let i=0;i<12;i++)ema[i]=ema[i]*0.5+chroma[i]*0.5;
  // onset (combined)
  if(envO===null){envO=rms;envPrev=rms;slowEnvO=rms;}
  envO=envO*0.6+rms*0.4;const rise=envO-envPrev;slowEnvO=slowEnvO*0.9+rms*0.1;
  const onset=((rise>ON.rise&&envO>ON.floor)||(rms>ON.floor*2.5&&slowEnvO>1e-5&&rms/slowEnvO>ON.ratio))&&now-lastOnset>ON.refract*1000;
  if(onset)lastOnset=now;
  envPrev=envO;

  if(now<celebrateUntil){rafId=requestAnimationFrame(loop);return;}
  const maxc=Math.max(...ema);
  const quiet=rms<0.006||maxc<=0;

  if(step&&step.type==='strum'){
    if(onset){strumCount++;$('count').textContent=strumCount+' / '+step.count;
      $('count').style.color=getCss('--good');setTimeout(()=>$('count').style.color='',150);
      if(strumCount>=step.count){celebrateUntil=now+700;advanceStep();}}
    maybeSkip();
  } else if(step&&step.type==='pick'){
    const f=pitchDetect(timeBuf,audioCtx.sampleRate);
    const i=STR_LBL.indexOf(step.seq[pickPos]);
    const expPc=((STR_BASE[i]+CH[step.chord].frets[i])%12+12)%12;
    if(f){const pc=((Math.round(69+12*Math.log2(f/440))%12)+12)%12; if(pc===expPc)pickHold+=dt; else pickHold=Math.max(0,pickHold-dt);}
    else pickHold=Math.max(0,pickHold-dt*0.5);
    if(pickHold>0.18){pickHold=0; [...$('chart').children][pickPos].classList.add('done'); pickPos++; celebrate();
      if(pickPos>=step.seq.length){celebrateUntil=now+700;advanceStep();} else {celebrateUntil=now+400;renderPick();}}
    else maybeSkip();
  } else if(step&&(step.type==='chord'||step.type==='seq')){
    const target = step.type==='chord' ? step.chord : step.seq[seqPos];
    if(quiet){document.querySelectorAll('.notes .n').forEach(n=>n.classList.remove('lit'));$('name').style.display='none';$('state').textContent='play '+target+'…';maybeSkip();rafId=requestAnimationFrame(loop);return;}
    document.querySelectorAll('.notes .n').forEach(n=>{const pc=+n.dataset.pc;n.classList.toggle('lit',ema[pc]>0.30*maxc);});
    const sT=cosine(ema,TPL[target]);
    let best=target,bestS=-1;for(const n of POOL){const sc=cosine(ema,TPL[n]);if(sc>bestS){bestS=sc;best=n;}}
    const tones=CH[target].pcs;const present=tones.filter(pc=>ema[pc]>0.25*maxc).length;const needed=Math.max(2,tones.length-1);
    const good=sT>CHORDCOS&&(best===target||sT>=bestS-0.07)&&present>=needed;
    if(good){matchHold+=dt;$('state').textContent='nice — hold it';}
    else{matchHold=Math.max(0,matchHold-dt*0.5);$('state').textContent=(bestS>0.55&&best!==target)?('sounds like '+best):'play '+target+'…';}
    if(matchHold>0.3){
      matchHold=0;
      if(step.type==='chord'){Skill.recordChord(step.chord);celebrateUntil=now+700;advanceStep();}
      else{ Skill.recordChord(step.seq[seqPos]); if(seqPos>0)Skill.recordChange(step.seq[seqPos-1],step.seq[seqPos]); [...$('chart').children][seqPos].classList.add('done'); seqPos++; celebrate();
        if(seqPos>=step.seq.length){celebrateUntil=now+700;advanceStep();}
        else{celebrateUntil=now+550;setSeqTarget();} }
    } else maybeSkip();
  }
  rafId=requestAnimationFrame(loop);
}
function getCss(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

/* ---------- buttons ---------- */
$('go').addEventListener('click',()=>{
  if(step && (step.type==='info'||step.type==='tune'||step.type==='done'||step.type==='metro')){
    if(step.type==='done'){ try{localStorage.setItem((GTR?'pluckGLesson':'pluckLesson')+LNUM,'done');}catch(e){} location.href='lessons.html'; return; }
    stopMetro(); si++; renderStep();
  }
});
$('check').addEventListener('click',()=>{ if(!checking){startCheck();} else if(checkStr<NSTR){nextCheckStr();} else {checking=false;renderStep();} });
$('skip').addEventListener('click',()=>{ if(GTR&&step&&(step.type==='chord'||step.type==='seq')){celebrateUntil=performance.now()+300;advanceStep();return;} if(step&&step.type==='seq'&&seqPos<step.seq.length-1){[...$('chart').children][seqPos].classList.add('done');seqPos++;setSeqTarget();$('skip').style.display='none';stepStart=performance.now();} else {celebrateUntil=performance.now()+300;advanceStep();} });
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&running&&audioCtx&&audioCtx.state!=='running')audioCtx.resume().catch(()=>{});});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{}));}
$('replay').addEventListener('click',()=>{if(step&&step.type==='metro'){strumCount=0;$('count').textContent='0 / '+step.count;startMetro(step);}});
$('lnum').textContent=(GTR?'GUITAR · LESSON ':'LESSON ')+LNUM;
if(GTR){document.title='Pluck · Guitar Lesson '+LNUM;var _gn=document.getElementById('instnote');if(_gn)_gn.textContent='GUITAR';}
renderStep();

if(!GTR&&localStorage.getItem('pluckInst')==='guitar'){var _in=document.getElementById('instnote');if(_in)_in.innerHTML='UKULELE \u00b7 <b>you\u2019re in guitar mode \u2014 these lessons and songs are ukulele-only for now</b>';}
</script>
