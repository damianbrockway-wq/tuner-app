<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1220">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>Pluck · Ukulele Chords</title>
<script src="econ.js"></script>
<style>
  :root{--bg:#0f1220;--card:rgba(255,255,255,.05);--good:#27e0a0;--warn:#ffc23d;--bad:#ff6b6b;--muted:#8a90a8;--accent:#9d8bff;--cyan:#00fff7}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{background:var(--bg);color:#eef1ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;padding:0 0 40px}
  body::before{content:"";position:fixed;inset:0;z-index:-2;background:
    radial-gradient(60% 40% at 20% 0%,rgba(157,139,255,.16),transparent 60%),
    radial-gradient(60% 40% at 90% 10%,rgba(0,255,247,.10),transparent 60%),var(--bg)}
  .wrap{max-width:640px;margin:0 auto;padding:0 14px}
  .top{display:flex;align-items:center;justify-content:space-between;padding:14px 0 6px;position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg) 70%,transparent)}
  .back{color:var(--muted);text-decoration:none;font-weight:700;font-size:14px}
  .brand{font-weight:800;letter-spacing:.5px}
  .brand b{background:linear-gradient(90deg,#9d8bff,#27e0a0);-webkit-background-clip:text;background-clip:text;color:transparent}
  .seg{display:flex;gap:6px;background:rgba(255,255,255,.06);border-radius:999px;padding:4px;margin:4px 0 8px}
  .seg a{flex:1;text-align:center;text-decoration:none;font-weight:800;font-size:13px;color:var(--muted);padding:8px 10px;border-radius:999px}
  .seg a.on{background:linear-gradient(90deg,#3a2b7a,#1d6f5b);color:#fff}
  .jump{display:flex;flex-wrap:wrap;gap:6px;position:sticky;top:52px;z-index:4;padding:6px 0;background:linear-gradient(180deg,var(--bg) 80%,transparent)}
  .jump a{font-size:12px;font-weight:800;color:var(--accent);text-decoration:none;background:rgba(157,139,255,.12);border-radius:8px;padding:5px 8px;min-width:26px;text-align:center}
  .grp{padding-top:12px}
  .grp h2{font-size:15px;margin:6px 2px 8px;color:var(--cyan);letter-spacing:1px;text-shadow:0 0 10px rgba(0,255,247,.25)}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:10px}
  .card{background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px 4px 6px;display:flex;flex-direction:column;align-items:center;gap:2px}
  .cn{font-weight:800;font-size:14px}
  .hint{color:var(--muted);font-size:12px;text-align:center;margin:10px 2px 2px}
  svg text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><a class="back" href="index.html">← Pluck</a><div class="brand">🎸 <b>CHORDS</b></div><span style="width:48px"></span></div>
  <div class="seg"><a href="chords-uke.html" class="on">Ukulele</a><a href="chords-guitar.html" >Guitar</a></div>
  <div class="jump" id="jump"></div>
  <div id="lib"></div>
  <div class="hint">Ukulele · GCEA · ● = press · ○ = open · ✕ = don't play</div>
</div>
<script>
const DATA=[{"name": "C", "root": "C", "type": "", "frets": [0, 0, 0, 3]}, {"name": "D", "root": "D", "type": "", "frets": [2, 2, 2, 0]}, {"name": "E", "root": "E", "type": "", "frets": [1, 4, 0, 2]}, {"name": "F", "root": "F", "type": "", "frets": [2, 0, 1, 0]}, {"name": "G", "root": "G", "type": "", "frets": [0, 2, 3, 2]}, {"name": "A", "root": "A", "type": "", "frets": [2, 1, 0, 0]}, {"name": "B", "root": "B", "type": "", "frets": [4, 3, 2, 2]}, {"name": "Bb", "root": "Bb", "type": "", "frets": [3, 2, 1, 1]}, {"name": "Eb", "root": "Eb", "type": "", "frets": [3, 3, 3, 1]}, {"name": "Ab", "root": "Ab", "type": "", "frets": [5, 3, 4, 3]}, {"name": "Db", "root": "Db", "type": "", "frets": [1, 1, 1, 4]}, {"name": "F#", "root": "F#", "type": "", "frets": [3, 1, 2, 1]}, {"name": "Cm", "root": "C", "type": "m", "frets": [0, 3, 3, 3]}, {"name": "Dm", "root": "D", "type": "m", "frets": [2, 2, 1, 0]}, {"name": "Em", "root": "E", "type": "m", "frets": [0, 4, 3, 2]}, {"name": "Fm", "root": "F", "type": "m", "frets": [1, 0, 1, 3]}, {"name": "Gm", "root": "G", "type": "m", "frets": [0, 2, 3, 1]}, {"name": "Am", "root": "A", "type": "m", "frets": [2, 0, 0, 0]}, {"name": "Bm", "root": "B", "type": "m", "frets": [4, 2, 2, 2]}, {"name": "Bbm", "root": "Bb", "type": "m", "frets": [3, 1, 1, 1]}, {"name": "C#m", "root": "C#", "type": "m", "frets": [1, 1, 0, 4]}, {"name": "F#m", "root": "F#", "type": "m", "frets": [2, 1, 2, 0]}, {"name": "C7", "root": "C", "type": "7", "frets": [0, 0, 0, 1]}, {"name": "D7", "root": "D", "type": "7", "frets": [2, 2, 2, 3]}, {"name": "E7", "root": "E", "type": "7", "frets": [1, 2, 0, 2]}, {"name": "F7", "root": "F", "type": "7", "frets": [2, 3, 1, 3]}, {"name": "G7", "root": "G", "type": "7", "frets": [0, 2, 1, 2]}, {"name": "A7", "root": "A", "type": "7", "frets": [0, 1, 0, 0]}, {"name": "B7", "root": "B", "type": "7", "frets": [2, 3, 2, 2]}, {"name": "Bb7", "root": "Bb", "type": "7", "frets": [1, 2, 1, 1]}, {"name": "Am7", "root": "A", "type": "m7", "frets": [0, 0, 0, 0]}, {"name": "Dm7", "root": "D", "type": "m7", "frets": [2, 2, 1, 3]}, {"name": "Em7", "root": "E", "type": "m7", "frets": [0, 2, 0, 2]}, {"name": "Gm7", "root": "G", "type": "m7", "frets": [0, 2, 1, 1]}, {"name": "Cm7", "root": "C", "type": "m7", "frets": [3, 3, 3, 3]}, {"name": "Cmaj7", "root": "C", "type": "maj7", "frets": [0, 0, 0, 2]}, {"name": "Dmaj7", "root": "D", "type": "maj7", "frets": [2, 2, 2, 4]}, {"name": "Fmaj7", "root": "F", "type": "maj7", "frets": [2, 4, 1, 3]}, {"name": "Gmaj7", "root": "G", "type": "maj7", "frets": [0, 2, 2, 2]}, {"name": "Amaj7", "root": "A", "type": "maj7", "frets": [1, 1, 0, 0]}];
const NSTR=4;
const NOTE=['C','C#/Db','D','D#/Eb','E','F','F#/Gb','G','G#/Ab','A','A#/Bb','B'];
const RPC={'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'F':5,'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11};
const TORDER={'':0,'m':1,'7':2,'m7':3,'maj7':4};

function diagram(frets){
  const n=frets.length, rows=4, ml=11, mt=17, xs=13, ys=13;
  const pressed=frets.filter(f=>f>0);
  const maxF=pressed.length?Math.max.apply(null,pressed):0;
  const minF=pressed.length?Math.min.apply(null,pressed):0;
  let base=0; if(maxF>rows){ base=minF-1; }
  const gw=(n-1)*xs, gh=rows*ys, W=ml*2+gw, H=mt+gh+9;
  let s='<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'">';
  // fret lines
  for(let r=0;r<=rows;r++){const y=mt+r*ys;s+='<line x1="'+ml+'" y1="'+y+'" x2="'+(ml+gw)+'" y2="'+y+'" stroke="rgba(255,255,255,.28)" stroke-width="1"/>';}
  // nut
  if(base===0){s+='<rect x="'+(ml-1)+'" y="'+(mt-2)+'" width="'+(gw+2)+'" height="2.6" fill="rgba(255,255,255,.85)"/>';}
  else{s+='<text x="'+(ml-4)+'" y="'+(mt+9)+'" fill="var(--muted)" font-size="8" text-anchor="end">'+(base+1)+'fr</text>';}
  // strings
  for(let i=0;i<n;i++){const x=ml+i*xs;s+='<line x1="'+x+'" y1="'+mt+'" x2="'+x+'" y2="'+(mt+gh)+'" stroke="rgba(255,255,255,.28)" stroke-width="1"/>';}
  // markers + dots
  for(let i=0;i<n;i++){const x=ml+i*xs, f=frets[i];
    if(f===-1){s+='<text x="'+x+'" y="'+(mt-5)+'" fill="var(--muted)" font-size="9" text-anchor="middle">✕</text>';}
    else if(f===0){s+='<circle cx="'+x+'" cy="'+(mt-8)+'" r="3" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.2"/>';}
    else{const row=f-base; const cy=mt+(row-0.5)*ys; s+='<circle cx="'+x+'" cy="'+cy+'" r="4.4" fill="var(--accent)"/>';}
  }
  s+='</svg>'; return s;
}

// group by root pitch-class
const groups={};
DATA.forEach(c=>{const pc=RPC[c.root]; (groups[pc]=groups[pc]||[]).push(c);});
const pcs=Object.keys(groups).map(Number).sort((a,b)=>a-b);

const jump=document.getElementById('jump');
const lib=document.getElementById('lib');
pcs.forEach(pc=>{
  const label=NOTE[pc];
  const a=document.createElement('a');a.href='#g'+pc;a.textContent=label.split('/')[0];jump.appendChild(a);
  const g=document.createElement('div');g.className='grp';g.id='g'+pc;
  const arr=groups[pc].sort((x,y)=>(TORDER[x.type]-TORDER[y.type]));
  let cards='';
  arr.forEach(c=>{cards+='<div class="card"><div class="cn">'+c.name+'</div>'+diagram(c.frets)+'</div>';});
  g.innerHTML='<h2>'+label+'</h2><div class="cards">'+cards+'</div>';
  lib.appendChild(g);
});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{}));}
</script>
</body>
</html>
