<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pluck</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#08060f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pluck">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<style>
  :root{
    --bg:#08060f; --txt:#eef1ff; --muted:#9aa0c8;
    --accent:#7c6cff; --good:#27e0a0; --warn:#ffc23d; --bad:#ff5d73;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{
    background:var(--bg);color:var(--txt);overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    padding:calc(env(safe-area-inset-top) + 10px) 16px calc(env(safe-area-inset-bottom) + 72px);
    -webkit-user-select:none;user-select:none;
  }
  /* animated aurora background */
  .aurora{position:fixed;inset:-30%;z-index:-2;filter:blur(70px);opacity:.55}
  .blob{position:absolute;border-radius:50%;mix-blend-mode:screen;animation:float 16s ease-in-out infinite}
  .b1{width:55vmax;height:55vmax;background:#5b4bff;left:-10%;top:-10%}
  .b2{width:45vmax;height:45vmax;background:#1f8bff;right:-10%;top:10%;animation-delay:-5s}
  .b3{width:50vmax;height:50vmax;background:#16d6a2;left:10%;bottom:-20%;animation-delay:-9s}
  @keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(6%,8%) scale(1.1)}66%{transform:translate(-6%,-4%) scale(.95)}}
  body::after{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(120% 80% at 50% 0%,transparent 40%,rgba(8,6,15,.85) 100%)}

  .wrap{width:100%;max-width:460px;display:flex;flex-direction:column;align-items:center;gap:14px;margin:auto 0}

  .top{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{font-size:15px;font-weight:700;letter-spacing:.5px;opacity:.9}
  .brand b{background:linear-gradient(90deg,#9d8bff,#27e0a0);-webkit-background-clip:text;background-clip:text;color:transparent}
  .seg{display:flex;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:999px;padding:3px}
  .seg button{border:0;background:transparent;color:var(--muted);padding:7px 14px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
  .seg button.on{background:linear-gradient(90deg,#7c6cff,#5b8cff);color:#fff;box-shadow:0 4px 14px rgba(124,108,255,.45)}

  .dialWrap{position:relative;width:min(86vw,360px);aspect-ratio:1/1}
  /* dark disc so the canvas never shows as a white box before JS paints it */
  canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;
    background:radial-gradient(circle at 50% 50%,rgba(124,108,255,.06),rgba(8,6,15,0) 72%)}
  .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
  .note{font-size:clamp(58px,22vw,96px);font-weight:800;line-height:.9;letter-spacing:-2px;min-height:0.9em;
    text-shadow:0 0 30px currentColor;transition:color .2s}
  .note small{font-size:.34em;font-weight:700;vertical-align:super;opacity:.6;letter-spacing:0}
  .cents{font-variant-numeric:tabular-nums;font-size:16px;font-weight:700;color:var(--muted);margin-top:4px;height:20px}
  .state{font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-top:8px;height:16px;opacity:.85;transition:.2s}
  .bigstatus{margin:8px auto 0;font-size:clamp(18px,5.5vw,24px);font-weight:800;letter-spacing:.3px;text-align:center;min-height:30px;transition:color .15s}

  .strings{display:flex;justify-content:center;gap:9px;flex-wrap:wrap;width:100%}
  .strings button{position:relative;min-width:50px;height:50px;padding:0 6px;border-radius:14px;
    border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--txt);
    font-weight:800;font-size:15px;cursor:pointer;transition:.25s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
  .strings button .lbl{line-height:1}
  .strings button .oct{font-size:9px;opacity:.5;font-weight:700}
  .strings button.target{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 6px 18px rgba(124,108,255,.4);transform:translateY(-2px)}
  .strings button.pinned{border-color:var(--warn);box-shadow:0 0 0 1px var(--warn),0 6px 18px rgba(255,194,61,.4);transform:translateY(-2px)}
  .strings button.tuned{border-color:var(--good);background:rgba(39,224,160,.14);color:var(--good)}
  .strings button.tuned::after{content:"✓";position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;
    background:var(--good);color:#04211a;font-size:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(39,224,160,.6)}

  .mic{width:100%;max-width:320px;padding:15px;border:0;border-radius:16px;cursor:pointer;
    font-size:16px;font-weight:800;letter-spacing:.3px;color:#fff;
    background:linear-gradient(90deg,#7c6cff,#5b8cff);box-shadow:0 10px 26px rgba(124,108,255,.5);transition:.2s}
  .mic.live{background:linear-gradient(90deg,#ff5d73,#ff7a4d);box-shadow:0 10px 26px rgba(255,93,115,.45)}
  .hint{color:var(--muted);font-size:11.5px;text-align:center;line-height:1.5;max-width:330px}

  .flash{position:fixed;inset:0;z-index:5;pointer-events:none;opacity:0;background:radial-gradient(circle at 50% 45%,rgba(39,224,160,.5),transparent 60%)}
  .flash.go{animation:flash .7s ease-out}
  @keyframes flash{0%{opacity:0}20%{opacity:1}100%{opacity:0}}
  #micLost{position:fixed;inset:0;z-index:45;display:none;align-items:center;justify-content:center;background:rgba(8,6,15,.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
  #micLost.on{display:flex}
  #micLost .card{background:rgba(20,16,38,.96);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:20px 28px;text-align:center;box-shadow:0 18px 50px rgba(0,0,0,.6);max-width:300px;cursor:pointer}
  #micLost .card b{display:block;font-size:17px;margin-bottom:4px}
  #micLost .card span{color:var(--muted);font-size:13px;font-weight:600}
  .done{display:flex;align-items:center;gap:6px;color:var(--good);font-weight:800}
  #rick{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;overflow:hidden;cursor:pointer;background:linear-gradient(180deg,#1a0633 0%,#3a0d5c 45%,#ff2e88 130%)}
  #rick.on{display:flex;animation:rkin .3s ease-out}
  @keyframes rkin{from{opacity:0}to{opacity:1}}
  .rk-grid{position:absolute;left:-50%;right:-50%;bottom:-12%;height:62%;background-image:linear-gradient(rgba(0,255,247,.5) 2px,transparent 2px),linear-gradient(90deg,rgba(0,255,247,.5) 2px,transparent 2px);background-size:46px 46px;transform:perspective(300px) rotateX(72deg);animation:rkgrid 1.1s linear infinite}
  @keyframes rkgrid{from{background-position:0 0}to{background-position:0 46px}}
  .rk-scan{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(transparent,transparent 2px,rgba(0,0,0,.16) 3px)}
  .rk-dancer{font-size:88px;z-index:2;animation:rkb .4s ease-in-out infinite alternate}
  @keyframes rkb{from{transform:translateY(4px) rotate(-9deg)}to{transform:translateY(-22px) rotate(9deg)}}
  .rk-title{z-index:2;font-size:clamp(38px,12vw,68px);font-weight:900;letter-spacing:2px;color:#fff;font-style:italic;text-shadow:0 0 8px #ff2e88,0 0 22px #ff2e88,4px 4px 0 #00fff7}
  .rk-sub{z-index:2;color:#00fff7;font-weight:800;text-shadow:0 0 10px #00fff7}
  .rk-close{z-index:2;color:rgba(255,255,255,.7);font-size:12px;margin-top:22px;font-weight:700;letter-spacing:1px}
#rkvid{max-width:100%;max-height:100%;width:auto;height:100%;object-fit:contain;background:#000;pointer-events:none}
#rkcatch{position:absolute;inset:0;z-index:5;cursor:pointer}
.rk-close{z-index:6;pointer-events:none;position:absolute;bottom:24px;left:0;right:0;text-align:center;z-index:3;color:rgba(255,255,255,.85);font-size:12px;font-weight:700;letter-spacing:1px}

  .ic{width:15px;height:15px;vertical-align:-2.5px}
  .brand svg{color:#9d8bff}

  .navrow{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:12px}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);color:var(--txt);font-size:12.5px;font-weight:700;text-decoration:none;transition:.2s}
  .chip svg{width:14px;height:14px}
  .chip.go{background:rgba(39,224,160,.12);border-color:rgba(39,224,160,.35);color:var(--good)}
  .chip.dim{color:var(--muted)}
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:space-around;align-items:center;padding:6px 10px calc(env(safe-area-inset-bottom) + 6px);background:rgba(10,8,20,.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,.07)}
.tabbar a{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);text-decoration:none;font-size:10px;font-weight:700;letter-spacing:.3px;min-width:56px;padding:4px 0}
.tabbar a svg{width:20px;height:20px}
.tabbar a.on{color:#9d8bff}
</style>
<script src="econ.js"></script>
</head>
<body>
<div class="aurora"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
<div class="flash" id="flash"></div>
<div id="micLost"><div class="card"><b>Mic paused</b><span>tap to resume</span></div></div>

<div class="wrap">
  <div class="top">
    <div class="brand" id="brand"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="url(#pkg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;vertical-align:-3px"><defs><linearGradient id="pkg" x1="0" y1="0" x2="24" y2="0" gradientUnits="userSpaceOnUse"><stop stop-color="#9d8bff"/><stop offset="1" stop-color="#27e0a0"/></linearGradient></defs><path d="M12 21c4.2-3.6 7-7.8 7-11.5A7 7 0 0 0 5 9.5C5 13.2 7.8 17.4 12 21z"/></svg> <b>PLUCK</b></div>
    <div class="seg" id="instrument">
      <button data-inst="guitar" class="on">Guitar</button>
      <button data-inst="ukulele">Uke</button>
    </div>
  </div>

  <div class="dialWrap">
    <canvas id="dial"></canvas>
    <div class="center">
      <div class="note" id="note"></div>
      <div class="cents" id="cents"></div>
      <div class="state" id="state">tap a string ▾</div>
    </div>
  </div>

  <div class="bigstatus" id="bigstatus">play a string ♪</div>

  <div class="strings" id="strings"></div>

  <button class="mic" id="micBtn">Start Tuning</button>
  <div class="hint" id="hint">Tap a string to hear its note · or start the mic and play. Hold it steady in the green — it locks when you nail it.</div>
  <div class="navrow"><a class="chip" href="chord-coach.html"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l10-2v13"/><circle cx="6.5" cy="18" r="2.5"/><circle cx="16.5" cy="16" r="2.5"/></svg> Chord Coach</a><a class="chip" id="chordsChip" href="chords-guitar.html"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 4v16"/><path d="M11 4v16"/><path d="M15 4v16"/><circle cx="9" cy="9" r="1.3" fill="currentColor"/><circle cx="13" cy="13" r="1.3" fill="currentColor"/></svg> Chords</a><a class="chip" href="song-sheet.html"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6"/><path d="M9 17h4"/></svg> Sheets</a><a class="chip dim" href="diag.html"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg> Diagnostics</a></div>
</div>

<script>
const TUNINGS={
  guitar:[{n:'E',o:2,f:82.41},{n:'A',o:2,f:110.00},{n:'D',o:3,f:146.83},{n:'G',o:3,f:196.00},{n:'B',o:3,f:246.94},{n:'E',o:4,f:329.63}],
  ukulele:[{n:'G',o:4,f:392.00},{n:'C',o:4,f:261.63},{n:'E',o:4,f:329.63},{n:'A',o:4,f:440.00}]
};
const A4REF=Math.min(445,Math.max(415,parseFloat(localStorage.getItem('pluckA4'))||440));
for(const k in TUNINGS)TUNINGS[k]=TUNINGS[k].map(s=>({...s,f:s.f*(A4REF/440)}));
const $=id=>document.getElementById(id);
let inst=(localStorage.getItem('pluckInst')==='ukulele')?'ukulele':'guitar', audioCtx=null, analyser=null, micStream=null, running=false, rafId=null;
let tuned={}; // key -> true
let wakeLock=null, watchTimer=null;

/* ---------- string buttons ---------- */
function key(s){return s.n+s.o}
function buildStrings(){
  const w=$('strings'); w.innerHTML='';
  TUNINGS[inst].forEach((s,i)=>{
    const b=document.createElement('button');
    b.dataset.i=i;
    b.innerHTML=`<span class="lbl">${s.n}</span><span class="oct">${s.o}</span>`;
    if(tuned[key(s)])b.classList.add('tuned');
    if(pinnedIdx===i)b.classList.add('pinned');
    let pressT=null,longPressed=false;
    b.addEventListener('pointerdown',()=>{
      longPressed=false;clearTimeout(pressT);
      pressT=setTimeout(()=>{longPressed=true;setPin(pinnedIdx===i?-1:i);},500);
    });
    ['pointerup','pointerleave','pointercancel'].forEach(ev=>b.addEventListener(ev,()=>clearTimeout(pressT)));
    b.addEventListener('click',()=>{ if(longPressed){longPressed=false;return;} playTone(s.f); });
    w.appendChild(b);
  });
}
function markTarget(i){
  [...$('strings').children].forEach((c,j)=>c.classList.toggle('target',j===i));
}
function markTuned(s){
  tuned[key(s)]=true;
  const i=TUNINGS[inst].indexOf(s);
  if($('strings').children[i])$('strings').children[i].classList.add('tuned');
}
function setPin(i){                     // i=-1 unpins
  pinnedIdx=i;switchCand=null;
  [...$('strings').children].forEach((c,j)=>c.classList.toggle('pinned',j===i));
  if(i>=0){lastDetectionAt=performance.now();if(navigator.vibrate)navigator.vibrate(12);}
}

/* ---------- audio: reference tone ---------- */
function ensureCtx(){
  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    // iOS suspends the context on lock / interruption — auto-resume while we're meant to be running
    audioCtx.onstatechange=()=>{
      if(running && audioCtx.state!=='running'){
        audioCtx.resume().catch(()=>{});
        setTimeout(()=>{ if(running && audioCtx.state!=='running') showMicLost(); },1000);
      }else if(audioCtx.state==='running'){ hideMicLost(); }
    };
  }
  return audioCtx;
}

/* ---------- keep awake + recover from mic/audio interruptions ---------- */
async function keepAwake(){
  try{
    if('wakeLock' in navigator && document.visibilityState==='visible' && !wakeLock){
      wakeLock=await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release',()=>{ wakeLock=null; });
    }
  }catch(e){}
}
function releaseWake(){ try{ if(wakeLock){ wakeLock.release(); wakeLock=null; } }catch(e){} }
async function resumeAudio(){ try{ if(audioCtx && audioCtx.state!=='running') await audioCtx.resume(); }catch(e){} }
async function connectMic(){
  micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,autoGainControl:false,noiseSuppression:false}});
  const src=audioCtx.createMediaStreamSource(micStream);
  analyser=audioCtx.createAnalyser(); analyser.fftSize=4096; src.connect(analyser);
  micStream.getAudioTracks().forEach(t=>{ t.onended=()=>{ if(running) reconnectMic(); }; });
  try{const tr=micStream.getAudioTracks()[0];if(tr)localStorage.setItem('pluckMicSettings',JSON.stringify(tr.getSettings()));}catch(e){}
  hideMicLost();
}
let micReconnecting=false;
function reconnectMic(){
  if(micReconnecting)return;
  micReconnecting=true;
  connectMic().catch(()=>{ showMicLost(); }).finally(()=>{ micReconnecting=false; });
}
function watchdog(){
  if(!running) return; resumeAudio(); keepAwake();
  if(audioCtx&&audioCtx.state!=='running'){
    setTimeout(()=>{ if(running&&audioCtx&&audioCtx.state!=='running') showMicLost(); },1000);
  }
  if(micStream&&!micStream.getAudioTracks().some(t=>t.readyState==='live')) reconnectMic();
}
function playTone(freq){
  const ctx=ensureCtx(); if(ctx.state==='suspended')ctx.resume();
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type='triangle';o.frequency.value=freq;
  g.gain.setValueAtTime(0,ctx.currentTime);
  g.gain.linearRampToValueAtTime(0.3,ctx.currentTime+0.02);
  g.gain.exponentialRampToValueAtTime(0.0008,ctx.currentTime+1.6);
  o.connect(g).connect(ctx.destination);o.start();o.stop(ctx.currentTime+1.7);
}
function chime(){
  const ctx=ensureCtx(); if(ctx.state!=='running')ctx.resume(); const now=ctx.currentTime;
  const notes=[523.25,659.25,783.99,1046.50];        // C-E-G-C, bright ascending major
  notes.forEach((f,i)=>{
    const t=now+i*0.085;
    [[f,'sine',0.22],[f*2,'sine',0.05],[f,'triangle',0.05]].forEach(([freq,type,amp])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type=type;o.frequency.value=freq;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(amp,t+0.012);
      g.gain.exponentialRampToValueAtTime(0.0006,t+0.6);
      o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+0.65);
    });
  });
  const t2=now+0.34, o=ctx.createOscillator(), g=ctx.createGain();   // final shimmer up
  o.type='sine';o.frequency.setValueAtTime(1046.5,t2);o.frequency.exponentialRampToValueAtTime(1567.98,t2+0.45);
  g.gain.setValueAtTime(0,t2);g.gain.linearRampToValueAtTime(0.12,t2+0.03);g.gain.exponentialRampToValueAtTime(0.0005,t2+0.7);
  o.connect(g).connect(ctx.destination);o.start(t2);o.stop(t2+0.75);
}

/* ---------- mic ---------- */
async function toggleMic(){
  if(running)return stopMic();
  try{
    const ctx=ensureCtx(); if(ctx.state!=='running')await ctx.resume();
    await connectMic();
    running=true;
    $('micBtn').textContent='Stop';$('micBtn').classList.add('live');
    $('state').textContent='listening…';
    keepAwake();
    if(!watchTimer)watchTimer=setInterval(watchdog,1200);
    loop();
  }catch(e){$('state').textContent='mic blocked';}
}
function stopMic(){
  running=false;cancelAnimationFrame(rafId);
  if(watchTimer){clearInterval(watchTimer);watchTimer=null;}
  releaseWake();
  if(micStream)micStream.getTracks().forEach(t=>t.stop());
  $('micBtn').textContent='Start Tuning';$('micBtn').classList.remove('live');
  $('note').textContent='';$('note').style.color='';$('cents').textContent='';
  $('state').textContent='tap a string ▾';markTarget(-1);hideMicLost();
  lockHold=0;lockProg=0;locked=false;stabWin.length=0;prevTargetKey='';history.length=0;
  switchCand=null;lastClarity=0;lastCol=null;
  render(0,0,false,0,null);
}

const buf=new Float32Array(4096);
let history=[];           // recent valid freqs (median filter)
let smoothCents=0;        // eased needle value
let target=null, lockHold=0, lockProg=0, locked=false, lastT=performance.now(), _a440=0;
let particles=[];
let graceUntil=0;
let prevTargetKey='';                    // lock state resets when this changes
let stabWin=[];                          // {t,c} readings vs current target, last 450ms
let switchCand=null, switchSince=0;      // sticky-target auto-switch tracking
let pinnedIdx=-1;                        // long-press pinned string (-1 = none)
let lastDetectRun=0, lastDetectionAt=0;  // 30ms detection throttle + silence clock
let lastClarity=0, lastCol=null;         // cached for throttled render frames

function detect(b,rate){
  const n=b.length;
  let rms=0;for(let i=0;i<n;i++)rms+=b[i]*b[i];rms=Math.sqrt(rms/n);
  if(rms<0.004)return null;                       // loudness gate (lowered = more sensitive)
  const minLag=Math.floor(rate/1300), maxLag=Math.floor(rate/70);
  // Normalized square-difference (McLeod Pitch Method) — robust against octave jumps
  const nsdf=new Float32Array(maxLag+1);
  for(let tau=minLag;tau<=maxLag;tau++){
    let ac=0,m=0;
    for(let j=0;j+tau<n;j++){ac+=b[j]*b[j+tau];m+=b[j]*b[j]+b[j+tau]*b[j+tau];}
    nsdf[tau]=m>0?2*ac/m:0;
  }
  let tau=minLag;
  while(tau<maxLag&&nsdf[tau]>0)tau++;             // skip the initial descending lobe
  let peaks=[],maxPeak=0;
  while(tau<maxLag){
    if(nsdf[tau]>0){
      let pt=tau,pv=nsdf[tau];
      while(tau<maxLag&&nsdf[tau]>0){if(nsdf[tau]>pv){pv=nsdf[tau];pt=tau;}tau++;}
      peaks.push([pt,pv]);if(pv>maxPeak)maxPeak=pv;
    }else tau++;
  }
  if(!peaks.length||maxPeak<0.45)return null;      // clarity gate
  const thresh=maxPeak*0.9;                         // first strong peak = true fundamental
  let pt=-1,pv=0;
  for(const p of peaks){if(p[1]>=thresh){pt=p[0];pv=p[1];break;}}
  if(pt<1)return null;
  const a=nsdf[pt-1],bb=nsdf[pt],cc=nsdf[pt+1];     // parabolic interpolation
  const sh=(a-cc)/(2*(a-2*bb+cc));
  const period=pt+(isFinite(sh)?sh:0);
  const f=rate/period;
  // polyphony flag: a strong secondary peak whose lag ratio to the winner is
  // >6% away from every integer 1..4 is not a harmonic -> two notes sounding
  let poly=false;
  for(const p of peaks){
    if(p[0]===pt||p[1]<0.8*maxPeak)continue;
    const r=p[0]>pt?p[0]/pt:pt/p[0];
    let harmonic=false;
    for(let m=1;m<=4;m++){if(Math.abs(r-m)/m<=0.06){harmonic=true;break;}}
    if(!harmonic){poly=true;break;}
  }
  return (f>60&&f<1300)?{f,clarity:pv,poly}:null;
}
function median(arr){const s=[...arr].sort((x,y)=>x-y);return s[Math.floor(s.length/2)];}

function nearestString(f){
  let best=null,bd=1e9;
  for(const s of TUNINGS[inst]){
    const c=Math.abs(1200*Math.log2(f/s.f));
    if(c<bd){bd=c;best=s;}
  }
  return {s:best,cents:1200*Math.log2(f/best.f)};
}

function loop(){
  const now=performance.now();let dt=(now-lastT)/1000;lastT=now;if(dt>0.1)dt=0.1;

  // detection is time-gated to every 30ms so 120Hz displays don't double the DSP work
  if(now-lastDetectRun>=30){
    let ddt=(now-lastDetectRun)/1000;if(ddt>0.1)ddt=0.1;
    lastDetectRun=now;
    analyser.getFloatTimeDomainData(buf);
    const res=detect(buf,audioCtx.sampleRate);
    if(res)lastDetectionAt=now;
    tick(res,now,ddt);
  }else{
    // throttled frame: keep the needle animating from cached state
    render(smoothCents,lastClarity,locked,lockProg,lastCol);
  }
  stepParticles(dt);
  rafId=requestAnimationFrame(loop);
}

function tick(res,now,dt){
  if(res){
    history.push(res.f);if(history.length>8)history.shift();
    const f=median(history);

    // ---- target selection: pinned > sticky current > nearest ----
    const cand=nearestString(f);
    let s;
    if(pinnedIdx>=0&&TUNINGS[inst][pinnedIdx]){
      s=TUNINGS[inst][pinnedIdx];switchCand=null;      // manual pin: never auto-switch
    }else if(target&&TUNINGS[inst].indexOf(target)>=0&&cand.s!==target){
      // only switch if the candidate is >100 cents closer, continuously for >0.75s
      const curAbs=Math.abs(1200*Math.log2(f/target.f));
      if(Math.abs(cand.cents)<curAbs-100){
        if(switchCand!==cand.s){switchCand=cand.s;switchSince=now;}
        s=(now-switchSince>750)?cand.s:target;
      }else{switchCand=null;s=target;}
    }else{switchCand=null;s=cand.s;}
    target=s;
    const cents=1200*Math.log2(f/s.f);
    markTarget(TUNINGS[inst].indexOf(s));

    // ---- reset lock state on target change (kills strum lock carryover) ----
    const tk=key(s);
    if(tk!==prevTargetKey){
      prevTargetKey=tk;lockHold=0;locked=false;stabWin.length=0;smoothCents=cents;
    }

    // ---- stability window: readings vs this target over the last 450ms ----
    stabWin.push({t:now,c:cents});
    while(stabWin.length&&now-stabWin[0].t>450)stabWin.shift();
    let mn=Infinity,mx=-Infinity;for(const e of stabWin){if(e.c<mn)mn=e.c;if(e.c>mx)mx=e.c;}
    const span=now-stabWin[0].t;
    const spreadOk=(mx-mn)<=12;
    const winStable=span>=350&&spreadOk&&!res.poly;

    // ---- adaptive needle damping: calm near pitch, responsive far away ----
    const ad=Math.abs(cents);
    const alpha=ad<=10?0.12:(ad>=25?0.35:0.12+((ad-10)/15)*0.23);
    smoothCents+=(cents-smoothCents)*alpha;
    graceUntil=now+550;                            // hold this reading briefly if sound drops

    // ---- lock logic: credit needs a clean, steady, monophonic reading;
    //      the lock itself only fires once the window is stable for 350ms ----
    const a=Math.abs(cents);
    // ---- easter egg: dead-on the A4 (440) string, held ~3s -> Perfect Pitch ----
    if(s.n==='A'&&s.o===4&&a<=2){_a440+=dt;if(_a440>=3){_a440=-999;perfectPitch();}} else if(a>4){_a440=0;}
    if(a<=8&&spreadOk&&!res.poly){lockHold+=dt*1.4;}
    else if(a<=18&&locked){/* stay locked */}
    else if(a<=15){/* hold credit */}
    else {lockHold=Math.max(0,lockHold-dt*0.8);if(a>30)locked=false;}
    lockProg=Math.min(1,lockHold/0.4);
    if(lockProg>=1&&winStable&&a<=8&&!locked){locked=true;celebrate(s);}
    if(locked&&a>22)locked=false;

    // ---- tick hygiene: a genuinely stable out-of-tune reading clears the checkmark ----
    if(winStable&&a>15&&tuned[tk]){
      delete tuned[tk];
      const bi=TUNINGS[inst].indexOf(s);
      if($('strings').children[bi])$('strings').children[bi].classList.remove('tuned');
    }

    // ---- readout: cents text, state line and bigstatus all read smoothCents ----
    const sc=smoothCents,sa=Math.abs(sc);
    $('note').innerHTML=`${s.n}<small>${s.o}</small>`;
    $('cents').textContent=(sc>=0?'+':'')+Math.round(sc)+'¢';
    let col;
    if(locked||sa<=8){col=getCss('--good');$('state').innerHTML=locked?'<span class="done">LOCKED ✓</span>':'in tune';}
    else if(sa<=25){col=getCss('--warn');$('state').textContent=sc>0?'a touch sharp':'a touch flat';}
    else{col=getCss('--bad');$('state').textContent=sc>0?'too sharp · loosen':'too flat · tighten';}
    $('note').style.color=col;
    const nm=s.n+s.o;
    if(locked||sa<=8){$('bigstatus').innerHTML='<b>'+nm+'</b> — IN TUNE ✓';$('bigstatus').style.color=getCss('--good');}
    else if(sc<0){$('bigstatus').innerHTML='Hearing <b>'+nm+'</b> — TIGHTEN ▲';$('bigstatus').style.color=getCss(sa<=25?'--warn':'--bad');}
    else{$('bigstatus').innerHTML='Hearing <b>'+nm+'</b> — LOOSEN ▼';$('bigstatus').style.color=getCss(sa<=25?'--warn':'--bad');}
    lastClarity=res.clarity;lastCol=col;
    render(smoothCents,res.clarity,locked,lockProg,col);
  }else if(now<graceUntil){
    // momentary dropout — keep the display steady so it doesn't flicker
    lockHold=Math.max(0,lockHold-dt*0.4);lockProg=Math.min(1,lockHold/0.4);
    lastClarity=0;lastCol=$('note').style.color||null;
    render(smoothCents,0,locked,lockProg,lastCol);
  }else{
    history.length=0;lockHold=Math.max(0,lockHold-dt*1.2);lockProg=Math.min(1,lockHold/0.4);
    smoothCents*=0.9;stabWin.length=0;
    if(pinnedIdx>=0&&lastDetectionAt&&now-lastDetectionAt>10000)setPin(-1);   // 10s of silence unpins
    if(!locked){$('state').textContent='listening…';markTarget(-1);$('note').textContent='';$('note').style.color='';$('cents').textContent='';$('bigstatus').textContent='play a string ♪';$('bigstatus').style.color=getCss('--muted');}
    lastClarity=0;lastCol=null;
    render(smoothCents,0,locked,lockProg,null);
  }
}

const _cssCache={};function getCss(v){let c=_cssCache[v];if(c===undefined){c=getComputedStyle(document.documentElement).getPropertyValue(v).trim();_cssCache[v]=c;}return c;}

function perfectPitch(){
  try{if(navigator.vibrate)navigator.vibrate([12,30,12,30,40]);}catch(e){}
  if(!window.Pluck)return;
  const first=Pluck.unlock('perfectpitch');
  if(first){Pluck.addPicks(5,'PERFECT PITCH 🎯');Pluck.toast('🎯 PERFECT PITCH — secret song unlocked in Songs!','good',3600);}
  else{Pluck.toast('🎯 Perfect pitch! (already unlocked)','good');}
}
function celebrate(s){
  markTuned(s);chime();
  if(navigator.vibrate)navigator.vibrate([18,40,18]);
  $('flash').classList.remove('go');void $('flash').offsetWidth;$('flash').classList.add('go');
  burst();
}

/* ---------- canvas dial ---------- */
const cv=$('dial'),cx2=cv.getContext('2d');let W=0,H=0,DPR=1,CX=0,CY=0,Rad=0;
function sizeCanvas(){
  DPR=Math.min(devicePixelRatio||1,2);
  const r=cv.getBoundingClientRect();
  if(r.width<2){requestAnimationFrame(()=>{sizeCanvas();render(smoothCents,0,locked,lockProg,null);});return false;}
  W=r.width;H=r.height;cv.width=W*DPR;cv.height=H*DPR;cx2.setTransform(DPR,0,0,DPR,0,0);
  CX=W/2;CY=H/2;Rad=Math.min(W,H)/2-6;return true;
}
window.addEventListener('resize',()=>{sizeCanvas();render(smoothCents,0,locked,lockProg,null);});
if(window.ResizeObserver)new ResizeObserver(()=>{sizeCanvas();render(smoothCents,0,locked,lockProg,null);}).observe(cv);

const A0=Math.PI*0.75, A1=Math.PI*2.25; // 270° arc, opening at bottom
function render(cents,clarity,isLocked,prog,col){
  if(!W)sizeCanvas();
  cx2.clearRect(0,0,W,H);
  const cl=Math.max(-50,Math.min(50,cents));
  const segs=41;
  for(let i=0;i<segs;i++){
    const t=i/(segs-1);                 // 0..1 across -50..+50
    const cval=(t-0.5)*100;
    const ang=A0+(A1-A0)*t;
    const near=Math.abs(cval-cl)<2.0;   // current position
    const inGreen=Math.abs(cval)<=5;
    let c,alpha=.18,len=12;
    if(inGreen){c='39,224,160';alpha=.3;}
    else if(Math.abs(cval)<=15){c='255,194,61';alpha=.22;}
    else{c='255,93,115';alpha=.2;}
    if(near){alpha=1;len=20;}
    const r0=Rad-len,r1=Rad;
    cx2.strokeStyle=`rgba(${c},${alpha})`;
    cx2.lineWidth=near?6:4;cx2.lineCap='round';
    cx2.beginPath();
    cx2.moveTo(CX+Math.cos(ang)*r0,CY+Math.sin(ang)*r0);
    cx2.lineTo(CX+Math.cos(ang)*r1,CY+Math.sin(ang)*r1);
    if(near){cx2.shadowColor=`rgba(${c},.9)`;cx2.shadowBlur=16;}else cx2.shadowBlur=0;
    cx2.stroke();
  }
  cx2.shadowBlur=0;

  // lock progress ring
  if(prog>0){
    cx2.beginPath();
    cx2.arc(CX,CY,Rad-30,A0,A0+(A1-A0)*1*prog*((cl>=-5&&cl<=5)?1:0.0001));
    cx2.strokeStyle=`rgba(39,224,160,${0.4+0.6*prog})`;
    cx2.lineWidth=4;cx2.lineCap='round';
    cx2.shadowColor='rgba(39,224,160,.8)';cx2.shadowBlur=14*prog;
    cx2.stroke();cx2.shadowBlur=0;
  }

  // needle
  const ang=A0+(A1-A0)*((cl+50)/100);
  const nx=CX+Math.cos(ang)*(Rad-26),ny=CY+Math.sin(ang)*(Rad-26);
  const ncol=col||'124,108,255';
  const cssCol=col?col:'rgb(124,108,255)';
  cx2.strokeStyle=cssCol;cx2.lineWidth=isLocked?7:5;cx2.lineCap='round';
  cx2.shadowColor=cssCol;cx2.shadowBlur=isLocked?26:14;
  cx2.beginPath();cx2.moveTo(CX,CY);cx2.lineTo(nx,ny);cx2.stroke();
  // hub
  cx2.shadowBlur=0;cx2.fillStyle=cssCol;
  cx2.beginPath();cx2.arc(CX,CY,8,0,7);cx2.fill();
  cx2.fillStyle='rgba(8,6,15,.9)';cx2.beginPath();cx2.arc(CX,CY,4,0,7);cx2.fill();

  drawParticles();
}

/* ---------- particle burst on lock ---------- */
function burst(){
  for(let i=0;i<28;i++){
    const a=Math.random()*Math.PI*2,sp=2+Math.random()*4;
    particles.push({x:CX,y:CY-Rad*0.3,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,life:1,
      c:Math.random()<0.5?'39,224,160':'124,108,255'});
  }
}
function stepParticles(dt){
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=dt*1.4;});
  particles=particles.filter(p=>p.life>0);
}
function drawParticles(){
  particles.forEach(p=>{
    cx2.globalAlpha=Math.max(0,p.life);
    cx2.fillStyle=`rgb(${p.c})`;
    cx2.beginPath();cx2.arc(p.x,p.y,3*p.life+1,0,7);cx2.fill();
  });
  cx2.globalAlpha=1;
}

/* ---------- wiring ---------- */
$('instrument').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  inst=b.dataset.inst;try{localStorage.setItem('pluckInst',inst);}catch(e){}tuned={};if(typeof updateChordsChip==='function')updateChordsChip();
  target=null;prevTargetKey='';lockHold=0;lockProg=0;locked=false;
  stabWin.length=0;switchCand=null;pinnedIdx=-1;history.length=0;
  [...$('instrument').children].forEach(c=>c.classList.toggle('on',c===b));
  buildStrings();
});
[...$('instrument').children].forEach(c=>c.classList.toggle('on',c.dataset.inst===inst));
function updateChordsChip(){const el=$('chordsChip');if(el)el.href=(inst==='ukulele')?'chords-uke.html':'chords-guitar.html';}
updateChordsChip();
$('micBtn').addEventListener('click',toggleMic);
function showMicLost(){$('micLost').classList.add('on');}
function hideMicLost(){$('micLost').classList.remove('on');}
$('micLost').addEventListener('click',async()=>{
  try{
    const ctx=ensureCtx(); if(ctx.state!=='running')await ctx.resume();
    const live=micStream&&micStream.getAudioTracks().some(t=>t.readyState==='live');
    if(!live)await connectMic();
    if(audioCtx.state==='running')hideMicLost();
  }catch(e){/* keep the overlay up — resume genuinely failed */}
});
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible'&&running){ resumeAudio(); keepAwake(); } });

sizeCanvas();buildStrings();render(0,0,false,0,null);

/* ---------- secret: tap the logo 7x ---------- */
let _bt=0,_btT=0,_rkOsc=[];
function rkVoice(ctx,freq,t,dur,type,vol){const o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.01);g.gain.exponentialRampToValueAtTime(0.0006,t+dur);o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+dur+0.05);_rkOsc.push(o);}
function rkStop(){_rkOsc.forEach(o=>{try{o.stop()}catch(e){}});_rkOsc=[];}
function rkPlay(){const ctx=ensureCtx();if(ctx.state!=='running')ctx.resume();rkStop();const f=s=>440*Math.pow(2,s/12);
  const lead=[0,4,7,12,7,4, 2,5,9,14,9,5, 4,7,11,16,11,7, 0,7,12,16,12,7];
  const bass=[-12,-5,-10,-3,-8,-1,-12,-5];const spb=60/124/2;let t=ctx.currentTime+0.06;
  for(let r=0;r<4;r++){lead.forEach((s,k)=>rkVoice(ctx,f(s),t+k*spb,spb*0.9,'sawtooth',0.11));bass.forEach((s,k)=>rkVoice(ctx,f(s),t+k*(spb*3),spb*2.6,'square',0.16));t+=lead.length*spb;}}
function _rkClose(e){if(e){e.preventDefault();e.stopPropagation();}hideRick();}
function showRick(){$('rick').classList.add('on');const v=$('rkvid');try{v.loop=true;v.currentTime=0;v.muted=false;v.play();}catch(e){}setTimeout(function(){document.addEventListener('pointerdown',_rkClose,true);document.addEventListener('touchstart',_rkClose,true);document.addEventListener('click',_rkClose,true);},120);}
function hideRick(){$('rick').classList.remove('on');const v=$('rkvid');try{v.pause();}catch(e){}document.removeEventListener('pointerdown',_rkClose,true);document.removeEventListener('touchstart',_rkClose,true);document.removeEventListener('click',_rkClose,true);}
$('brand').addEventListener('click',()=>{const n=performance.now();if(n-_btT>2500)_bt=0;_btT=n;if(++_bt>=7){_bt=0;showRick();}});
['click','touchend','pointerup'].forEach(ev=>{$('rick').addEventListener(ev,hideRick);$('rkcatch').addEventListener(ev,e=>{e.preventDefault();hideRick();});});
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{}));
}
