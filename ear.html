<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pluck · Ear & Rhythm</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#08060f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pluck">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<style>
  :root{--bg:#08060f;--txt:#eef1ff;--muted:#9aa0c8;--accent:#7c6cff;--good:#27e0a0;--warn:#ffc23d;--bad:#ff5d73}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{background:var(--bg);color:var(--txt);overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;align-items:center;padding:calc(env(safe-area-inset-top) + 10px) 16px calc(env(safe-area-inset-bottom) + 16px);-webkit-user-select:none;user-select:none}
  .aurora{position:fixed;inset:-30%;z-index:-2;filter:blur(70px);opacity:.45}
  .blob{position:absolute;border-radius:50%;mix-blend-mode:screen}
  .b1{width:55vmax;height:55vmax;background:#5b4bff;left:-10%;top:-10%}.b2{width:45vmax;height:45vmax;background:#16d6a2;right:-10%;bottom:0}
  .wrap{width:100%;max-width:460px;display:flex;flex-direction:column;align-items:center;gap:14px;margin:auto 0}
  .top{width:100%;display:flex;align-items:center;justify-content:space-between}
  a.back{color:var(--muted);text-decoration:none;font-size:14px;font-weight:600}
  .brand{font-size:15px;font-weight:700}.brand b{color:#9d8bff}
  .seg{display:flex;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:999px;padding:3px}
  .seg button{border:0;background:transparent;color:var(--muted);padding:8px 16px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer}
  .seg button.on{background:linear-gradient(90deg,#7c6cff,#5b8cff);color:#fff}
  .score{font-size:13px;font-weight:800;color:var(--muted)}
  .prompt{font-size:18px;font-weight:800;text-align:center;min-height:24px}
  .sub{font-size:13px;color:var(--muted);text-align:center;line-height:1.5;max-width:340px}
  .opts{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .opts button{min-width:74px;padding:18px 14px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:var(--txt);font-weight:800;font-size:20px;cursor:pointer;transition:.15s}
  .opts button.right{background:rgba(39,224,160,.2);border-color:var(--good);color:var(--good)}
  .opts button.wrong{background:rgba(255,93,115,.2);border-color:var(--bad);color:var(--bad)}
  .dots{display:flex;gap:6px;justify-content:center;margin:6px 0}
  .dots .d{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.1);transition:.1s}
  .dots .d.hit{background:#3a3f66}
  .dots .d.on{background:var(--accent);box-shadow:0 0 14px var(--accent);transform:scale(1.2)}
  .pad{width:200px;height:200px;border-radius:24px;background:linear-gradient(180deg,#7c6cff,#5b8cff);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;cursor:pointer;box-shadow:0 12px 30px rgba(124,108,255,.45);user-select:none}
  .pad:active{transform:scale(.97)}
  button.primary{padding:14px 24px;border:0;border-radius:16px;cursor:pointer;font-size:16px;font-weight:800;color:#fff;background:linear-gradient(90deg,#7c6cff,#5b8cff)}
  button.ghost{padding:12px 16px;border:1px solid rgba(255,255,255,.14);border-radius:14px;background:transparent;color:var(--muted);font-weight:700;font-size:14px;cursor:pointer}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
  .big{font-size:58px;font-weight:800}
</style>
</head>
<body>
<div class="aurora"><div class="blob b1"></div><div class="blob b2"></div></div>
<div class="wrap">
  <div class="top"><a class="back" href="lessons.html">← Lessons</a><div class="brand">👂 <b>EAR & RHYTHM</b></div><div class="score" id="score"></div></div>
  <div class="seg" id="modeseg"><button data-m="chord" class="on">Name that Chord</button><button data-m="rhythm">Rhythm Echo</button></div>

  <!-- CHORD EAR -->
  <div id="chordGame" style="display:flex;flex-direction:column;align-items:center;gap:14px;width:100%">
    <div class="prompt" id="cprompt">Listen, then tap the chord you hear</div>
    <div class="row"><button class="primary" id="cplay">▶ Play chord</button><button class="ghost" id="creplay">↻ Again</button></div>
    <div class="opts" id="copts"></div>
    <div class="sub" id="cresult"></div>
  </div>

  <!-- RHYTHM ECHO -->
  <div id="rhythmGame" style="display:none;flex-direction:column;align-items:center;gap:14px;width:100%">
    <div class="prompt" id="rprompt">Listen to the rhythm, then tap it back</div>
    <div class="dots" id="rdots"></div>
    <div class="row"><button class="primary" id="rplay">▶ Play rhythm</button></div>
    <div class="pad" id="rpad">TAP</div>
    <div class="sub" id="rresult">Tap the pad in the same rhythm — any speed, it's the pattern that counts.</div>
    <div class="row"><button class="ghost" id="rnext" style="display:none">Next rhythm →</button></div>
  </div>
</div>

<script>
const CHORDS={
  'C':{frets:[0,0,0,3]},'Am':{frets:[2,0,0,0]},'F':{frets:[2,0,1,0]},'G':{frets:[0,2,3,2]},
  'Dm':{frets:[2,2,1,0]},'Em':{frets:[0,4,3,2]},'C7':{frets:[0,0,0,1]},'G7':{frets:[0,2,1,2]},
  'D':{frets:[2,2,2,0]},'A':{frets:[2,1,0,0]},'E':{frets:[1,4,0,2]},'Bb':{frets:[3,2,1,1]},'F#m':{frets:[2,1,2,0]},'Bm':{frets:[4,2,2,2]}
};
const BASE=[67,60,64,69];
const $=id=>document.getElementById(id);
const LMAP={1:['C','Am'],2:['F'],3:['G'],4:['Dm'],5:['D','A'],6:['C7','G7'],7:['Bb'],8:[],9:['Em'],10:['E'],11:['F#m','Bm'],12:[],13:[]};
function learned(){let o=[];for(let i=1;i<=13;i++){if(localStorage.getItem('pluckLesson'+i)==='done'&&LMAP[i])o=o.concat(LMAP[i]);}o=[...new Set(o)];return o.length>=3?o:['C','Am','F','G','Dm','Em'];}

let audioCtx=null;
function ctx(){if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state!=='running')audioCtx.resume();return audioCtx;}
function playChord(name){const c=ctx(),now=c.currentTime;CHORDS[name].frets.forEach((fr,i)=>{const f=440*Math.pow(2,(BASE[i]+fr-69)/12),t=now+i*0.04;
  const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.17,t+0.01);g.gain.exponentialRampToValueAtTime(0.0008,t+1.7);o.connect(g).connect(c.destination);o.start(t);o.stop(t+1.8);});}
function click(t,hi){const c=ctx();const o=c.createOscillator(),g=c.createGain();o.type='square';o.frequency.value=hi?1500:1100;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.22,t+0.004);g.gain.exponentialRampToValueAtTime(0.0006,t+0.06);o.connect(g).connect(c.destination);o.start(t);o.stop(t+0.09);}
function ding(ok){const c=ctx(),now=c.currentTime;(ok?[660,990,1320]:[300,260]).forEach((f,i)=>{const t=now+i*0.08,o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.2,t+0.01);g.gain.exponentialRampToValueAtTime(0.0006,t+0.4);o.connect(g).connect(c.destination);o.start(t);o.stop(t+0.45);});}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ---------- Name that Chord ---------- */
let cTarget='',cRound=0,cScore=0,cLocked=false;
function newChordRound(){
  cLocked=false;cRound++;const pool=learned();
  cTarget=pool[Math.floor(Math.random()*pool.length)];
  const decoys=shuffle(pool.filter(x=>x!==cTarget)).slice(0,Math.min(3,pool.length-1));
  const opts=shuffle([cTarget,...decoys]);
  $('copts').innerHTML='';opts.forEach(n=>{const b=document.createElement('button');b.textContent=n;b.onclick=()=>answerChord(n,b);$('copts').appendChild(b);});
  $('cresult').textContent='';$('score').textContent='Round '+cRound+'/10 · '+cScore;
  setTimeout(()=>playChord(cTarget),250);
}
function answerChord(name,btn){
  if(cLocked)return;cLocked=true;
  if(name===cTarget){btn.classList.add('right');cScore++;ding(true);$('cresult').textContent='Yes — '+cTarget+'! 🎉';}
  else{btn.classList.add('wrong');ding(false);[...$('copts').children].forEach(b=>{if(b.textContent===cTarget)b.classList.add('right');});$('cresult').textContent='It was '+cTarget+'.';}
  $('score').textContent='Round '+cRound+'/10 · '+cScore;
  setTimeout(()=>{ if(cRound>=10){$('cprompt').textContent='Ear training done!';$('cresult').innerHTML='You got <b>'+cScore+'/10</b>. '+(cScore>=8?'Great ear!':cScore>=5?'Solid — keep going.':'Keep practicing, it builds fast.')+'<br>Tap ▶ to play again.';cRound=0;cScore=0;} else newChordRound(); },1300);
}

/* ---------- Rhythm Echo ---------- */
const RHYTHMS=[
  {name:'Quarter notes', slots:[1,0,1,0,1,0,1,0]},
  {name:'Backbeat',      slots:[1,0,0,0,1,0,0,0]},
  {name:'Eighth run',    slots:[1,1,1,1,0,0,0,0]},
  {name:'Syncopated',    slots:[1,0,1,1,0,1,0,0]},
  {name:'Island-ish',    slots:[1,0,1,1,0,1,1,0]}
];
let rIdx=0,rTaps=[],rExpect=[],rPlaying=false,rTapping=false;
const EIGHTH=0.32;
function buildDots(){const sl=RHYTHMS[rIdx].slots;$('rdots').innerHTML='';sl.forEach((h,i)=>{const d=document.createElement('div');d.className='d'+(h?' hit':'');d.dataset.i=i;$('rdots').appendChild(d);});}
function playRhythm(){
  const sl=RHYTHMS[rIdx].slots;rExpect=[];sl.forEach((h,i)=>{if(h)rExpect.push(i*EIGHTH);});
  const c=ctx(),t0=c.currentTime+0.3;rPlaying=true;rTapping=false;rTaps=[];
  $('rprompt').textContent='Listen…';$('rresult').textContent=RHYTHMS[rIdx].name;$('rnext').style.display='none';
  sl.forEach((h,i)=>{if(h){click(t0+i*EIGHTH,i===0);}});
  // visual
  sl.forEach((h,i)=>{setTimeout(()=>{const d=$('rdots').children[i];if(d){d.classList.add('on');setTimeout(()=>d.classList.remove('on'),140);}},(0.3+i*EIGHTH)*1000);});
  const totalMs=(0.3+sl.length*EIGHTH)*1000;
  setTimeout(()=>{rPlaying=false;rTapping=true;$('rprompt').textContent='Your turn — tap it back!';$('rresult').textContent='tap the pad '+rExpect.length+' times in that rhythm';},totalMs+200);
}
function tapPad(){
  if(!rTapping)return;
  rTaps.push(performance.now());
  const d=$('rdots').children[Math.min(rTaps.length-1,7)];
  if(rTaps.length>=rExpect.length){rTapping=false;scoreRhythm();}
}
function scoreRhythm(){
  // compare relative inter-onset intervals (tempo-independent)
  const exp=rExpect, taps=rTaps.map(t=>(t-rTaps[0])/1000);
  if(exp.length<2){ // single hit — just count it
    $('rprompt').textContent='Got it!';$('rresult').textContent='Nice. Try the next one.';ding(true);$('rnext').style.display='';return;}
  const ei=[],ti=[];for(let i=1;i<exp.length;i++){ei.push(exp[i]-exp[i-1]);ti.push(taps[i]-taps[i-1]);}
  const es=ei.reduce((a,b)=>a+b,0),ts=ti.reduce((a,b)=>a+b,0)||1;
  let err=0;for(let i=0;i<ei.length;i++)err+=Math.abs(ei[i]/es - ti[i]/ts);
  err/=ei.length;
  const pct=Math.max(0,Math.round((1-err*3)*100));
  ding(pct>=60);
  $('rprompt').textContent=pct>=85?'Spot on! 🎯':pct>=60?'Close!':'Not quite';
  $('rresult').textContent='Rhythm match: '+pct+'%';
  $('rnext').style.display='';
}
function nextRhythm(){rIdx=(rIdx+1)%RHYTHMS.length;buildDots();$('rprompt').textContent='Listen to the rhythm, then tap it back';$('rresult').textContent='tap ▶ Play rhythm';$('rnext').style.display='none';}

/* ---------- wiring ---------- */
$('modeseg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;[...$('modeseg').children].forEach(c=>c.classList.toggle('on',c===b));
  const m=b.dataset.m;$('chordGame').style.display=m==='chord'?'flex':'none';$('rhythmGame').style.display=m==='rhythm'?'flex':'none';$('score').textContent='';
  if(m==='rhythm'){buildDots();$('rprompt').textContent='Listen to the rhythm, then tap it back';}});
$('cplay').addEventListener('click',()=>{if(cRound===0||$('copts').children.length===0)newChordRound();else if(!cLocked)playChord(cTarget);});
$('creplay').addEventListener('click',()=>{if(cTarget)playChord(cTarget);});
$('rplay').addEventListener('click',playRhythm);
$('rpad').addEventListener('click',tapPad);
$('rnext').addEventListener('click',nextRhythm);
buildDots();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{}));}
</script>
</body>
</html>
