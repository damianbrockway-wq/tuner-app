<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pluck · Lessons</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#08060f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pluck">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<style>
  :root{--bg:#08060f;--txt:#eef1ff;--muted:#9aa0c8;--accent:#7c6cff;--good:#27e0a0}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;align-items:center;min-height:100%;
    padding:calc(env(safe-area-inset-top) + 10px) 16px calc(env(safe-area-inset-bottom) + 16px);-webkit-user-select:none;user-select:none}
  .aurora{position:fixed;inset:-30%;z-index:-2;filter:blur(70px);opacity:.45}
  .blob{position:absolute;border-radius:50%;mix-blend-mode:screen}
  .b1{width:55vmax;height:55vmax;background:#5b4bff;left:-10%;top:-10%}
  .b2{width:45vmax;height:45vmax;background:#16d6a2;right:-10%;bottom:0}
  .wrap{width:100%;max-width:460px;display:flex;flex-direction:column;gap:14px}
  .top{display:flex;align-items:center;justify-content:space-between}
  a.back{color:var(--muted);text-decoration:none;font-size:14px;font-weight:600}
  .brand{font-size:15px;font-weight:700}.brand b{color:#9d8bff}
  .summary{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px}
  .summary .big{font-size:26px;font-weight:800}
  .summary .lbl{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .pbar{height:8px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:10px}
  .pbar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--good));transition:width .4s}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .chips span{font-size:12px;font-weight:800;padding:4px 10px;border-radius:999px;background:rgba(39,224,160,.15);color:var(--good)}
  .chips span.none{background:rgba(255,255,255,.06);color:var(--muted)}
  .card{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
    border-radius:18px;padding:16px;cursor:pointer;transition:.15s;text-decoration:none;color:var(--txt)}
  .card:active{transform:scale(.99)}
  .card.locked{opacity:.55}
  .card.soon{opacity:.45;cursor:default}
  .card .num{width:46px;height:46px;border-radius:14px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
    font-size:20px;font-weight:800;background:linear-gradient(180deg,#7c6cff,#5b8cff);color:#fff}
  .card.done .num{background:linear-gradient(180deg,#27e0a0,#16b888)}
  .card .meta{flex:1;min-width:0}
  .card .t{font-size:16px;font-weight:800}
  .card .d{font-size:12.5px;color:var(--muted);margin-top:2px}
  .card .status{font-size:13px;font-weight:800;flex:0 0 auto}
  .card .status.ok{color:var(--good)}
  .card .status.go{color:var(--accent)}
</style>
</head>
<body>
<div class="aurora"><div class="blob b1"></div><div class="blob b2"></div></div>
<div class="wrap">
  <div class="top"><a class="back" href="index.html">← Pluck</a><div class="brand">📚 <b>LESSONS</b></div><span style="width:40px"></span></div>

  <div class="summary">
    <div class="lbl">Your progress</div>
    <div class="big" id="prog">0 of 2 lessons</div>
    <div class="pbar"><i id="pbar"></i></div>
    <div class="lbl" style="margin-top:14px">Chords learned</div>
    <div class="chips" id="chords"></div>
  </div>

  <a class="card" href="practice.html" style="background:linear-gradient(90deg,rgba(124,108,255,.2),rgba(39,224,160,.12))">
    <div class="num" style="background:linear-gradient(180deg,#27e0a0,#16b888)">🎯</div>
    <div class="meta"><div class="t">Smart Practice</div><div class="d">One-minute changes on your weakest chord pair</div></div>
    <div class="status go">Go →</div>
  </a>
  <div id="list"></div>
</div>

<script>
const $=id=>document.getElementById(id);
const done=n=>{try{return localStorage.getItem('pluckLesson'+n)==='done';}catch(e){return false;}};
const LESSONS=[
  {n:1, t:'Play your first song', d:'Tune up, learn C and Am, play a 2-chord song', chords:['C','Am']},
  {n:2, t:'The F chord & strumming', d:'Learn F, the C↔F change, and strum in time', chords:['F']},
  {n:3, t:'The G chord & island strum', d:'Learn G and the island strum, play the four-chord loop', chords:['G']},
  {n:4, t:'Fingerpicking & Dm', d:'Learn Dm and fingerpick strings one at a time', chords:['Dm']},
  {n:5, t:'New keys: D and A', d:'Coming soon', chords:[], soon:true}
];

const total=LESSONS.filter(l=>!l.soon).length;
const completed=LESSONS.filter(l=>!l.soon && done(l.n)).length;
$('prog').textContent=completed+' of '+total+' lessons';
$('pbar').style.width=Math.round(completed/total*100)+'%';

// chords learned = from completed lessons
let learned=[];LESSONS.forEach(l=>{if(!l.soon && done(l.n))learned=learned.concat(l.chords);});
learned=[...new Set(learned)];
const cc=$('chords');
if(learned.length)learned.forEach(c=>{const s=document.createElement('span');s.textContent=c;cc.appendChild(s);});
else{const s=document.createElement('span');s.className='none';s.textContent='none yet — start Lesson 1';cc.appendChild(s);}

const list=$('list');
LESSONS.forEach((l,i)=>{
  const isDone=!l.soon && done(l.n);
  const prevDone=l.n===1 || done(l.n-1);
  const el=document.createElement(l.soon?'div':'a');
  if(!l.soon)el.href='lesson.html?l='+l.n;
  el.className='card'+(isDone?' done':'')+(l.soon?' soon':'')+(!l.soon&&!prevDone&&!isDone?' locked':'');
  el.innerHTML='<div class="num">'+(isDone?'✓':l.n)+'</div>'+
    '<div class="meta"><div class="t">Lesson '+l.n+(l.soon?'':' · '+l.t)+'</div><div class="d">'+(l.soon?l.t:l.d)+'</div></div>'+
    '<div class="status '+(isDone?'ok':'go')+'">'+(l.soon?'soon':(isDone?'✓ Done':(prevDone?'Start →':'Start →')))+'</div>';
  list.appendChild(el);
});

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{}));}
</script>
</body>
</html>
