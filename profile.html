<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pluck · Profile</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#08060f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pluck">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<style>
  :root{--bg:#08060f;--txt:#eef1ff;--muted:#9aa0c8;--accent:#7c6cff;--good:#27e0a0;--warn:#ffc23d}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;align-items:center;min-height:100%;
    padding:calc(env(safe-area-inset-top) + 10px) 16px calc(env(safe-area-inset-bottom) + 18px);-webkit-user-select:none;user-select:none}
  .aurora{position:fixed;inset:-30%;z-index:-2;filter:blur(70px);opacity:.45}
  .blob{position:absolute;border-radius:50%;mix-blend-mode:screen}
  .b1{width:55vmax;height:55vmax;background:#5b4bff;left:-10%;top:-10%}.b2{width:45vmax;height:45vmax;background:#16d6a2;right:-10%;bottom:0}
  .wrap{width:100%;max-width:460px;display:flex;flex-direction:column;gap:14px}
  .top{display:flex;align-items:center;justify-content:space-between}
  a.back{color:var(--muted);text-decoration:none;font-size:14px;font-weight:600}
  .brand{font-size:15px;font-weight:700}.brand b{color:#9d8bff}
  .card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:16px}
  .hero{display:flex;align-items:center;gap:14px}
  .avatar{width:64px;height:64px;border-radius:18px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:34px;background:linear-gradient(180deg,#7c6cff,#5b8cff)}
  .hname{font-size:20px;font-weight:800}
  .htitle{font-size:13px;color:var(--accent);font-weight:800;margin-top:1px}
  .edit{font-size:11px;color:var(--muted);text-decoration:underline;cursor:pointer}
  .pbar{height:8px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:12px}
  .pbar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--good));transition:width .5s}
  .lbl{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px;text-align:center}
  .stat .v{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}
  .stat .k{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .ach{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  .badge{display:flex;gap:10px;align-items:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px}
  .badge.locked{opacity:.4;filter:grayscale(1)}
  .badge .ic{font-size:26px;flex:0 0 auto}
  .badge .bn{font-size:13px;font-weight:800;line-height:1.1}
  .badge .bd{font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.2}

  .ic{width:15px;height:15px;vertical-align:-2.5px}
  .brand svg{color:#9d8bff}

  .badge .ic svg{width:20px;height:20px;color:#9d8bff}
  .badge.locked .ic svg{color:var(--muted)}
</style>
</head>
<body>
<div class="aurora"><div class="blob b1"></div><div class="blob b2"></div></div>
<div class="wrap">
  <div class="top"><a class="back" href="lessons.html">← Lessons</a><div class="brand"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v4a5 5 0 0 1-10 0V4z"/><path d="M7 5H4v2a3 3 0 0 0 3 3"/><path d="M17 5h3v2a3 3 0 0 1-3 3"/></svg> <b>PROFILE</b></div><span style="width:40px"></span></div>

  <div class="card">
    <div class="hero">
      <div class="avatar" id="avatar"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:30px;height:30px;color:#fff"><path d="M12 21c4.2-3.6 7-7.8 7-11.5A7 7 0 0 0 5 9.5C5 13.2 7.8 17.4 12 21z"/></svg></div>
      <div style="flex:1;min-width:0">
        <div class="hname" id="hname">Player</div>
        <div class="htitle" id="htitle">Newcomer</div>
        <div class="edit" id="editName">edit name</div>
      </div>
    </div>
    <div class="lbl" style="margin-top:14px" id="achcount">0 of 13 badges</div>
    <div class="pbar"><i id="achbar"></i></div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="card">
    <div class="lbl">Achievements</div>
    <div class="ach" id="ach"></div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const done=k=>localStorage.getItem(k)==='done';
const LMAP={1:['C','Am'],2:['F'],3:['G'],4:['Dm'],5:['D','A'],6:['C7','G7'],7:['Bb'],8:[],9:['Em'],10:['E'],11:['F#m','Bm'],12:[],13:[]};
function J(k){try{return JSON.parse(localStorage.getItem(k)||'{}');}catch(e){return{};}}

function stats(){
  let lessons=0,chords=[];for(let i=1;i<=13;i++)if(done('pluckLesson'+i)){lessons++;chords=chords.concat(LMAP[i]||[]);}
  chords=[...new Set(chords)];
  const changes=(J('pluckSkill').changes)||{};let bestcpm=0;for(const k in changes)bestcpm=Math.max(bestcpm,changes[k].bestCPM||0);
  const streak=(J('pluckStreak').count)||0;
  const stime=J('pluckSongTime');let bestTime=0;for(const k in stime)bestTime=Math.max(bestTime,stime[k]);
  const songs=Math.max(Object.keys(stime).length,Object.keys(J('pluckSongsDone')).length);
  const picked=done('pluckLesson4')||done('pluckLesson13');
  const ear=parseInt(localStorage.getItem('pluckEarBest')||'0',10);
  return {lessons,chords:chords.length,bestcpm,streak,songs,bestTime,picked,ear};
}
const AI={sprout:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 21h10"/><path d="M12 21v-7"/><path d="M12 14a5 5 0 0 1 5-5h2v1a5 5 0 0 1-5 5h-2"/><path d="M12 12a5 5 0 0 0-5-5H5v1a5 5 0 0 0 5 5h2"/></svg>',notes:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l10-2v13"/><circle cx="6.5" cy="18" r="2.5"/><circle cx="16.5" cy="16" r="2.5"/></svg>',cards:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="13" height="14" rx="2"/><path d="M8 3h11a2 2 0 0 1 2 2v13"/></svg>',layers:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="M2 12l10 5 10-5"/><path d="M2 17l10 5 10-5"/></svg>',bolt:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg>',flame:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>',cal:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M8 2v4"/><path d="M16 2v4"/><path d="M3 10h18"/></svg>',medal:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.2 10 4 3h5l1.7 3.7"/><path d="M16.8 10 20 3h-5l-1.7 3.7"/><circle cx="12" cy="15" r="5"/></svg>',note:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="18" r="3"/><path d="M12 18V4"/><path d="M12 4c4 1 6 3 6 7"/></svg>',timer:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2.5"/><path d="M9 2h6"/></svg>',hand:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-4 0v5"/><path d="M14 10V4a2 2 0 0 0-4 0v6"/><path d="M10 10.5V6a2 2 0 0 0-4 0v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.9-6-2.3l-3.6-3.6a2 2 0 0 1 2.8-2.8L7 15"/></svg>',ear:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8.5a6.5 6.5 0 1 1 13 0c0 6-6 6-6 10a3.5 3.5 0 1 1-7 0"/><path d="M15 8.5a2.5 2.5 0 0 0-5 0v1a2 2 0 1 0 4 0"/></svg>',grad:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 9 12 4 2 9l10 5 10-5z"/><path d="M6 11.5V16c0 1.5 3 3 6 3s6-1.5 6-3v-4.5"/><path d="M22 9v5"/></svg>'};
const ACH=[
 {id:'firststeps',ic:AI.sprout,n:'First Steps',d:'Finish Lesson 1',e:s=>s.lessons>=1},
 {id:'three',ic:AI.notes,n:'Three Chords',d:'Learn 3 chords',e:s=>s.chords>=3},
 {id:'collector',ic:AI.cards,n:'Chord Collector',d:'Learn 6 chords',e:s=>s.chords>=6},
 {id:'fulldeck',ic:AI.layers,n:'Full Deck',d:'Learn 12 chords',e:s=>s.chords>=12},
 {id:'quick',ic:AI.bolt,n:'Quick Change',d:'30 changes/min',e:s=>s.bestcpm>=30},
 {id:'fluent',ic:AI.flame,n:'Fluent Fingers',d:'60 changes/min',e:s=>s.bestcpm>=60},
 {id:'roll',ic:AI.cal,n:'On a Roll',d:'3-day streak',e:s=>s.streak>=3},
 {id:'committed',ic:AI.medal,n:'Committed',d:'7-day streak',e:s=>s.streak>=7},
 {id:'songbird',ic:AI.note,n:'Songbird',d:'Play a full song',e:s=>s.songs>=1},
 {id:'intime',ic:AI.timer,n:'In Time',d:'70%+ in time on a song',e:s=>s.bestTime>=70},
 {id:'picker',ic:AI.hand,n:'Fingerpicker',d:'Finish a picking lesson',e:s=>s.picked},
 {id:'ear',ic:AI.ear,n:'Good Ear',d:'Score 8/10 in ear training',e:s=>s.ear>=8},
 {id:'grad',ic:AI.grad,n:'Graduate',d:'Complete all lessons',e:s=>s.lessons>=13}
];
function title(l){return l>=13?'Maestro':l>=11?'Picker':l>=7?'Player':l>=4?'Strummer':l>=1?'Beginner':'Newcomer';}

const s=stats();
// sticky achievements
let earned=[];try{earned=JSON.parse(localStorage.getItem('pluckAch')||'[]');}catch(e){}
ACH.forEach(a=>{if(a.e(s)&&!earned.includes(a.id))earned.push(a.id);});
try{localStorage.setItem('pluckAch',JSON.stringify(earned));}catch(e){}

// header
$('hname').textContent=localStorage.getItem('pluckName')||'Player';
$('htitle').textContent=title(s.lessons);
$('achcount').textContent=earned.length+' of '+ACH.length+' badges';
$('achbar').style.width=Math.round(earned.length/ACH.length*100)+'%';
$('editName').onclick=()=>{const n=prompt('Your name?',localStorage.getItem('pluckName')||'');if(n!==null){localStorage.setItem('pluckName',n.trim()||'Player');$('hname').textContent=n.trim()||'Player';}};

// stats grid
const ST=[['Lessons',s.lessons+'/13'],['Chords',s.chords],['Streak',s.streak],['Best change',s.bestcpm+'/min'],['Songs',s.songs],['Best timing',s.bestTime+'%']];
$('stats').innerHTML=ST.map(([k,v])=>'<div class="stat"><div class="v">'+v+'</div><div class="k">'+k+'</div></div>').join('');

// achievements
$('ach').innerHTML=ACH.map(a=>{const got=earned.includes(a.id);return '<div class="badge'+(got?'':' locked')+'"><div class="ic">'+a.ic+'</div><div><div class="bn">'+a.n+(got?' ✓':'')+'</div><div class="bd">'+a.d+'</div></div></div>';}).join('');

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{}));}
</script>
</body>
</html>
